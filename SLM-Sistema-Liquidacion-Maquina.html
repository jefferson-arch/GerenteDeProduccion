          librasHora: librasHoraPayload,
          proveedor: proveedor.trim(),
          secuencial: String(secuencial || "").trim(),
          lote: String(lote || "").trim(),
          totalCajas: Number(dataToSave?.totals?.qty || 0),
          totalLibras: Number(dataToSave?.totals?.lbs || 0),
          diffDollars: Number(diffDollars || 0),
          dolaresInvPago: Number(diffDollars || 0),
          dolaresDestino,
          estatusTabla,
          dolaresPlanta: Number(distribucionDolares.planta || 0),
          dolaresControlador: Number(distribucionDolares.controlador || 0),
          dolaresPorFuera: Number(distribucionDolares.porFuera || 0),
          botonOro: Number(distribucionDolares.botonOro || 0),
          recibido: Number(dataToSave?.header?.recibido || 0),
          empacado: Number(dataToSave?.header?.empacado || 0),
          rendimiento: Number(dataToSave?.header?.rendimiento || 0),
          controlador: String(controlador || "").trim(),
          liquidador: liquidadorCreador,
          gerenteProduccion: "Jefferson Figueroa Rosales",
          origenSistema: "SLM",
          tipoLiquidacion: "INVENTARIO_SLM",
          candadoCerrado: !!(historialDocId && (historialDocDataRef.current?.candadoCerrado || historialDocDataRef.current?.estadoCandado === "CERRADO")),
          estadoCandado: (historialDocId && (historialDocDataRef.current?.candadoCerrado || historialDocDataRef.current?.estadoCandado === "CERRADO")) ? "CERRADO" : "ABIERTO",
          pdfHabilitado: !!(historialDocId && (historialDocDataRef.current?.pdfHabilitado || historialDocDataRef.current?.candadoCerrado))
        });
        return { ...basePayload, ...extra };
      };

      const slmDocKey = (valor, fallback="SIN_DATO") => {
        const limpio = String(valor || "").trim().toUpperCase()
          .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
          .replace(/[\/\\#?\[\]]/g, "_")
          .replace(/[^A-Z0-9_-]+/g, "_")
          .replace(/_+/g, "_")
          .replace(/^_|_$/g, "");
        return limpio || fallback;
      };

      const validarLiquidacionNoConUnSoloSecuencial = async (numero, sec, exceptDocId=null) => {
        const fb = window.SLP_FIREBASE;
        const secText = String(sec || "").trim();
        const numeroText = formatLiquidacionNo(liquidacionSeqFromNo(numero) || numero);
        if (!fb?.db || !numeroText || !secText) return;

        // Regla principal SLM:
        // - Un SECUENCIAL puede tener varias liquidaciones si corresponde a ENTERO, COLA, PYD o SOBRANTE DE ENTERO.
        // - Un N° DE LIQUIDACIÓN jamás puede quedar relacionado con dos secuenciales distintos.
        // IMPORTANTE: no se usan documentos auxiliares __idx/__contador porque algunas reglas
        // de Firestore los bloquean. La validación consulta documentos reales de liquidación.
        const qLiq = fb.query(
          fb.collection(fb.db, "slp_liquidaciones_pago"),
          fb.where("liquidacionNo", "==", numeroText),
          fb.limit(20)
        );
        const snapLiq = await fb.getDocs(qLiq);
        const duplicado = snapLiq.docs.find(d => {
          const data = d.data() || {};
          if (d.id === exceptDocId) return false;
          if (String(d.id || "").startsWith("__")) return false;
          return true;
        });
        if (duplicado){
          const data = duplicado.data() || {};
          const secExistente = String(data.secuencial || data.header?.secuencial || "").trim();
          throw new Error(`NUMERO_DUPLICADO|El N° ${numeroText} ya existe con el secuencial ${secExistente || "registrado"}. No se puede duplicar el número de liquidación.`);
        }
      };


      const normalizarEstatusLiquidacion = (valor) => {
        const txt = String(valor || "").trim().toUpperCase();
        if (txt.includes("SOBRANTE") && txt.includes("ENTERO")) return "SOBRANTE DE ENTERO";
        if (txt.includes("ENTERO")) return "ENTERO";
        if (txt.includes("PYD") || txt.includes("P&D") || txt.includes("P Y D")) return "PYD";
        return "COLA";
      };

      const obtenerEstatusDoc = (data) => normalizarEstatusLiquidacion(
        data?.estatusTabla ||
        data?.formInputs?.estatusTabla ||
        data?.header?.estatusTabla ||
        data?.tipoProceso ||
        data?.tipoLiquidacion ||
        "COLA"
      );

      const validarSecuencialEstatusUnico = async (sec, estatus, exceptDocId=null) => {
        const fb = window.SLP_FIREBASE;
        const secText = String(sec || "").trim();
        const estatusText = normalizarEstatusLiquidacion(estatus || estatusTabla || "COLA");
        if (!fb?.db || !secText) return;

        // Regla operativa SLM:
        // Un mismo SECUENCIAL sí puede tener varias liquidaciones, pero solo si son de estatus distinto.
        // Ejemplo válido: 4500 ENTERO + 4500 COLA + 4500 PYD + 4500 SOBRANTE DE ENTERO.
        // Ejemplo bloqueado: 4500 COLA + 4500 COLA.
        // Se consulta solo por SECUENCIAL para evitar depender de índices compuestos de Firestore.
        const qSec = fb.query(
          fb.collection(fb.db, "slp_liquidaciones_pago"),
          fb.where("secuencial", "==", secText),
          fb.limit(80)
        );
        const snapSec = await fb.getDocs(qSec);
        const duplicado = snapSec.docs.find(d => {
          const data = d.data() || {};
          if (d.id === exceptDocId) return false;
          if (String(d.id || "").startsWith("__")) return false;
          const secDoc = String(data.secuencial || data.header?.secuencial || "").trim();
          if (secDoc !== secText) return false;
          return obtenerEstatusDoc(data) === estatusText;
        });

        if (duplicado){
          const data = duplicado.data() || {};
          const numExistente = data.liquidacionNo || data.header?.liquidacionNo || "registrada";
          throw new Error(`SECUENCIAL_ESTATUS_DUPLICADO|El secuencial ${secText} ya tiene una liquidación de ${estatusText} (${numExistente}). Solo se permite repetir el secuencial si el estatus es diferente: ENTERO, COLA, PYD o SOBRANTE DE ENTERO.`);
        }
      };

      const crearLiquidacionNuevaConNumeroUnico = async ({ baseLastSeq, stamp, horaFinalGuardado, librasHoraGuardado }) => {
        const fb = window.SLP_FIREBASE;
        if (!fb?.db || !fb.runTransaction) throw new Error("Firestore no está listo para transacciones.");

        const secText = String(secuencial || "").trim();
        if (!secText) throw new Error("Completa SECUENCIAL antes de guardar.");

        // Segunda validación justo antes de reservar el número, por seguridad.
        await validarSecuencialEstatusUnico(secText, estatusTabla, null);

        const result = await fb.runTransaction(fb.db, async (tx) => {
          const safeBase = Math.max(Number(baseLastSeq || 0), Number(lastSavedSeqRef.current || 0));
          let seqDefinitivo = Math.trunc(safeBase);
          let numeroDefinitivo = "";
          let newRef = null;
          let newSnap = null;

          // Se reserva el N° usando el ID del documento real: SLM_LIQ_0000094.
          // Si dos usuarios guardan al mismo tiempo, Firestore reintenta la transacción:
          // el primero gana el número y el segundo avanza al siguiente libre.
          for (let intento = 0; intento < 80; intento++){
            seqDefinitivo += 1;
            numeroDefinitivo = formatLiquidacionNo(seqDefinitivo);
            newRef = fb.doc(fb.db, "slp_liquidaciones_pago", `SLM_LIQ_${numeroDefinitivo}`);
            newSnap = await tx.get(newRef);
            if (!newSnap.exists()) break;
          }

          if (newSnap && newSnap.exists()){
            throw new Error(`NUMERO_DUPLICADO|No se encontró un N° libre cercano. Actualiza el historial e intenta guardar nuevamente.`);
          }

          const payloadFinal = buildFirestorePayload(
            numeroDefinitivo,
            seqDefinitivo,
            stamp,
            { createdAt: fb.serverTimestamp(), updatedAt: fb.serverTimestamp() },
            { horaInicio: horaInicio || "", horaFinal: horaFinalGuardado, librasHora: librasHoraGuardado }
          );

          tx.set(newRef, {
            ...payloadFinal,
            uniqueKeyLiquidacionNo: numeroDefinitivo,
            uniqueDocStrategy: "DOC_ID_SLM_LIQ_NUMERO",
            secuencial: secText
          });

          return { refId:newRef.id, numeroActual:numeroDefinitivo, seqActual:seqDefinitivo, payload:{ ...payloadFinal, secuencial:secText } };
        });

        return result;
      };

      const loadHistorial = async () => {
        const fb = window.SLP_FIREBASE;
        if (!fb?.db){
          setToast("Firestore aún no está listo. Espera unos segundos e intenta nuevamente.");
          return;
        }
        setHistorialLoading(true);
        try{
          const q = fb.query(
            fb.collection(fb.db, "slp_liquidaciones_pago"),
            fb.orderBy("createdAt", "desc"),
            fb.limit(200)
          );
          const snapDocs = await fb.getDocs(q);
          const data = snapDocs.docs.map(d=>({ id:d.id, ...d.data() }));
          setHistorial(data);
        }catch(err){
          console.error(err);
          setToast("No se pudo cargar el historial. Revisa reglas de Firestore.");
        }finally{
          setHistorialLoading(false);
        }
      };

      useEffect(()=>{
        if (tab === "HISTORIAL") loadHistorial();
        if (tab === "SOLICITUDES") loadSolicitudes();
      }, [tab]);

      const onGuardar = async () => {
        const fb = window.SLP_FIREBASE;
        if (!fb?.db){
          setToast("Firestore aún no está listo. Espera unos segundos e intenta nuevamente.");
          return;
        }
        if (!proveedor.trim() || !secuencial.toString().trim()){
          setToast("Completa PROVEEDOR y SECUENCIAL antes de guardar.");
          return;
        }

        // GUARDAR ya no genera un nuevo número cuando existe una liquidación abierta.
        // Si la liquidación viene desde HISTORIAL, se actualiza el mismo documento y conserva el mismo N°.
        if (historialDocId && !puedeModificarLiquidacion()){
          setToast("No puede guardar cambios en esta liquidación. Solo el usuario que la creó o el administrador pueden hacerlo.");
          return;
        }
        if (historialDocId && candadoCerrado){
          setToast("La liquidación está cerrada con candado. Solicita reapertura antes de modificar o guardar.");
          return;
        }

        const esActualizacion = !!historialDocId;
        let seqActual = liquidacionSeqFromNo(liquidacionNo);
        let baseLastSeq = 0;

        if (esActualizacion){
          if (!seqActual){
            // Respaldo para documentos antiguos abiertos desde historial sin número normalizado.
            seqActual = await getNextLiquidacionSeq();
          }
          try{
            await validarLiquidacionNoConUnSoloSecuencial(formatLiquidacionNo(seqActual), secuencial, historialDocId);
            await validarSecuencialEstatusUnico(secuencial, estatusTabla, historialDocId);
          }catch(err){
            const msg = String(err?.message || "");
            if (msg.includes("SECUENCIAL_ESTATUS_DUPLICADO|")){
              setToast(msg.split("SECUENCIAL_ESTATUS_DUPLICADO|")[1]);
            }else if (msg.includes("NUMERO_SECUENCIAL_DUPLICADO|")){
              setToast(msg.split("NUMERO_SECUENCIAL_DUPLICADO|")[1]);
            }else if (msg.includes("NUMERO_DUPLICADO|")){
              setToast(msg.split("NUMERO_DUPLICADO|")[1]);
            }else{
              setToast("No se pudo validar que el N° de liquidación y el secuencial/estatus sean únicos.");
            }
            return;
          }
        }else{
          // El número visible en pantalla es solo referencial. El número real se reserva en Firestore al GUARDAR.
          try{
            await validarSecuencialEstatusUnico(secuencial, estatusTabla, null);
            const nextSeqRef = await getNextLiquidacionSeq();
            baseLastSeq = Math.max(0, Number(nextSeqRef || 1) - 1);
          }catch(err){
            const msg = String(err?.message || "");
            if (msg.includes("SECUENCIAL_ESTATUS_DUPLICADO|")){
              setToast(msg.split("SECUENCIAL_ESTATUS_DUPLICADO|")[1]);
              return;
            }
            baseLastSeq = Math.max(0, Number(seqActual || 1) - 1);
          }
        }

        const numeroActual = formatLiquidacionNo(seqActual || (baseLastSeq + 1));
        const stamp = (historialDocId && (liquidacionSnap?.stamp || historialDocDataRef.current?.stamp)) ? (liquidacionSnap?.stamp || historialDocDataRef.current?.stamp) : nowStamp();
        const horaFinalGuardado = horaFinal || horaActualTexto();
        if (!horaFinal) setHoraFinal(horaFinalGuardado);
        const horasGuardar = horasEntre(horaInicio, horaFinalGuardado);
        const librasHoraGuardado = horasGuardar > 0 ? toNum(empacado) / horasGuardar : 0;
        let payload = esActualizacion ? buildFirestorePayload(
          numeroActual,
          seqActual,
          stamp,
          { updatedAt: fb.serverTimestamp() },
          { horaInicio: horaInicio || "", horaFinal: horaFinalGuardado, librasHora: librasHoraGuardado }
        ) : null;

        const guardarPendienteEnTelefono = (motivo="offline") => {
          const localDocId = historialDocId || `slm_local_${numeroActual}_${stamp}`.replace(/[^a-zA-Z0-9_\-]/g,"_");
          const payloadLocal = {
            ...payload,
            offlinePending: true,
            offlineReason: motivo,
            offlineQueuedAt: new Date().toISOString(),
            updatedAt: fb.serverTimestamp(),
            ...(esActualizacion ? {} : { createdAt: fb.serverTimestamp() })
          };
          const pendientes = window.SLM_QUEUE_FIRESTORE_WRITE ? window.SLM_QUEUE_FIRESTORE_WRITE({
            collectionName: "slp_liquidaciones_pago",
            docId: localDocId,
            op: esActualizacion ? "updateDoc" : "setDoc",
            numero: numeroActual,
            payload: payloadLocal
          }) : 0;
          const snapBase = { ...(historialDocDataRef.current || {}), ...payloadLocal, id: localDocId };
          historialDocDataRef.current = snapBase;
          setHistorialDocId(localDocId);
          setLiquidacionNo(numeroActual);
          setLiquidacionSnap(snapBase);
          setLiquidador(liquidadorActualDeLiquidacion(snapBase));
          lastSavedSeqRef.current = Math.max(lastSavedSeqRef.current || 0, seqActual);
          if (window.SLM_UPDATE_NET_BANNER) window.SLM_UPDATE_NET_BANNER();
          setToast(`Sin internet estable: Liquidación ${numeroActual} guardada en este teléfono. Se sincronizará al volver la conexión. Pendientes: ${pendientes}.`);
        };

        if (window.SLM_IS_ONLINE && !window.SLM_IS_ONLINE()){
          if (!esActualizacion){
            setToast("Para guardar una liquidación nueva debes estar ONLINE. El N° definitivo se asigna en Firestore para evitar números repetidos.");
            return;
          }
          guardarPendienteEnTelefono("sin-internet");
          return;
        }

        try{
          if (esActualizacion){
            await fb.updateDoc(fb.doc(fb.db, "slp_liquidaciones_pago", historialDocId), payload);

            // La edición conserva el mismo N°. La validación previa evita duplicar ese N° en otro documento.

            const snapBase = { ...(historialDocDataRef.current || {}), ...payload, id: historialDocId };
            historialDocDataRef.current = snapBase;
            setLiquidacionNo(numeroActual);
            setLiquidacionSnap(snapBase);
            setLiquidador(liquidadorActualDeLiquidacion(snapBase));

            setToast(`Liquidación ${numeroActual} actualizada. Para habilitar PDF/QR, cierre el candado.`);
          }else{
            const creado = await crearLiquidacionNuevaConNumeroUnico({ baseLastSeq, stamp, horaFinalGuardado, librasHoraGuardado });
            lastSavedSeqRef.current = Math.max(lastSavedSeqRef.current || 0, creado.seqActual);
            setHistorialDocId(creado.refId);
            setLiquidacionNo(creado.numeroActual);

            const snapBase = { ...creado.payload, id: creado.refId };
            historialDocDataRef.current = snapBase;
            setLiquidacionSnap(snapBase);
            setLiquidador(liquidadorActualDeLiquidacion(snapBase));

            setToast(`Liquidación ${creado.numeroActual} guardada con N° único. Para habilitar PDF/QR, cierre el candado.`);
          }

          if (tab === "HISTORIAL") loadHistorial();
          if (window.SLM_SYNC_PENDING_WRITES) window.SLM_SYNC_PENDING_WRITES();
        }catch(err){
          console.error(err);
          const code = String(err?.code || err?.message || "").toLowerCase();
          const posibleRed = code.includes("network") || code.includes("offline") || code.includes("unavailable") || code.includes("failed to fetch") || (navigator.onLine === false);
          if (posibleRed){
            if (!esActualizacion){
              setToast("No se guardó la liquidación nueva porque se perdió la conexión. Vuelve a presionar GUARDAR cuando esté ONLINE para recibir un N° único.");
            }else{
              guardarPendienteEnTelefono("error-red");
            }
          }else{
            const msg = String(err?.message || "");
            if (msg.includes("SECUENCIAL_ESTATUS_DUPLICADO|")){
              setToast(msg.split("SECUENCIAL_ESTATUS_DUPLICADO|")[1] || "Este secuencial ya tiene una liquidación con el mismo estatus.");
            }else if (msg.includes("NUMERO_SECUENCIAL_DUPLICADO|")){
              setToast(msg.split("NUMERO_SECUENCIAL_DUPLICADO|")[1] || "El N° de liquidación ya está asociado a otro secuencial.");
            }else if (msg.includes("NUMERO_DUPLICADO|")){
              setToast(msg.split("NUMERO_DUPLICADO|")[1] || "El número de liquidación ya existe. Intenta guardar nuevamente.");
            }else{
              setToast(esActualizacion ? "No se pudieron guardar los cambios. Revisa reglas de Firestore." : "No se pudo guardar. Revisa reglas de Firestore o valores vacíos no permitidos.");
            }
          }
        }
      };

      const onEditar = async () => {
        if (!historialDocId){
          setToast("Primero abre una liquidación desde HISTORIAL para poder editarla.");
          return;
        }
        if (!puedeModificarLiquidacion()){
          setToast("No puede modificar esta liquidación. Solo el usuario que la creó o el administrador pueden hacerlo.");
          return;
        }
        if (candadoCerrado){
          setToast("La liquidación está cerrada con candado. Primero debe aprobarse la reapertura en SOLICITUDES.");
          return;
        }
        setTab("DATOS");
        setToast(`Modo edición activo para liquidación ${formatLiquidacionNo(liquidacionSeqFromNo(liquidacionNo) || 1)}. Realiza los cambios y presiona GUARDAR.`);
      };

      const normalizarCantidades = (src) => {
        const out = Object.fromEntries(ALL_TALLAS.map(t=>[t,0]));
        if (!src || typeof src !== "object") return out;
        for (const t of ALL_TALLAS){
          const n = Number(src[t]);
          out[t] = Number.isFinite(n) ? n : 0;
        }
        return out;
      };

      const cantidadesDesdeFilas = (rows) => {
        const out = Object.fromEntries(ALL_TALLAS.map(t=>[t,0]));
        (rows || []).forEach(r=>{
          if (r && r.talla && Object.prototype.hasOwnProperty.call(out, r.talla)){
            const n = Number(r.qty);
            out[r.talla] = Number.isFinite(n) ? n : 0;
          }
        });
        return out;
      };

      const cargarDesdeHistorial = (item, opts={}) => {
        if (!item) return;
        const lockedHistorial = !!(item.candadoCerrado || item.locked || item.estadoCandado === "CERRADO" || item.header?.candadoCerrado || item.header?.estadoCandado === "CERRADO");
        const modoEdicionHistorial = !!opts.editar && !lockedHistorial;

        // Evita que los useEffect de SECUENCIAL/LOTE consulten SCRM mientras
        // se está cargando una liquidación guardada. Antes esto recargaba SCRM
        // y reiniciaba las cantidades de la tabla en la primera apertura.
        cargandoHistorialRef.current = true;
        if (autoFillTimerRef.current) {
          clearTimeout(autoFillTimerRef.current);
          autoFillTimerRef.current = null;
        }

        historialDocDataRef.current = item;
        setLiquidacionSnap(item);
        setHistorialDocId(item.id || null);
        const h = item.header || {};
        const inputs = item.formInputs || item.inputs || {};
        setLiquidacionNo(h.liquidacionNo || item.liquidacionNo || formatLiquidacionNo(h.liquidacionSeq || item.liquidacionSeq || 1));
        setFechaCreacion(h.fechaCreacion || item.fechaCreacion || inputs.fechaCreacion || fechaSistemaTexto());
        setLibrasProgramadas(Number(h.librasProgramadas || item.librasProgramadas || inputs.librasProgramadas || 0));
        setProveedor(h.proveedor || item.proveedor || "");
        setSecuencial(h.secuencial || item.secuencial || "");
        setLote(h.lote || item.lote || "");
        setControlador(h.controlador || item.controlador || "");
        setLiquidador(nombreCreadorLiquidacion(item));
        setDolaresDestino((h.dolaresDestino || item.dolaresDestino || inputs.dolaresDestino) === "CONTROLADOR" ? "CONTROLADOR" : "PLANTA");
        const estatusGuardado = ESTATUS_MAQUINA.includes(inputs.estatusTabla || item.estatusTabla) ? (inputs.estatusTabla || item.estatusTabla) : "COLA";
        setEstatusTabla(estatusGuardado);
        setPiscina(h.piscina || "");
        setGuia(Number(h.guia || 0));
        setPlanta(Number(h.planta || 0));
        setBasura(Number(h.basura || 0));
        setHoraInicio(h.horaInicio || item.horaInicio || inputs.horaInicio || "");
        setHoraFinal(h.horaFinal || item.horaFinal || inputs.horaFinal || "");

        if (inputs && Object.keys(inputs).length){
          const nInvA = normalizarCantidades(inputs.invA);
          const nInvB = normalizarCantidades(inputs.invB);
          const nInvC = normalizarCantidades(inputs.invC);
          const nPayA = normalizarCantidades(inputs.payA);
          const nPayB = normalizarCantidades(inputs.payB);
          const nPayC = normalizarCantidades(inputs.payC);
          setInvA(nInvA);
          setInvB(nInvB);
          setInvC(nInvC);
          setPayA(nPayA);
          setPayB(nPayB);
          setPayC(nPayC);
          if (Array.isArray(inputs.lineRows)) {
            const rowsHist = normalizarLineRows(inputs.lineRows);
            historialRowsBackupRef.current = rowsHist;
            setLineRows(rowsHist);
          } else {
            const rowsHist = legacyCantidadesToLineRows(nInvA, nInvB, nInvC, nPayA, nPayB, nPayC, estatusGuardado);
            historialRowsBackupRef.current = rowsHist;
            setLineRows(rowsHist);
          }
          if (Number.isFinite(Number(inputs.pesoAkg))) setPesoAkg(Number(inputs.pesoAkg));
          if (Number.isFinite(Number(inputs.pesoBkg))) setPesoBkg(Number(inputs.pesoBkg));
          if (Number.isFinite(Number(inputs.pesoClbs))) setPesoClbs(Number(inputs.pesoClbs));
          if (inputs.prices && typeof inputs.prices === "object") setPrices(normalizarPreciosGlobal(inputs.prices));
        }else{
          // Compatibilidad con registros guardados antes de esta mejora:
          // se reconstruyen las cantidades de PAGO desde las filas de liquidación.
          const z0 = Object.fromEntries(ALL_TALLAS.map(t=>[t,0]));
          const pA = cantidadesDesdeFilas(item.classA?.rows);
          const pB = cantidadesDesdeFilas(item.classB?.rows);
          const pC = cantidadesDesdeFilas(item.classC?.rows);
          setInvA(z0);
          setInvB(z0);
          setInvC(z0);
          setPayA(pA);
          setPayB(pB);
          setPayC(pC);
          const rowsHist = legacyCantidadesToLineRows(z0, z0, z0, pA, pB, pC, estatusGuardado);
          historialRowsBackupRef.current = rowsHist;
          setLineRows(rowsHist);
        }

        setTab("DATOS");
        if (modoEdicionHistorial){
          setLiquidacionSnap(null);
          setToast(`Modo edición activo para liquidación ${h.liquidacionNo || item.liquidacionNo || formatLiquidacionNo(h.liquidacionSeq || item.liquidacionSeq || 1)}. Realiza los cambios y presiona GUARDAR.`);
        } else {
          setToast(lockedHistorial ? "Liquidación cerrada con candado: pantalla bloqueada hasta que se apruebe reapertura." : (puedeModificarLiquidacion(item) ? "Liquidación cargada desde historial con sus cantidades." : "Liquidación cargada en modo consulta. Solo el creador o el administrador pueden modificarla."));
        }

        // Refuerzo: al ABRIR se protegen las cantidades contra recargas asíncronas.
        // En EDITAR no se restaura después, para que los cambios del usuario no se reviertan.
        if (!modoEdicionHistorial){
          setTimeout(() => {
            if (historialRowsBackupRef.current) setLineRows(historialRowsBackupRef.current);
          }, 80);
          setTimeout(() => {
            if (historialRowsBackupRef.current) setLineRows(historialRowsBackupRef.current);
            cargandoHistorialRef.current = false;
          }, 1200);
        } else {
          setTimeout(() => {
            cargandoHistorialRef.current = false;
          }, 180);
        }
      };

      const editarDesdeHistorial = (item) => {
        if (!item) return;
        if (!puedeModificarLiquidacion(item)){
          setToast("No puede modificar esta liquidación. Solo el usuario que la creó o el administrador pueden hacerlo.");
          return;
        }
        const locked = !!(item.candadoCerrado || item.locked || item.estadoCandado === "CERRADO" || item.header?.candadoCerrado || item.header?.estadoCandado === "CERRADO");
        if (locked){
          cargarDesdeHistorial(item, { editar:false });
          if (window.SLM_IS_ADMIN){
            setToast("Esta liquidación está cerrada con candado. Para abrirla, aprueba una solicitud en la pestaña SOLICITUDES.");
          }else{
            setReaperturaModal({ open:true, motivo:"" });
          }
          return;
        }
        cargarDesdeHistorial(item, { editar:true });
      };

      const cargarLiquidacionPublicaPorQr = async () => {
        const params = new URLSearchParams(window.location.search);
        const publicId = params.get("verify");
        if (!publicId) return false;

        const fb = window.SLP_FIREBASE;
        if (!fb?.db || !fb?.getDoc) return false;

        try{
          const refDoc = fb.doc(fb.db, "slp_public_liquidaciones", publicId);
          const snapDoc = await fb.getDoc(refDoc);
          if (!snapDoc.exists()){
            setToast("No se encontró la liquidación digital de validación.");
            return true;
          }

          const item = { id: snapDoc.id, ...snapDoc.data() };
          setLiquidacionSnap(item);
          setTab("LIQUIDACION");
          setToast("Liquidación validada digitalmente.");
          return true;
        }catch(err){
          console.error(err);
          setToast("No se pudo abrir la liquidación pública. Revisa reglas de Firestore.");
          return false;
        }
      };

      useEffect(()=>{
        const params = new URLSearchParams(window.location.search);
        if (!params.get("verify")) return;

        let tries = 0;
        const run = async () => {
          tries += 1;
          const ok = await cargarLiquidacionPublicaPorQr();
          if (ok || tries >= 8) clearInterval(timer);
        };

        const timer = setInterval(run, 800);
        run();
        return ()=>clearInterval(timer);
      }, []);

      const historialItemBloqueado = (item) => !!(
        item?.candadoCerrado ||
        item?.locked ||
        item?.estadoCandado === "CERRADO" ||
        item?.header?.candadoCerrado ||
        item?.header?.estadoCandado === "CERRADO"
      );

      const eliminarHistorial = async (item) => {
        const fb = window.SLP_FIREBASE;
        if (!fb?.db || !item?.id) return;
        if (!puedeModificarLiquidacion(item)){
          setToast("No puede eliminar esta liquidación. Solo el usuario que la creó o el administrador pueden hacerlo.");
          return;
        }
        if (historialItemBloqueado(item)){
          setToast("No se puede eliminar una liquidación con candado cerrado.");
          return;
        }
        if (!confirm("¿Eliminar esta liquidación del historial?")) return;
        try{
          await fb.deleteDoc(fb.doc(fb.db, "slp_liquidaciones_pago", item.id));
          if (historialDocId === item.id) setHistorialDocId(null);
          setToast("Registro eliminado del historial.");
          loadHistorial();
        }catch(err){
          console.error(err);
          setToast("No se pudo eliminar el registro.");
        }
      };

      const buildSuggestedPdfName = (snapshot=snap) => {
        const stamp = (snapshot && snapshot.stamp) ? snapshot.stamp : nowStamp();
        const h = snapshot?.header || {};
        const prov = cleanFileName(h.proveedor || "PROVEEDOR") || "PROVEEDOR";
        const sec = cleanFileName(h.secuencial || "SECUENCIAL") || "SECUENCIAL";
        const numLiq = cleanFileName(h.liquidacionNo || liquidacionNo || "0000001");
        return `${numLiq}_${prov}_${sec}_${stamp}.pdf`;
      };

      const generarPdfBlobDesdeVista = async () => {
        if (!liqRef.current) throw new Error("No se encontró el área de LIQUIDACION para exportar.");

        // En Android el CSS responsive cambia la liquidación a una sola columna;
        // para que el PDF salga igual que en Windows, la captura se hace forzando
        // temporalmente el layout de escritorio únicamente durante html2canvas.
        document.body.classList.add("slm-pdf-exporting");
        await new Promise(resolve => requestAnimationFrame(() => requestAnimationFrame(resolve)));

        let canvas;
        try{
          canvas = await window.html2canvas(liqRef.current, {
            scale: 2,
            backgroundColor: "#ffffff",
            useCORS: true,
            allowTaint: false,
            logging: false,
            windowWidth: 1200,
            scrollX: 0,
            scrollY: 0,
            onclone: (doc) => {
              try{
                doc.body.classList.add("slm-pdf-exporting");
                doc.documentElement.classList.add("slm-pdf-export-clone");
                const style = doc.createElement("style");
                style.textContent = `
                  .liq{width:430px!important;min-width:430px!important;max-width:430px!important;padding:8px!important;overflow:visible!important;background:#fff!important;border:1px solid #9ca3af!important;box-sizing:border-box!important;font-family:Arial,Helvetica,sans-serif!important;}
                  .liq .grid.grid-2{display:grid!important;grid-template-columns:1fr 1fr!important;gap:10px!important;width:100%!important;}
                  .liq .logoBox{width:150px!important;min-width:150px!important;max-width:150px!important;min-height:54px!important;display:flex!important;flex-direction:column!important;align-items:center!important;justify-content:center!important;gap:4px!important;background:transparent!important;border:0!important;box-shadow:none!important;padding:0!important;}
                  .liq .logoBox .qrImg{width:72px!important;height:72px!important;max-width:72px!important;max-height:72px!important;}
                  .liq .logoBox .liqLogoAzul,.liq .logoBox>img{max-width:138px!important;max-height:62px!important;width:auto!important;height:auto!important;object-fit:contain!important;display:block!important;}
                  .liq .liqHeaderRow{display:grid!important;grid-template-columns:1fr 1fr 1fr!important;border-bottom:1px solid #cbd5e1!important;padding:3px 0!important;font-size:11px!important;line-height:1.12!important;}
                  .liq .liqHeaderRow .val{grid-column:2 / 4!important;text-align:right!important;}
                  .liq .classHead,.liq .classRow{display:grid!important;grid-template-columns:1fr .75fr 1fr 1fr!important;font-size:11px!important;line-height:1.12!important;}
                  .liq .signArea{margin-top:18px!important;display:grid!important;grid-template-columns:1fr 1fr 1fr!important;gap:18px!important;align-items:end!important;font-size:10px!important;}
                `;
                doc.head.appendChild(style);
              }catch(e){}
            }
          });
        }finally{
          document.body.classList.remove("slm-pdf-exporting");
        }

        const imgData = canvas.toDataURL("image/png");

        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF({ orientation:"portrait", unit:"pt", format:"a4" });

        const pageW = pdf.internal.pageSize.getWidth();
        const pageH = pdf.internal.pageSize.getHeight();
        const imgW = canvas.width;
        const imgH = canvas.height;
        const margin = 24;
        const maxW = pageW - margin*2;
        const maxH = pageH - margin*2;
        const ratio = Math.min(maxW/imgW, maxH/imgH);
        const w = imgW * ratio;
        const h = imgH * ratio;
        const x = (pageW - w)/2;
        const y = margin;

        pdf.addImage(imgData, "PNG", x, y, w, h);
        return pdf.output("blob");
      };

      const descargarPdfBlob = async (blob, suggested) => {
        try{
          if (window.showSaveFilePicker){
            const handle = await window.showSaveFilePicker({
              suggestedName: suggested,
              types: [{ description:"PDF", accept: { "application/pdf": [".pdf"] } }]
            });
            const writable = await handle.createWritable();
            await writable.write(blob);
            await writable.close();
            const url = URL.createObjectURL(blob);
            window.open(url, "_blank", "noopener,noreferrer");
            return;
          }
        }catch(e){}
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = suggested;
        document.body.appendChild(a);
        a.click();
        a.remove();
        window.open(url, "_blank", "noopener,noreferrer");
      };

      const registrarUrlDigital = async ({ baseSnap, docId, numeroActual }) => {
        const fb = window.SLP_FIREBASE;
        if (!fb?.db || !docId) return baseSnap;

        // QR público de validación:
        // no usa Storage y no exige login para visualizar la liquidación.
        const publicId = docId;
        const pdfUrl = buildLiquidacionPublicaUrl(publicId);

        const snapWithPdf = {
          ...baseSnap,
          id: docId,
          publicId,
          pdfUrl,
          header: {
            ...(baseSnap.header || {}),
            publicId,
            pdfUrl
          }
        };

        const publicPayload = limpiarObjetoFirestore({
          ...snapWithPdf,
          id: docId,
          publicId,
          sourceDocId: docId,
          pdfUrl,
          updatedAt: fb.serverTimestamp()
        });

        // Colección pública mínima para validación por QR.
        // La regla recomendada permite read público SOLO aquí.
        await fb.setDoc(fb.doc(fb.db, "slp_public_liquidaciones", publicId), publicPayload);

        const updateData = limpiarObjetoFirestore({
          publicId,
          pdfUrl,
          header: snapWithPdf.header,
          updatedAt: fb.serverTimestamp()
        });

        await fb.updateDoc(fb.doc(fb.db, "slp_liquidaciones_pago", docId), updateData);
        setLiquidacionSnap(snapWithPdf);
        setTab("LIQUIDACION");
        return snapWithPdf;
      };

      const onPdf = async () => {
        if (!liquidacionSnap){
          setToast("Primero presiona LIQUIDAR antes de generar PDF.");
          return;
        }
        const snapPdfOk = !!(liquidacionSnap?.pdfUrl || liquidacionSnap?.header?.pdfUrl);
        if (!candadoCerrado || !snapPdfOk){
          setToast("Cierre el candado para habilitar el PDF y el QR digital.");
          return;
        }
        try{
          if (!liqRef.current){
            setToast("No se pudo encontrar el área de LIQUIDACION para exportar.");
            return;
          }
          const blob = await generarPdfBlobDesdeVista();
          await descargarPdfBlob(blob, buildSuggestedPdfName(snap));
          setToast("PDF descargado y abierto.");
        }catch(err){
          console.error(err);
          setToast("No se pudo generar el PDF.");
        }
      };

      const onHistorialPdf = (item) => {
        if (!historialItemBloqueado(item)){
          setToast("Contabilidad solo puede abrir PDF de liquidaciones con candado cerrado.");
          return;
        }
        const h = item?.header || {};
        const url = item?.pdfUrl || h?.pdfUrl || item?.publicUrl || h?.publicUrl || (item?.publicId ? buildLiquidacionPublicaUrl(item.publicId) : "") || (h?.publicId ? buildLiquidacionPublicaUrl(h.publicId) : "") || (item?.id ? buildLiquidacionPublicaUrl(item.id) : "");
        if (!url){
          setToast("Esta liquidación cerrada no tiene URL/QR de PDF registrado.");
          return;
        }
        window.open(url, "_blank", "noopener,noreferrer");
      };

      const exportHistorialExcel = (item) => {
        if (!historialItemBloqueado(item)){
          setToast("Contabilidad solo puede exportar liquidaciones con candado cerrado.");
          return;
        }
        if (!window.XLSX){
          setToast("No se pudo cargar la librería de Excel.");
          return;
        }
        const h = item?.header || {};
        const claseRows = (nombre, cls) => (cls?.rows || []).map(r => ({
          CLASE:nombre,
          TALLA:r.talla || "",
          PESO:Number(r.peso || 0),
          UNIDADES:Number(r.qty || 0),
          LIBRAS:Number(r.lbs || 0),
          EMPAQUE:formatEmpaqueInfo(r.empaque) || ""
        }));
        const detalle = [
          ...claseRows("A", item?.classA),
          ...claseRows("B", item?.classB),
          ...claseRows("C", item?.classC)
        ];
        if (!detalle.length){
          detalle.push({CLASE:"", TALLA:"SIN DETALLE", PESO:0, UNIDADES:0, LIBRAS:0, EMPAQUE:""});
        }
        const resumen = [
          ["CAMPO", "VALOR"],
          ["N° LIQUIDACIÓN", h.liquidacionNo || item?.liquidacionNo || ""],
          ["PROVEEDOR", h.proveedor || item?.proveedor || ""],
          ["SECUENCIAL", h.secuencial || item?.secuencial || ""],
          ["LOTE", h.lote || item?.lote || ""],
          ["PISCINA", h.piscina || item?.piscina || ""],
          ["GUÍA", Number(h.guia || item?.guia || 0)],
          ["LIBRAS PROGRAMADAS", Number(h.librasProgramadas || item?.librasProgramadas || 0)],
          ["PLANTA", Number(h.planta || item?.planta || 0)],
          ["BASURA", Number(h.basura || item?.basura || 0)],
          ["RECIBIDO", Number(h.recibido || item?.recibido || 0)],
          ["EMPACADO", Number(h.empacado || item?.empacado || 0)],
          ["RENDIMIENTO", Number((h.rendimiento ?? item?.rendimiento ?? 0) * 100)],
          ["CONTROLADOR", h.controlador || item?.controlador || ""],
          ["LIQUIDADOR", h.liquidador || item?.liquidador || ""],
          ["ESTADO", "CANDADO CERRADO"]
        ];
        const wb = window.XLSX.utils.book_new();
        const wsResumen = window.XLSX.utils.aoa_to_sheet(resumen);
        const wsDetalle = window.XLSX.utils.json_to_sheet(detalle);
        wsResumen["!cols"] = [{wch:24},{wch:34}];
        wsDetalle["!cols"] = [{wch:10},{wch:14},{wch:10},{wch:12},{wch:12},{wch:30}];
        window.XLSX.utils.book_append_sheet(wb, wsResumen, "Resumen");
        window.XLSX.utils.book_append_sheet(wb, wsDetalle, "Detalle");
        const nombre = buildSuggestedPdfName(item).replace(/\.pdf$/i, ".xlsx");
        window.XLSX.writeFile(wb, nombre);
      };

      const isPublicVerify = new URLSearchParams(window.location.search).has("verify");

      if (isPublicVerify){
        return (
          <div style={{minHeight:"100vh", background:"#f3f6fb", padding:"16px"}}>
            <div style={{maxWidth:"560px", margin:"0 auto 10px", display:"flex", justifyContent:"space-between", alignItems:"center", gap:"10px"}}>
              <div>
                <div style={{fontWeight:"400", color:"#0b2d4d", fontSize:"14px"}}>OCEANTREASURE S.A.</div>
                <div style={{fontSize:"11px", color:"#64748b"}}>Validación digital de liquidación</div>
              </div>
              <button className="btn" onClick={onPdf}>PDF</button>
            </div>
            {liquidacionSnap ? (
              <LiquidacionTab snap={snap} liqRef={liqRef} publicView={true} />
            ) : (
              <div className="card" style={{maxWidth:"560px", margin:"0 auto", textAlign:"center", fontWeight:"400"}}>
                Cargando liquidación digital...
              </div>
            )}
  

          <InvMovimientoModal
            modal={invModal}
            setModal={setInvModal}
            rows={lineRows}
            onIngresar={()=>aplicarMovimientoInventario("INGRESO")}
            onEliminar={()=>aplicarMovimientoInventario("EGRESO")}
            onCancel={cerrarInvModal}
          />

          <EmpaqueModal
            modal={empaqueModal}
            setModal={setEmpaqueModal}
            clientes={catalogClientesEmpaque}
            marcas={catalogMarcasEmpaque}
            onSave={guardarEmpaqueModal}
            onCancel={cancelarEmpaqueModal}
          />

          <Toast msg={toast} onClose={()=>setToast("")} />
          </div>
        );
      }

      const liquidacionLista = !!liquidacionSnap || !!historialDocId;
      const usuarioHeader = usuarioDesdeEmail(authUserHeader || window.SLM_AUTH_USER) || "USUARIO";

      return (
        <div>
          <div className="top">
            <div className="wrap">
              <div className="topbar">
                <div className="brand">
                  <LogoImg />
                  <div style={{display:"flex", flexDirection:"column", justifyContent:"center", gap:"3px"}}>
                    <div className="s" style={{fontSize:"12px", letterSpacing:".2px", color:"#ffffff"}}>SLM — Sistema de Liquidación de Máquina</div>
                    <div style={{fontSize:"11px", color:"#dfe7cf", fontWeight:"700", letterSpacing:".4px", textTransform:"uppercase"}}>USUARIO: {usuarioHeader}</div>
                    <div className="lockStatus">{liquidacionLista ? (candadoCerrado ? "🔒 LIQUIDACIÓN CERRADA — PDF/QR HABILITADO" : "🔓 LIQUIDACIÓN ABIERTA — PDF/QR BLOQUEADO") : "SIN LIQUIDACIÓN ABIERTA"}</div>
                  </div>
                </div>
                <div id="slmHeaderNetStatus" className="slmHeaderNetStatus online" title="Estado de conexión">
                  <span className="dot"></span><span>Online</span>
                </div>
                {!isAccountingUser && (
                  <div style={{display:"flex", gap:"8px"}}>
                    <button className="btn btnHalo btnHaloNuevo" onClick={onNuevo}>NUEVO</button>
                    <button className={`btn btnHalo btnHaloLiquidar ${haloTop==="liquidar" ? "haloActive" : ""}`} onClick={()=>activarHaloTop("liquidar", onLiquidar)} disabled={!!(historialDocId && candadoCerrado)}>LIQUIDAR</button>
                    <button className="btn btnSave btnHalo btnHaloGuardar" onClick={onGuardar} disabled={!liquidacionLista || candadoCerrado}>GUARDAR</button>
                    <button className={("btn btnLock " + (candadoCerrado ? "closed" : "open"))} onClick={onCandado} disabled={!historialDocId} title={candadoCerrado ? "Candado cerrado: solicitar reapertura" : "Cerrar candado y habilitar PDF/QR"}>{candadoCerrado ? "🔒" : "🔓"}</button>
                    <button className="btn btnHalo btnHaloPdf" onClick={onPdf} disabled={!pdfDisponible}>PDF</button>
                  </div>
                )}
              </div>
            </div>
          </div>

          <div className="wrap">
            <div className="tabs">
              {TABS.filter(t=>{
                if (t === "LISTA DE PRECIOS") return canManagePriceList;
                if (isAccountingUser) return t === "HISTORIAL";
                return (t !== "SOLICITUDES" || window.SLM_IS_ADMIN);
              }).map(t=>(
                <button key={t} className={"tab " + (tab===t ? "active" : "")} onClick={()=>setTab(t)}>{t}</button>
              ))}
            </div>

            <div className="panel">
              {tab==="DATOS" && (
                <DatosTab
                  liquidacionNo={liquidacionNo} fechaCreacion={fechaCreacion} librasProgramadas={librasProgramadas} proveedor={proveedor} secuencial={secuencial} lote={lote} controlador={controlador} liquidador={liquidador} piscina={piscina} guia={guia} planta={planta} basura={basura} horaInicio={horaInicio} horaFinal={horaFinal} librasHora={librasHora}
                  setProveedor={setProveedor} setSecuencial={setSecuencial} setLote={setLote} setControlador={setControlador} setLiquidador={setLiquidador} setPiscina={setPiscina}
                  setGuia={(v)=>setGuia(Number(v))} setPlanta={(v)=>setPlanta(Number(v))} setBasura={(v)=>setBasura(Number(v))} setHoraInicio={setHoraInicio} setHoraFinal={setHoraFinal} actualizarGuiaDesdeSCRM={actualizarGuiaDesdeSCRM}
                  invA={invA} invB={invB} invC={invC} payA={payA} payB={payB} payC={payC}
                  lineRows={lineRows}
                  estatusTabla={estatusTabla}
                  cambiarEstatusTabla={cambiarEstatusTabla}
                  updateLineRow={updateLineRow}
                  addLineRow={addLineRow}
                  deleteLineRow={deleteLineRow}
                  copiarInventarioAPago={copiarInventarioAPago}
                  setInvA={(t,v)=>setQty(setInvA, invA, t, v)}
                  setInvB={(t,v)=>setQty(setInvB, invB, t, v)}
                  setInvC={(t,v)=>setQty(setInvC, invC, t, v)}
                  setPayA={(t,v)=>setQty(setPayA, payA, t, v)}
                  setPayB={(t,v)=>setQty(setPayB, payB, t, v)}
                  setPayC={(t,v)=>setQty(setPayC, payC, t, v)}
                  pesoAkg={pesoAkg} pesoBkg={pesoBkg} pesoClbs={pesoClbs}
                  setPesoAkg={(v)=>setPesoAkg(Number(v))}

    function safeDateFromAny(v){
      try{
        if (!v) return null;
        if (v instanceof Date && !Number.isNaN(v.getTime())) return v;
        if (typeof v?.toDate === "function") {
          const d = v.toDate();
          return (d instanceof Date && !Number.isNaN(d.getTime())) ? d : null;
        }
        if (typeof v === "object"){
          if (Number.isFinite(Number(v.seconds))) {
            const d = new Date(Number(v.seconds) * 1000);
            return Number.isNaN(d.getTime()) ? null : d;
          }
          if (Number.isFinite(Number(v._seconds))) {
            const d = new Date(Number(v._seconds) * 1000);
            return Number.isNaN(d.getTime()) ? null : d;
          }
          return null;
        }
        const txt = String(v || "").trim();
        if (!txt || txt === "[object Object]") return null;
        const m = txt.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})(?:\s*,?\s*(.*))?$/);
        if (m){
          const d = new Date(Number(m[3]), Number(m[2]) - 1, Number(m[1]));
          return Number.isNaN(d.getTime()) ? null : d;
        }
        const d = new Date(txt);
        return Number.isNaN(d.getTime()) ? null : d;
      }catch(e){ return null; }
    }

    function fechaLargaEC(v){
      const d = safeDateFromAny(v);
      if (!d) return "";
      const dias = ["domingo","lunes","martes","miércoles","jueves","viernes","sábado"];
      const meses = ["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];
      return `${dias[d.getDay()]}, ${d.getDate()} de ${meses[d.getMonth()]} del ${d.getFullYear()}`;
    }

    function fechaHoraMinEC(v){
      const d = safeDateFromAny(v);
      if (!d) return "";
      const fecha = `${pad2(d.getDate())}/${pad2(d.getMonth()+1)}/${d.getFullYear()}`;
      const hora = `${pad2(d.getHours())}:${pad2(d.getMinutes())}`;
      return `${fecha} ${hora}`;
    }

    function fechaCortaMesEC(v, incluirHora=false){
      const d = safeDateFromAny(v);
      if (!d) return "";
      const meses = ["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];
      const base = `${pad2(d.getDate())}-${meses[d.getMonth()]}`;
      if (!incluirHora) return base;
      return `${base} ${pad2(d.getHours())}:${pad2(d.getMinutes())}`;
    }

    function solicitudOrdenMs(r){
      if (!r) return 0;
      const direct = Number(r.solicitudMs || r.fechaSolicitudMs || r.createdAtMs || r.updatedAtMs || 0);
      if (Number.isFinite(direct) && direct > 0) return direct;
      const d = safeDateFromAny(r.createdAt || r.fechaSolicitudLocal || r.reviewedAtLocal || r.updatedAt || r.fechaLiquidacion);
      return d ? d.getTime() : 0;
    }

      const fechaSolicitudTexto = (r) => r.fechaSolicitudSistema || fechaCortaMesEC(r.fechaSolicitudMs || r.fechaSolicitudLocal || r.createdAt || r.updatedAt, true);
      const fechaRevisionTexto = (r) => r.fechaRespuestaSistema || fechaCortaMesEC(r.fechaRespuestaMs || r.reviewedAtLocal || r.reviewedAt || r.updatedAt, true);
      const fechaSolicitudDate = (r) => safeDateFromAny(r.fechaSolicitudMs || r.fechaSolicitudLocal || r.createdAt || r.updatedAt);

    function LabelInput({label, value, onChange, type="text", readOnly=false, inputClassName=""}){

      return (

      );
    }

    function NumCell({value, onChange, rowIndex, colKey, register, move}){
      const displayValue = (Number(value)===0 ? "" : value);

      const onKeyDown = (e) => {
        if (e.key === "Tab"){
          e.preventDefault();
          if (typeof move === "function"){
            move(rowIndex, colKey, { dRow: 0, dCol: e.shiftKey ? -1 : 1, wrap: true });
          }
          return;
        }
        if (e.key === "Enter"){
          e.preventDefault();
          if (typeof move === "function"){
            move(rowIndex, colKey, { dRow: e.shiftKey ? -1 : 1, dCol: 0, wrap: false });
          }
          return;
        }
      };

      return (
        <input
          className="inp-cell"
          type="number"
          value={displayValue}
          ref={typeof register === "function" ? register(rowIndex, colKey) : null}
          onKeyDown={onKeyDown}
          onChange={(e)=>onChange(e.target.value)}
        />
      );
    }




    function InvMovimientoModal({modal, setModal, rows, onIngresar, onEliminar, onCancel}){
      if (!modal?.open) return null;

      const makeItemsLocal = (tipoValor="FILA", cantidadValor=1, prevItems=[]) => {
        const t = String(tipoValor || "FILA").toUpperCase() === "COCHE" ? "COCHE" : "FILA";
        const nRaw = Number(String(cantidadValor ?? "1").replace(/[^0-9]/g,""));
        const n = Math.max(1, Math.min(200, Math.trunc(Number.isFinite(nRaw) && nRaw > 0 ? nRaw : 1)));
        return Array.from({length:n}, (_,idx)=>{
          const old = Array.isArray(prevItems) ? (prevItems[idx] || {}) : {};
          return {
            ref: t === "FILA" ? String(idx + 1) : String(old.ref || ""),
            cajas: String(old.cajas || "")
          };
        });
      };

      const row = (rows || []).find(r => r.id === modal.rowId) || {};
      const classKey = claseKeyFromInvKey(modal.classKey);
      const invField = invFieldFromClass(classKey);
      const saldoActual = toNum(row[invField]);
      const movs = normalizarInvMovs(row.invMovs)[classKey] || [];
      const tipo = String(modal.tipo || "FILA").toUpperCase() === "COCHE" ? "COCHE" : "FILA";
      const cantidad = Math.max(1, Math.min(200, Math.trunc(toNum(modal.cantidad) || 1)));
      const items = Array.isArray(modal.items) && modal.items.length ? modal.items : makeItemsLocal(tipo, cantidad);
      const totalIngresar = items.reduce((s,it)=>s + Math.max(0, Math.trunc(toNum(it.cajas))), 0);

      const setTipo = (nuevoTipo) => {
        const t = String(nuevoTipo || "FILA").toUpperCase() === "COCHE" ? "COCHE" : "FILA";
        setModal(prev=>{
          const prevItems = Array.isArray(prev.items) ? prev.items : [];
          return {
            ...prev,
            tipo:t,
            cantidad:"1",
            items:makeItemsLocal(t, 1, prevItems)
          };
        });
      };

      const setCantidadItems = (value) => {
        const limpio = String(value || "").replace(/[^0-9]/g,"");
        setModal(prev=>{
          const t = String(prev.tipo || "FILA").toUpperCase() === "COCHE" ? "COCHE" : "FILA";
          const nRaw = Number(limpio);
          const n = Math.max(1, Math.min(200, Math.trunc(Number.isFinite(nRaw) && nRaw > 0 ? nRaw : 1)));
          const prevItems = Array.isArray(prev.items) ? prev.items : [];
          return {
            ...prev,
            cantidad:limpio,
            items:makeItemsLocal(t, n, prevItems)
          };
        });

      const updateItem = (idx, key, value) => {
        setModal(prev=>{
          const t = String(prev.tipo || "FILA").toUpperCase() === "COCHE" ? "COCHE" : "FILA";
          const cantRaw = Number(String(prev.cantidad || "1").replace(/[^0-9]/g,""));

          const baseItems = Array.isArray(prev.items) && prev.items.length ? prev.items : makeItemsLocal(t, cant);
          const limpio = String(value || "").replace(/[^0-9]/g,"");
          const next = baseItems.map((it,i)=> i === idx ? { ...it, [key]: limpio } : it);
          return { ...prev, items:next };
        });
      };

      return (

            </div>
            <div className="invMovBody">
              <div className="invMovGrid">
                <div className="invMovField">
                  <label>Tipo de registro</label>
                  <select value={tipo} onChange={(e)=>setTipo(e.target.value)}>
                    <option value="FILA">FILA</option>
                    <option value="COCHE">COCHE</option>
                  </select>
                </div>
                <div className="invMovField">
                  <label>{tipo === "FILA" ? "Cantidad de filas" : "Cantidad de coches"}</label>
                  <input
                    value={modal.cantidad || ""}
                    inputMode="numeric"
                    onChange={(e)=>setCantidadItems(e.target.value)}
                    placeholder=""
                  />
                </div>
                <div className="invMovKpi">
                  Saldo actual INV {classKey}: {fmtNumEC(saldoActual,0)} cajas
                </div>
                <div className="invMovKpi">
                  Total del movimiento: {fmtNumEC(totalIngresar,0)} cajas
                </div>
              </div>

              <div className="invMovItems">
                <div className="invMovItemsTitle">
                  {tipo === "FILA" ? "Cajas por fila" : "Cajas por coche"}
                </div>
                {items.map((it, idx)=>(
                  <div className="invMovItemRow" key={`${tipo}_${idx}`}>
                    <div className="invMovField">
                      <label>{tipo === "FILA" ? `Fila ${idx + 1}` : `Coche ${idx + 1}`}</label>
                      <input
                        value={tipo === "FILA" ? String(idx + 1) : (it.ref || "")}

                      />
                    </div>
                    <div className="invMovField">
                      <label>Cajas</label>
                      <input
                        value={it.cajas || ""}
                        inputMode="numeric"
                        onChange={(e)=>updateItem(idx, "cajas", e.target.value)}

                  <label>Marca</label>
                  <select value={modal.marca || ""} onChange={(e)=>setModal(prev=>({...prev, marca:e.target.value}))}>
                    <option value="">SIN MARCA</option>
                    {(marcas || []).map(m => <option key={m.id || m.nombre} value={String(m.nombre || "").toUpperCase()}>{String(m.nombre || "").toUpperCase()}</option>)}
                  </select>
                </div>
                <div>
                  <label>Orden de compra</label>
                  <select value={modal.ordenCompra || ""} onChange={(e)=>setModal(prev=>({...prev, ordenCompra:e.target.value}))}>
                    <option value="">{ordenes.length ? "Seleccionar orden..." : "SIN ORDEN"}</option>
                    {!ordenes.length ? <option value="SIN ORDEN">SIN ORDEN</option> : null}
                    {ordenes.map(v => <option key={v} value={String(v).toUpperCase()}>{String(v).toUpperCase()}</option>)}
                  </select>

              <div className="slmModalActions">

                <button className="btn btnIngresarEmpaque" type="button" onClick={onSave}>INGRESO</button>
              </div>

    }

          />

            className={"invClassBtn " + claseKeyFromInvKey(classKey)}

    function proveedorPrecioKey(nombre){
      const base = String(nombre || "")
        .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
        .toUpperCase().replace(/[^A-Z0-9]+/g, "_")
        .replace(/^_+|_+$/g, "")
        .slice(0, 150);
      return base || "SIN_PROVEEDOR";
    }

    const ESTATUS_LISTA_PRECIOS = ["ENTERO", "COLA", "PYD", "SOBRANTE DE ENTERO"];

    function buildListaPreciosVacia(){
      const out = {};
      ESTATUS_LISTA_PRECIOS.forEach(estatus=>{
        out[estatus] = {};
        tallasPorEstatus(estatus).forEach(talla=>{
          out[estatus][talla] = "";
        });
      });
      return out;
    }

    function normalizarListaPreciosPantalla(src){
      const base = buildListaPreciosVacia();
      const raw = src && typeof src === "object" ? src : {};
      ESTATUS_LISTA_PRECIOS.forEach(estatus=>{
        tallasPorEstatus(estatus).forEach(talla=>{
          const v = raw?.[estatus]?.[talla];
          if (v === null || v === undefined || v === "") base[estatus][talla] = "";
          else if (typeof v === "object"){
            const vv = v.precio ?? v.valor ?? "";
            base[estatus][talla] = Number(vv) === 0 ? "" : String(vv);
          }else{
            base[estatus][talla] = Number(v) === 0 ? "" : String(v);
          }
        });
      });
      return base;
    }

    function listaPreciosParaFirestore(src){
      const out = {};
      const normal = normalizarListaPreciosPantalla(src);
      ESTATUS_LISTA_PRECIOS.forEach(estatus=>{
        out[estatus] = {};
        tallasPorEstatus(estatus).forEach(talla=>{
          const raw = String(normal?.[estatus]?.[talla] ?? "").trim();
          out[estatus][talla] = raw ? parseNumeroEC(raw) : null;
        });
      });
      return out;
    }

    function listaPreciosTieneValores(src){
      const normal = normalizarListaPreciosPantalla(src);
      return ESTATUS_LISTA_PRECIOS.some(estatus=>
        tallasPorEstatus(estatus).some(talla=>{
          const raw = String(normal?.[estatus]?.[talla] ?? "").trim();
          return raw !== "" && !Number.isNaN(parseNumeroEC(raw));
        })
      );
    }

    function ListaPreciosTab({setToast}){
      const [proveedores, setProveedores] = useState([]);
      const [proveedoresKey, setProveedoresKey] = useState(0);
      const [proveedorSel, setProveedorSel] = useState("");
      const [preciosProveedor, setPreciosProveedor] = useState(()=>buildListaPreciosVacia());
      const [loading, setLoading] = useState(false);
      const [guardando, setGuardando] = useState(false);
      const [listaActiva, setListaActiva] = useState(false);
      const [listaBloqueada, setListaBloqueada] = useState(false);
      const [bellRing, setBellRing] = useState(false);
      const [msg, setMsg] = useState("");
      const [lastUpdate, setLastUpdate] = useState("");
      const [precioAuthModal, setPrecioAuthModal] = useState({ open:false, motivo:"" });

      const aviso = (txt) => {
        setMsg(txt || "");
        if (typeof setToast === "function" && txt) setToast(txt);
      };

      const cargarProveedoresSCRM = async (opts = {}) => {
        const fb = window.SLP_FIREBASE;
        const forceClear = !!opts.forceClear;
        const silent = !!opts.silent;
        if (!fb?.db || !fb?.getDocs){ aviso("Firestore aún no está listo. Espera unos segundos e intenta nuevamente."); return; }
        setLoading(true);
        try{
          const map = new Map();
          const normalizarProveedorCatalogo = (v) => String(v || "").trim().toUpperCase().replace(/\s+/g, " ");
          const agregarProveedorCatalogo = (v) => {
            const nombre = normalizarProveedorCatalogo(v);
            if (nombre) map.set(nombre, nombre);
          };
          const extraerProveedoresDeDoc = (data) => {
            if (!data || typeof data !== "object") return;

            // Caso 1: documento individual de catálogo de proveedores.
            agregarProveedorCatalogo(
              data.razonSocial || data.razon_social || data.proveedor || data.nombreProveedor ||
              data.nombre || data.name || data.valor || data.value || data.label || data.descripcion
            );

            // Caso 2: documento agrupado con arreglo/mapa de proveedores.
            const posiblesListas = [data.proveedores, data.razonesSociales, data.razonSociales, data.catalogoProveedores, data.items, data.lista];
            posiblesListas.forEach(lista=>{
              if (Array.isArray(lista)){
                lista.forEach(item=>{
                  if (typeof item === "string") agregarProveedorCatalogo(item);
                  else if (item && typeof item === "object") agregarProveedorCatalogo(item.razonSocial || item.razon_social || item.proveedor || item.nombreProveedor || item.nombre || item.name || item.valor || item.value || item.label || item.descripcion);
                });
              }else if (lista && typeof lista === "object"){
                Object.values(lista).forEach(item=>{
                  if (typeof item === "string") agregarProveedorCatalogo(item);
                  else if (item && typeof item === "object") agregarProveedorCatalogo(item.razonSocial || item.razon_social || item.proveedor || item.nombreProveedor || item.nombre || item.name || item.valor || item.value || item.label || item.descripcion);
                });
              }
            });
          };

          // IMPORTANTE: ya NO se lee scrm_recepcion porque esa colección contiene proveedores históricos
          // de guías. Esta pantalla solo debe usar el catálogo creado en SCRM > Crear datos logísticos.
          const coleccionesCatalogo = [
            // SCRM > Crear datos logísticos guarda Razón social / Proveedor aquí.
            // Campo principal: nombre.
            "scrm_catalog_proveedores",
            "scrm_proveedores",
            "scrm_logistica_proveedores",
            "scrm_datos_logisticos_proveedores",
            "scrm_catalogo_proveedores",
            "scrm_catalogos_proveedores",
            "scrm_razones_sociales",
            "scrm_datos_logisticos",
            "scrm_catalogos_logisticos",
            "scrm_catalogos"
          ];

          for (const col of coleccionesCatalogo){
            try{
              const snap = await fb.getDocs(fb.query(fb.collection(fb.db, col), fb.limit(800)));
              snap.forEach(d=>{
                const data = d.data() || {};
                const tipo = normalizarProveedorCatalogo(data.tipo || data.categoria || data.catalogo || data.clase);
                const esColeccionProveedor = col.includes("proveedor") || col.includes("razones");
                const esRegistroProveedor = !tipo || tipo.includes("PROVEEDOR") || tipo.includes("RAZON") || tipo.includes("RAZÓN") || tipo.includes("RAZON_SOCIAL") || tipo.includes("RAZON SOCIAL");
                if (esColeccionProveedor || esRegistroProveedor) extraerProveedoresDeDoc(data);
              });
            }catch(e){
              console.warn(`No se pudo leer catálogo ${col}.`, e);
            }
          }

          const lista = Array.from(map.values()).sort((a,b)=>a.localeCompare(b, "es"));
          setProveedores(lista);
          setProveedoresKey(k=>k+1);

          // Estabilidad de selección:
          // 1) Al cargar/actualizar proveedores NO se fuerza el primer proveedor de la lista.
          // 2) Si el proveedor actual todavía existe, se conserva.
          // 3) Si el usuario presionó ACTUALIZAR PROVEEDORES, se limpia la selección para que pueda elegir libremente.
          // Esto evita que el select quede "pegado" en LANEC u otro primer registro cuando Firestore demora.
          const actual = String(proveedorSel || "").trim().toUpperCase();
          const proveedorActual = forceClear ? "" : (actual && map.has(actual) ? actual : "");
          setProveedorSel(proveedorActual);
          setListaActiva(false);
          setListaBloqueada(false);
          setPreciosProveedor(buildListaPreciosVacia());
          setLastUpdate("");
          if (!silent) aviso(lista.length ? `Proveedores logísticos SCRM cargados: ${lista.length}. Seleccione el proveedor que desea consultar.` : "No se encontraron proveedores en scrm_catalog_proveedores. Revisa reglas Firestore o presiona ACTUALIZAR PROVEEDORES.");
          if (proveedorActual) setTimeout(()=>cargarListaProveedor(proveedorActual, { crearSiNoExiste:false, preguntarSiNoExiste:false }), 0);
        }catch(err){
          console.error(err);
          aviso("No se pudieron cargar proveedores del catálogo logístico SCRM. Revisa reglas de Firestore.");
        }finally{
          setLoading(false);
        }
      };

      useEffect(()=>{
        const t = setTimeout(()=>cargarProveedoresSCRM({ silent:false }), 700);
        return ()=>clearTimeout(t);
      }, []);

      const cargarListaProveedor = async (proveedorArg, opciones = {}) => {
        const fb = window.SLP_FIREBASE;
        const proveedor = String(proveedorArg || proveedorSel || "").trim().toUpperCase();
        const { crearSiNoExiste = false, preguntarSiNoExiste = false } = opciones;
        if (!proveedor){ aviso("Seleccione un proveedor para consultar o crear la lista de precios."); return; }
        if (!fb?.db || !fb?.getDoc){ aviso("Firestore aún no está listo. Espera unos segundos e intenta nuevamente."); return; }
        setLoading(true);
        try{
          const key = proveedorPrecioKey(proveedor);
          const ref = fb.doc(fb.db, "slm_listas_precios", key);
          const snap = await fb.getDoc(ref);

          if (snap.exists()){
            const data = snap.data() || {};
            const preciosNormalizados = normalizarListaPreciosPantalla(data.precios || data.prices || {});
            if (listaPreciosTieneValores(preciosNormalizados)){
              setPreciosProveedor(preciosNormalizados);
              const bloqueada = data.bloqueada === false ? false : true;
              setListaBloqueada(bloqueada);
              setListaActiva(true);
              setLastUpdate(data.updatedByEmail ? `Última actualización: ${data.updatedByEmail}` : "Lista existente cargada.");
              aviso(bloqueada ? `Lista de precios cargada y bloqueada para ${proveedor}. Solicite autorización para editar.` : `Lista de precios cargada para ${proveedor}.`);
              return;
            }
          }

          if (preguntarSiNoExiste){
            const crear = window.confirm(`El proveedor ${proveedor} no tiene lista de precios guardada. ¿Desea agregar precios ahora?`);
            if (!crear){
              setListaActiva(false);
              setListaBloqueada(false);
              setPreciosProveedor(buildListaPreciosVacia());
              setLastUpdate("");
              aviso(`Proveedor ${proveedor} sin lista de precios guardada.`);
              return;
            }
          }

          if (crearSiNoExiste || preguntarSiNoExiste){
            setPreciosProveedor(buildListaPreciosVacia());
            setListaBloqueada(false);
            setListaActiva(true);
            setLastUpdate("Lista nueva, pendiente de guardar.");
            aviso(`Lista nueva creada en pantalla para ${proveedor}.`);
          }else{
            setListaActiva(false);
            setListaBloqueada(false);
            setPreciosProveedor(buildListaPreciosVacia());
            setLastUpdate("");
            aviso(`Proveedor ${proveedor} sin lista de precios guardada.`);
          }
        }catch(err){
          console.error(err);
          aviso("No se pudo consultar la lista de precios. Revisa reglas de Firestore.");
        }finally{
          setLoading(false);
        }
      };

      const crearOCargarLista = async () => {
        await cargarListaProveedor(proveedorSel, { crearSiNoExiste:true, preguntarSiNoExiste:false });
      };

      const seleccionarProveedorPrecio = async (valor) => {
        const proveedor = String(valor || "").trim().toUpperCase();
        setProveedorSel(proveedor);
        setListaActiva(false);
        setListaBloqueada(false);
        setPreciosProveedor(buildListaPreciosVacia());
        setLastUpdate("");
        if (proveedor){
          setTimeout(()=>cargarListaProveedor(proveedor, { preguntarSiNoExiste:true }), 0);
        }
      };

      const setPrecio = (estatus, talla, valor) => {
        setPreciosProveedor(prev=>({
          ...prev,
          [estatus]: { ...(prev[estatus] || {}), [talla]: valor }
        }));
      };

      const moverEnterPrecio = (e, estatus, idx) => {
        if (e.key !== "Enter") return;
        e.preventDefault();
        const selector = `input[data-price-estatus="${estatus}"][data-price-index="${idx + 1}"]`;
        const next = document.querySelector(selector);
        if (next){
          next.focus();
          next.select?.();
        }
      };

      const solicitarAutorizacion = () => {
        const proveedor = String(proveedorSel || "").trim().toUpperCase();
        if (!proveedor){ aviso("Seleccione un proveedor antes de solicitar autorización."); return; }
        setPrecioAuthModal({ open:true, motivo:`Solicito autorización para editar la lista de precios del proveedor ${proveedor}.` });
      };

      const enviarSolicitudAutorizacionPrecio = async () => {
        const fb = window.SLP_FIREBASE;
        const proveedor = String(proveedorSel || "").trim().toUpperCase();
        const motivo = String(precioAuthModal.motivo || "").trim();
        if (!proveedor){ aviso("Seleccione un proveedor antes de solicitar autorización."); return; }
        if (!motivo){ aviso("Escriba el motivo de la solicitud."); return; }
        if (!fb?.db || !fb?.setDoc || !fb?.doc){ aviso("Firestore aún no está listo. Espera unos segundos e intenta nuevamente."); return; }

        // Animación visual de la campanita: una sola vez al enviar la solicitud.
        setBellRing(false);
        setTimeout(()=>setBellRing(true), 20);
        setTimeout(()=>setBellRing(false), 720);

        setGuardando(true);
        try{
          const solicitudMs = Date.now();
          const key = proveedorPrecioKey(proveedor);
          const solicitudNo = `SP-${solicitudMs}-${Math.random().toString(36).slice(2,5).toUpperCase()}`;
          const email = String(window.SLM_AUTH_USER || "").toLowerCase();
          const nombre = email ? email.split("@")[0].replace(/[._-]+/g," ").toUpperCase() : "USUARIO";
          const fechaIso = new Date(solicitudMs).toISOString();
          const fechaLocal = new Date(solicitudMs).toLocaleString("es-EC");

          // Mismo flujo funcional que el candado: se registra en la colección que alimenta SOLICITUDES.
          // No desbloquea automáticamente; Jefferson debe aprobar desde la pestaña SOLICITUDES.
          await fb.setDoc(fb.doc(fb.db, "slm_solicitudes_reapertura", solicitudNo), {
            solicitudNo,
            solicitudMs,
            tipoSolicitud:"LISTA_PRECIOS",
            modulo:"SLM-LISTA-PRECIOS",
            precioDocId:key,
            proveedorKey:key,
            proveedor,
            liquidacionNo:"LISTA PRECIOS",
            secuencial:"-",
            lote:"-",
            fechaLiquidacion:"-",
            fechaLiquidacionCorta:"-",
            fechaLiquidacionLarga:"-",
            fechaSolicitudLocal:fechaLocal,
            fechaSolicitudIso:fechaIso,
            fechaSolicitudMs:solicitudMs,
            fechaSolicitudSistema:fechaLocal,
            solicitanteEmail:email,
            solicitanteNombre:nombre,
            motivo,
            estado:"PENDIENTE",
            createdAtMs:solicitudMs,
            updatedAtMs:solicitudMs,
            createdAt: fb.serverTimestamp ? fb.serverTimestamp() : fechaIso,
            updatedAt: fb.serverTimestamp ? fb.serverTimestamp() : fechaIso
          }, { merge:false });

          setPrecioAuthModal({ open:false, motivo:"" });
          aviso(`Solicitud enviada al administrador para desbloquear la lista de precios de ${proveedor}.`);
        }catch(err){
          console.error("ERROR_SOLICITUD_LISTA_PRECIOS", err);
          const detalle = err?.code || err?.message || String(err || "Error desconocido");
          aviso(`No se pudo registrar la solicitud. Detalle: ${detalle}`);
        }finally{
          setGuardando(false);
        }
      };

      const actualizarProveedoresManual = async () => {
        // Limpia proveedor y tablas antes de recargar para liberar el selector.
        setProveedorSel("");
        setListaActiva(false);
        setListaBloqueada(false);
        setPreciosProveedor(buildListaPreciosVacia());
        setLastUpdate("");
        await cargarProveedoresSCRM({ forceClear:true });
      };

      const guardarLista = async () => {
        const fb = window.SLP_FIREBASE;
        const proveedor = String(proveedorSel || "").trim().toUpperCase();
        if (!proveedor){ aviso("Seleccione un proveedor antes de guardar."); return; }
        if (!listaActiva){ aviso("Primero presione CREAR LISTA DE PRECIOS para desplegar las tallas."); return; }
        if (!fb?.db || !fb?.setDoc){ aviso("Firestore aún no está listo. Espera unos segundos e intenta nuevamente."); return; }
        setGuardando(true);
        try{
          const key = proveedorPrecioKey(proveedor);
          await fb.setDoc(
            fb.doc(fb.db, "slm_listas_precios", key),
            {
              proveedorKey: key,
              proveedor,
              precios: listaPreciosParaFirestore(preciosProveedor),
              bloqueada: true,
              tallasOrigen: "SLM",
              fuenteProveedores: "SCRM/Crear datos logísticos",
              updatedAt: fb.serverTimestamp(),
              updatedByEmail: String(window.SLM_AUTH_USER || "").toLowerCase(),
              modulo: "SLM-LISTA-PRECIOS"
            },
            { merge:true }
          );
          setListaBloqueada(true);
          setLastUpdate(`Guardado por ${String(window.SLM_AUTH_USER || "usuario").toLowerCase()}.`);
          aviso(`Lista de precios guardada correctamente para ${proveedor}. La lista quedó bloqueada.`);
        }catch(err){
          console.error(err);
          aviso("No se pudo guardar la lista de precios. Revisa reglas de Firestore.");
        }finally{
          setGuardando(false);
        }
      };

      const renderBloque = (estatus, titulo) => (
        <div className="priceListBox" key={estatus}>
          <div className="priceListTitle">{titulo}</div>
          <table className="priceListTable">
            <thead><tr><th className="colTalla">TALLA</th><th className="colPrecio">PRECIO</th></tr></thead>
            <tbody>
              {tallasPorEstatus(estatus).map((talla, idx)=>(
                <tr key={`${estatus}_${talla}`}>
                  <td>{talla}</td>
                  <td><input inputMode="decimal" data-price-estatus={estatus} data-price-index={idx} value={preciosProveedor?.[estatus]?.[talla] ?? ""} onChange={e=>setPrecio(estatus, talla, e.target.value)} onKeyDown={e=>moverEnterPrecio(e, estatus, idx)} disabled={!listaActiva || listaBloqueada || guardando} /></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );

      return (
        <div className="card">
          <div className="h">LISTA DE PRECIOS POR PROVEEDOR</div>
          <div className="priceListBar">
            <label>
              <div>PROVEEDOR SCRM / CATÁLOGO LOGÍSTICO</div>
              <select key={proveedoresKey} value={proveedorSel} onChange={e=>seleccionarProveedorPrecio(e.target.value)} disabled={guardando}>
                <option value="">Seleccione proveedor...</option>
                {proveedores.map(p=><option key={p} value={p}>{p}</option>)}
              </select>
            </label>
            <button className="btn" type="button" onClick={crearOCargarLista} disabled={guardando || !proveedorSel}>CREAR LISTA DE PRECIOS</button>
            <button className="btn" type="button" onClick={actualizarProveedoresManual} disabled={guardando}>ACTUALIZAR PROVEEDORES</button>
          </div>
          {msg && <div className="priceListMsg">{msg}</div>}
          {precioAuthModal.open && (
            <div className="slmModalOverlay">
              <div className="slmModalCard">
                <div className="slmModalHeader">
                  <h3>Solicitud de autorización para editar lista de precios</h3>
                  <button className="btn" type="button" onClick={()=>setPrecioAuthModal({ open:false, motivo:"" })}>Cerrar</button>
                </div>
                <div className="slmModalBody">
                  <div className="muted" style={{marginBottom:8}}>La lista de precios está bloqueada. Escriba el motivo y envíe la solicitud para que Jefferson la apruebe desde la pestaña SOLICITUDES.</div>
                  <label>Proveedor</label>
                  <input value={proveedorSel} readOnly style={{marginBottom:10}} />
                  <label>Motivo de solicitud</label>
                  <textarea className="modalTextArea" value={precioAuthModal.motivo} onChange={e=>setPrecioAuthModal(m=>({ ...m, motivo:e.target.value }))} />
                  <div className="slmModalActions">
                    <button className="btn btnCancelarEmpaque" type="button" onClick={()=>setPrecioAuthModal({ open:false, motivo:"" })}>CANCELAR</button>
                    <button className="btn btnIngresarEmpaque" type="button" onClick={enviarSolicitudAutorizacionPrecio} disabled={guardando}>{guardando ? "ENVIANDO..." : "ENVIAR SOLICITUD 🔔"}</button>
                  </div>
                </div>
              </div>
            </div>
          )}
          {listaActiva && (
            <>
              {listaBloqueada && <div className="priceListLockMsg">🔒 Lista de precios bloqueada. Para editar nuevamente, presione SOLICITAR AUTORIZACIÓN y espere la aprobación del administrador en la pestaña SOLICITUDES.</div>}
              <div className="priceListStatus">
                {renderBloque("ENTERO", "ENTERO")}
                {renderBloque("COLA", "COLA")}
                {renderBloque("PYD", "PYD")}
                {renderBloque("SOBRANTE DE ENTERO", "SOBRANTE DE ENTERO")}
              </div>
              <div className="priceListActions">
                {listaBloqueada && (
                  <button className="btn btnSolicitarPrecio" type="button" onClick={solicitarAutorizacion} disabled={guardando}>
                    SOLICITAR AUTORIZACIÓN <span className={`priceBell ${bellRing ? "ringOnce" : ""}`}>🔔</span>
                  </button>
                )}
                <button className="btn btnSave" type="button" onClick={guardarLista} disabled={guardando || listaBloqueada}>{guardando ? "GUARDANDO..." : "GUARDAR LISTA"}</button>
              </div>

      } = props;

      const rows = lineRows || makeDefaultLineRows(estatusTabla || "COLA");
      const resumenPagoClases = useMemo(()=>{
        let lbsA = 0;
