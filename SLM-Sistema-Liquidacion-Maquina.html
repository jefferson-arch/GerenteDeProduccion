<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover" name="viewport"/>
<title>Oceantreasure — SLM — Sistema de Liquidación de Máquina</title>
<link href="favicon.ico" rel="icon"/>
<link href="favicon.ico" rel="shortcut icon"/>
<link href="apple-touch-icon.png" rel="apple-touch-icon"/>
<style>
    :root { --navy:#0b2d4d; --teal:#0ea5a4; --soft:#f3f6fb; --card:#ffffff; --grid:#cbd5e1; --grid2:#94a3b8; --bg:var(--soft); --muted:#64748b; }
    body{ margin:0; font-family: Arial, Helvetica, sans-serif; background:var(--bg); color:#111827;}
    .top{ border-bottom:1px solid var(--grid); }
    .wrap{ max-width: 1150px; margin:0 auto; padding:0 12px; }
    .topbar{ display:flex; justify-content:space-between; align-items:center; gap:12px; padding:10px 0;}
    .brand{ display:flex; align-items:center; gap:12px;}
    .brand .t{ font-weight:400; letter-spacing:.5px; font-size:12px;}
    .brand .s{ color:var(--muted); font-size:12px;}
    .btn{ border:1px solid var(--muted); background:#f3f4f6; padding:7px 12px; font-size:12px; font-weight:400; border-radius:0; cursor:pointer;}
    .btn:hover{ background:#e5e7eb;}
    .btn:disabled{ opacity:.45; cursor:not-allowed; filter:grayscale(.25); }
    .btn:disabled:hover{ background:#ffffff; }
    .tabs{ display:flex; gap:6px; border-bottom:1px solid var(--grid); padding-top:10px;}
    .tab{ border:1px solid var(--grid); border-bottom:0; padding:7px 10px; font-size:12px; font-weight:400; background:#f9fafb; cursor:pointer; border-radius:0;}
    .tab.active{ background:#fff; border-color:var(--grid2); position:relative; top:1px;}
    .panel{ padding:12px 0 20px;} /* tighter */
    .card{ border:1px solid var(--grid); padding:10px; } /* tighter */
    .grid{ display:grid; gap:10px; } /* tighter */
    .grid-2{ grid-template-columns: 1fr 1fr; }
    .grid-3{ grid-template-columns: 1.25fr 1fr 1fr; }
    @media (max-width: 1024px){
      .grid-3{ grid-template-columns: 1fr; }
      .grid-2{ grid-template-columns: 1fr; }
    }
    .h{ font-size:13px; font-weight:400; margin:0 0 8px;}
    .muted{ color:var(--muted); font-size:12px;}
    label{ font-size:11px; color:var(--muted); display:block; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    input{ width:100%; border:1px solid var(--grid); padding:6px 8px; font-size:12px; border-radius:0; outline:none; background:#fff;}
    input:focus{ border-color:var(--muted); }
    select{ border:1px solid var(--grid); padding:5px 8px; font-size:12px; border-radius:0; outline:none; background:#fff; color:#0b2d4d; font-weight:400; }
    select:focus{ border-color:var(--muted); }
    .tallaHead{ display:flex; align-items:center; gap:8px; }
    .tallaHead select{ height:26px; min-width:92px; padding:3px 6px; font-size:11px; }

    /* ---- Compact rows (DATOS table) ---- */
    .inp-cell{ padding:2px 4px; height:20px; box-sizing:border-box; } /* smaller input height */
    table{ border-collapse:collapse; table-layout:fixed; font-size:12px; }
    th,td{ border:1px solid var(--grid); padding:3px 5px; vertical-align:middle;}
    th{ background:#fff; font-weight:400; text-align:left; position:relative; }
    .compact th, .compact td{ padding:2px 4px; }
    .compact { font-size:11px; }
    .compact input{ font-size:11px; box-sizing:border-box; }
    .compact{ width:100%; max-width:100%; }
    .peso-cell{ display:flex; align-items:center; gap:4px; }
    .peso-row-input{ width:54px !important; min-width:54px; padding:2px 4px !important; height:20px; box-sizing:border-box; }
    .peso-unit{ font-size:10px; color:#64748b; min-width:16px; }
    .miniPlus, .miniDel{ width:20px; height:20px; line-height:18px; padding:0; border:1px solid var(--grid2); background:#fff; color:#0b2d4d; font-weight:400; cursor:pointer; }
    .miniPlus:hover{ background:#ecfeff; border-color:#0ea5a4; }
    .miniDel{ color:#991b1b; border-color:#fecaca; }
    .miniDel:hover{ background:#fee2e2; }
    .talla-dup{ color:#64748b; font-size:10px; padding-left:8px; }

    .resize-handle{ position:absolute; top:0; right:0; width:8px; height:100%; cursor:col-resize; user-select:none;}
    .right{ text-align:right;}
    .toast{ position:fixed; left:50%; transform:translateX(-50%); bottom:18px; z-index:9999;}
    .toastbox{ background:#111; color:#fff; border:1px solid #444; padding:8px 10px; font-size:12px; display:flex; gap:12px; align-items:center;}
    .link{ color:#fff; text-decoration:underline; cursor:pointer; opacity:.85;}
    .link:hover{ opacity:1;}

    /* ---- LIQUIDACION (print look) ---- */
    .liq{ width:430px; background:#fff; border:1px solid #9ca3af; padding:8px;} /* narrower */
    .liqHeaderRow{ display:grid; grid-template-columns: 1fr 1fr 1fr; border-bottom:1px solid var(--grid); padding:3px 0; font-size:11px;}
    .liqHeaderRow .lab{ font-weight:400;}
    .liqHeaderRow .val{ grid-column:2 / 4; text-align:right; font-weight:400;}
    .pdfbox{ border:1px solid #6b7280; padding:18px 40px; font-size:11px; } /* compact */
    .classTitle{ background:#d1d5db; border:1px solid #6b7280; font-weight:400; text-align:center; padding:3px 0; font-size:11px;}
    .classHead{ display:grid; grid-template-columns: 1fr 1fr 1fr; background:#6b7280; color:#fff; font-weight:400; font-size:11px; border-left:1px solid #6b7280; border-right:1px solid #6b7280;}
    .classHead div{ padding:3px 5px; border-right:1px solid #6b7280;}
    .classHead div:last-child{ border-right:0;}
    .classBody{ border:1px solid #6b7280; border-top:0;}
    .classRow{ display:grid; grid-template-columns: 1fr 1fr 1fr; font-size:11px;}
    .classRow div{ padding:3px 5px;}
    .classRow .r{ text-align:right;}
    .subRow{ border-top:1px solid #6b7280; font-weight:400;}
  
    .top{ background: var(--navy); border-bottom:1px solid var(--grid2); }
    .brand .t, .brand .s{ color:#fff; }
    .btn{ border:1px solid rgba(255,255,255,.35); background:#ffffff; color:var(--navy); }
    .btn:hover{ background:#e2e8f0; }
    .tabs{ background:transparent; }
    .tab{ background: #e8eef7; color: var(--navy); }
    .tab.active{ border-top:2px solid var(--teal); }
    .card{ background: var(--card); box-shadow: 0 1px 0 rgba(15,23,42,.04); }
    .h{ color: var(--navy); }

  

    /* --- Firebase Auth Gate --- */
    .auth-gate{
      position:fixed; inset:0;
      display:flex; align-items:center; justify-content:center;
      background: radial-gradient(1200px 600px at 50% 20%, rgba(148,163,184,.55), rgba(2,6,23,.92));
      z-index:99999;
      padding:16px;
    }
    .auth-card{
      width: 390px; max-width: 92vw;
      background:#ffffff;
      border-radius:14px;
      padding:20px 22px 18px;
      box-shadow: 0 18px 60px rgba(0,0,0,.35);
      border:1px solid rgba(15,23,42,.12);
    }
    .auth-title{ font-size:18px; font-weight:400; text-align:center; color: var(--navy); }
    .auth-sub{ margin-top:4px; text-align:center; color:#6b7280; font-size:12px; }
    .auth-allowed{ margin-top:10px; text-align:center; color:#6b7280; font-size:12px; }
    .auth-form{ margin-top:14px; }
    .auth-form label{ margin-top:10px; font-size:12px; color:#374151; }
    .auth-form input{
      margin-top:6px;
      width:100%;
      border:1px solid #d1d5db;
      border-radius:10px;
      padding:9px 10px;
      font-size:13px;
      outline:none;
      background:#fff;
    }
    .auth-form input:focus{ border-color:#2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,.12); }
    .auth-passwrap{ position:relative; }
    .auth-eye{
      position:absolute; right:8px; top:50%; transform:translateY(-50%);
      border:0; background:transparent; cursor:pointer;
      font-size:16px; padding:6px; line-height:1;
      opacity:.65;
    }
    .auth-eye:hover{ opacity:1; }
    .auth-error{ margin-top:10px; color:#dc2626; font-size:12px; min-height:16px; text-align:center; }
    .auth-btn{
      margin-top:10px;
      width:100%;
      border:0;
      background:#2563eb;
      color:#fff;
      font-weight:400;
      border-radius:10px;
      padding:10px 12px;
      cursor:pointer;
      font-size:13px;
    }
    .auth-btn:hover{ filter:brightness(.95); }
    .auth-btn:disabled{ opacity:.6; cursor:not-allowed; }
    .auth-logout{
      position:fixed; right:14px; bottom:14px; z-index:99998;
      border:1px solid rgba(255,255,255,.35);
      background:#ffffff;
      color: var(--navy);
      font-weight:400;
      font-size:12px;
      padding:9px 12px;
      border-radius:10px;
      cursor:pointer;
      box-shadow: 0 10px 30px rgba(0,0,0,.25);
      display:none;
    }
    .auth-logout:hover{ background:#e2e8f0; }



    /* --- SLM historial / PDF extras --- */
    .btnSave{ background:#16a34a !important; color:#fff !important; border-color:#15803d !important; }

    /* --- Efecto HALO para botones principales --- */
    .btnHalo{
      --halo-rgb: 14,165,164;
      position:relative;
      overflow:visible;
      transition: transform .12s ease, box-shadow .18s ease, filter .18s ease;
      isolation:isolate;
    }
    .btnHalo::after{
      content:"";
      position:absolute;
      inset:-7px;
      border-radius:3px;
      pointer-events:none;
      opacity:0;
      z-index:-1;
      box-shadow:0 0 0 0 rgba(var(--halo-rgb),.58), 0 0 18px 4px rgba(var(--halo-rgb),.42);
    }
    .btnHalo:active:not(:disabled){
      transform:scale(.96);
      filter:brightness(1.05);
      box-shadow:0 0 0 3px rgba(var(--halo-rgb),.30), 0 0 18px rgba(var(--halo-rgb),.60);
    }
    .btnHalo.haloActive::after{ animation: haloPulse .62s ease-out; }
    .btnHaloNuevo{ --halo-rgb: 59,130,246; }
    .btnHaloLiquidar{ --halo-rgb: 245,158,11; }
    .btnHaloGuardar{ --halo-rgb: 22,163,74; }
    .btnHaloEditar{ --halo-rgb: 14,165,164; }
    .btnHaloPdf{ --halo-rgb: 168,85,247; }
    @keyframes haloPulse{
      0%{ opacity:1; transform:scale(.92); }
      70%{ opacity:.72; transform:scale(1.13); }
      100%{ opacity:0; transform:scale(1.24); }
    }
    .btnDanger{ background:#fee2e2 !important; color:#991b1b !important; border-color:#fecaca !important; }
    .logoBox{ padding:0; width:150px; min-height:54px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; background:transparent; border:0; box-shadow:none; }
    .logoBox img{ max-width:138px; max-height:62px; object-fit:contain; display:block; }
    .qrBlock{ display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; margin-bottom:2px; }
    .qrBlock .qrImg{ width:72px; height:72px; max-width:72px; max-height:72px; object-fit:contain; image-rendering:pixelated; display:block; background:#fff; }
    .qrCaption{ font-size:6px; line-height:1; font-weight:400; color:#111; letter-spacing:.2px; }
    .signArea{ margin-top:18px; display:grid; grid-template-columns:1fr 1fr 1fr; gap:18px; align-items:end; font-size:10px; }
    .signBox{ min-height:88px; display:flex; flex-direction:column; align-items:center; text-align:center; justify-content:flex-end; }
    .signTop{ width:100%; min-height:44px; display:flex; align-items:flex-end; justify-content:center; text-align:center; font-weight:400; padding:0 4px 2px; box-sizing:border-box; }
    .signTop img{ max-width:118px; max-height:42px; object-fit:contain; display:block; }
    .signLine{ width:100%; border-top:1px solid #111; height:0; margin:0; }
    .signRole{ width:100%; padding-top:4px; font-weight:400; text-align:center; }
    .historyFilters{ display:grid; grid-template-columns:repeat(4, minmax(185px,1fr)); gap:10px; align-items:end; margin-bottom:10px; overflow:visible; }
    .historyFilters label{ min-width:0; overflow:visible; }
    .historyFilters input{ min-width:0; width:100%; box-sizing:border-box; height:30px; padding:6px 9px; }
    .historyFilters input[type="date"]{ min-width:170px; padding-right:6px; }
    .historyActions{ display:flex; gap:8px; align-items:end; justify-content:flex-start; min-height:30px; }
    .historyTotalsGrid{ margin:4px 0 10px; display:grid; grid-template-columns: repeat(5, minmax(150px, 1fr)); gap:8px; align-items:end; font-size:12px; font-weight:400; color:#0b2d4d; }
    .historyTotalBox{ display:grid; grid-template-columns:1fr; gap:3px; }
    .historyTotalBox .amount{ border:1px solid var(--grid); background:#fff; padding:6px 10px; min-width:0; text-align:right; color:#111; font-weight:400; }
    .historyTableWrap{ width:100%; overflow-x:hidden; }
    .historyTable{ width:100%; min-width:0; table-layout:fixed; border-collapse:collapse; font-size:10px; }
    .historyTable th, .historyTable td{ border:1px solid var(--grid); padding:3px 3px; vertical-align:middle; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .historyTable th{ background:#fff; color:#0b2d4d; font-weight:400; }
    .historyTable .col-fecha{ width:8.5%; }
    .historyTable .col-liq{ width:6%; }
    .historyTable .col-prov{ width:9%; }
    .historyTable .col-sec{ width:5.5%; }
    .historyTable .col-rec{ width:7.5%; }
    .historyTable .col-emp{ width:7.5%; }
    .historyTable .col-rend{ width:5.5%; }
    .historyTable .col-dif{ width:7.5%; }
    .historyTable .col-planta{ width:7%; }
    .historyTable .col-ctrlv{ width:7%; }
    .historyTable .col-fuera{ width:7.5%; }
    .historyTable .col-ctrl{ width:8%; }
    .historyTable .col-acciones{ width:10%; }
    .historyTable .actionsCell{ display:flex; gap:3px; justify-content:center; align-items:center; }
    .historyTable .btn{ padding:3px 4px; font-size:9px; line-height:1.1; }
    .historyExportActions{ display:flex; gap:8px; align-items:center; justify-content:flex-end; margin:8px 0 8px; flex-wrap:wrap; }
    @media(max-width:900px){ .historyTableWrap{ overflow-x:auto; } .historyTable{ min-width:980px; } }

    .payCopyStrip{ margin-top:8px; border:1px solid var(--grid); background:#f8fafc; display:grid; grid-template-columns:repeat(3, minmax(130px,1fr)) auto; gap:8px; align-items:center; padding:7px 8px; font-size:12px; }
    .payCopyItem{ background:#ffffff; border:1px solid var(--grid); padding:6px 8px; font-weight:400; color:#0b2d4d; text-align:center; white-space:nowrap; }
    .payCopyBtn{ background:#10b981 !important; color:#ffffff !important; border-color:#059669 !important; min-width:140px; }
    @media(max-width:900px){ .payCopyStrip{ grid-template-columns:1fr; } .payCopyBtn{ width:100%; } }
    .precioBox{ display:inline-block; width:auto; max-width:100%; }
    .precioHeaderAbove{ display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:6px; width:100%; }
    @media(max-width:900px){ .historyFilters{ grid-template-columns:1fr; } .historyFilters input[type="date"]{ min-width:0; } .historyTotalsGrid{ grid-template-columns:1fr; } .signArea{ gap:8px; } .logoBox{ width:120px; } }

  </style>
<style id="slm-final-header-fix">
    .autoBadge{ display:none !important; }

    .brand img,
    .brandLogo,
    .topbar img,
    header img[src*="logo_pdf_blanco"],
    img[src*="logo_pdf_blanco.png"]{
      width:78px !important;
      max-width:78px !important;
      height:auto !important;
      max-height:58px !important;
      object-fit:contain !important;
      display:block !important;
    }

    .brand{
      gap:18px !important;
      min-height:58px !important;
      align-items:center !important;
    }

    .topbar{
      min-height:64px !important;
      padding-top:6px !important;
      padding-bottom:6px !important;
    }

    @media(max-width:700px){
      .brand img,
      .brandLogo,
      .topbar img,
      header img[src*="logo_pdf_blanco"],
      img[src*="logo_pdf_blanco.png"]{
        width:64px !important;
        max-width:64px !important;
        max-height:48px !important;
      }
      .brand{ gap:12px !important; min-height:52px !important; }
      .topbar{ min-height:56px !important; }
    }
  </style>
<style id="slm-toast-2s-fix">
    .toast{ animation: slmToastIn .16s ease-out both; }
    @keyframes slmToastIn{
      from{ opacity:0; transform:translateX(-50%) translateY(8px); }
      to{ opacity:1; transform:translateX(-50%) translateY(0); }
    }
  </style>
<style id="slm-auto-fields-normal-weight">
    input[readonly],
    input:disabled,
    .autoField,
    .autoInput,
    .readonlyField,
    .readonlyInput,
    .field-auto,
    .input-auto{
      font-weight:400 !important;
      letter-spacing:normal !important;
      text-transform:none !important;
    }

    input[readonly]::placeholder,
    input:disabled::placeholder{
      font-weight:400 !important;
    }
  </style>
<style id="slm-historial-cleanup">
    .historyTotalsGrid,
    .historyTotalBox,
    .historyExportActions{
      display:none !important;
    }

    .historyTable .col-dif,
    .historyTable .col-planta,
    .historyTable .col-ctrlv,
    .historyTable .col-fuera,
    .historyTable th.col-dif,
    .historyTable th.col-planta,
    .historyTable th.col-ctrlv,
    .historyTable th.col-fuera,
    .historyTable td.col-dif,
    .historyTable td.col-planta,
    .historyTable td.col-ctrlv,
    .historyTable td.col-fuera{
      display:none !important;
    }
  </style>
<style id="slm-logo-header-restore">
    .top .brand img,
    .topbar .brand img,
    .brand img[src*="logo_pdf_blanco"],
    .brand img[src*="logo"]{
      width:86px !important;
      max-width:86px !important;
      height:auto !important;
      max-height:62px !important;
      object-fit:contain !important;
      display:block !important;
      flex:0 0 auto !important;
      background:transparent !important;
    }
    .top .brand{
      display:flex !important;
      align-items:center !important;
      gap:16px !important;
      min-height:66px !important;
    }
    .topbar{ min-height:72px !important; }
    @media(max-width:700px){
      .top .brand img,
      .topbar .brand img,
      .brand img[src*="logo_pdf_blanco"],
      .brand img[src*="logo"]{
        width:68px !important;
        max-width:68px !important;
        max-height:50px !important;
      }
      .top .brand{ gap:10px !important; min-height:58px !important; }
      .topbar{ min-height:62px !important; }
    }
  </style>
<style id="slm-theme-black-gray-navy-olive">
    :root{
      --navy:#0b1f3a;
      --teal:#556b2f;
      --soft:#f3f4f6;
      --card:#ffffff;
      --grid:#c9ced6;
      --grid2:#6b7280;
      --bg:#f3f4f6;
      --muted:#5f6673;
      --text-main:#111827;
      --black:#0b0f14;
      --dark-gray:#2f343a;
      --mid-gray:#4b5563;
      --light-gray:#e5e7eb;
      --white:#ffffff;
      --olive:#556b2f;
      --olive-dark:#3f5122;
      --olive-soft:#dfe7cf;
      --accent-navy:#0b1f3a;
      --accent-blue:#1f4e79;
    }

    body{
      background:linear-gradient(180deg,#f8fafc 0%, #e5e7eb 100%) !important;
      color:var(--text-main) !important;
    }

    .top{
      background:linear-gradient(90deg,#0b0f14 0%, #2f343a 38%, #0b1f3a 72%, #556b2f 100%) !important;
      border-bottom:1px solid #556b2f !important;
      box-shadow:0 3px 14px rgba(0,0,0,.24) !important;
    }

    .brand .t,
    .brand .s{
      color:#ffffff !important;
    }

    .tabs{
      border-bottom-color:#c9ced6 !important;
    }

    .tab{
      background:#e5e7eb !important;
      color:#111827 !important;
      border-color:#c9ced6 !important;
    }

    .tab.active{
      background:#ffffff !important;
      color:#0b1f3a !important;
      border-color:#6b7280 !important;
      border-top:2px solid #556b2f !important;
    }

    .card{
      background:#ffffff !important;
      border:1px solid #c9ced6 !important;
      box-shadow:0 4px 14px rgba(17,24,39,.08) !important;
    }

    .h,
    .historyTotalBox,
    .historyTable th,
    .payCopyItem,
    select,
    .btn,
    .auth-title,
    .auth-logout{
      color:#0b1f3a !important;
    }

    .muted,
    label,
    .peso-unit,
    .talla-dup,
    .auth-sub,
    .auth-allowed{
      color:#5f6673 !important;
    }

    input,
    select,
    textarea{
      background:#ffffff !important;
      border-color:#c9ced6 !important;
      color:#111827 !important;
    }

    input:focus,
    select:focus,
    .auth-form input:focus{
      border-color:#556b2f !important;
      box-shadow:0 0 0 3px rgba(85,107,47,.18) !important;
    }

    input[readonly],
    input:disabled{
      background:#f3f4f6 !important;
      color:#111827 !important;
      opacity:1 !important;
      font-weight:400 !important;
    }

    th{
      background:#e5e7eb !important;
      color:#0b1f3a !important;
    }

    th,
    td{
      border-color:#c9ced6 !important;
    }

    .btn{
      background:#ffffff !important;
      border:1px solid #6b7280 !important;
      color:#111827 !important;
    }

    .btn:hover{
      background:#e5e7eb !important;
    }

    .btnSave,
    .payCopyBtn{
      background:#556b2f !important;
      border-color:#3f5122 !important;
      color:#ffffff !important;
    }

    .btnSave:hover,
    .payCopyBtn:hover{
      background:#3f5122 !important;
    }

<script id="slm-orientation-helper-final">
    /* Ayuda visual para detectar orientación. La rotación real depende de la APK/AndroidManifest. */
    (function(){
      function applyOrientationClass(){
        var root = document.documentElement;
        var landscape = window.matchMedia && window.matchMedia('(orientation: landscape)').matches;
        root.classList.toggle('slm-landscape', !!landscape);
        root.classList.toggle('slm-portrait', !landscape);
      }
      applyOrientationClass();
      window.addEventListener('resize', applyOrientationClass, {passive:true});
      window.addEventListener('orientationchange', function(){ setTimeout(applyOrientationClass, 80); }, {passive:true});
      try{
        if (screen && screen.orientation && typeof screen.orientation.unlock === 'function') screen.orientation.unlock();
      }catch(e){}
    })();
  </script>

<!-- Firebase (Auth) - SDK modular (CDN) -->
<script type="module">
    // ========= 1) CONFIGURACIÓN =========
    // For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyCMoLkSnnLowMagRNL7O6ttPo1FXd1URac",
  authDomain: "oceantreasure-app.firebaseapp.com",
  projectId: "oceantreasure-app",
  storageBucket: "oceantreasure-app.firebasestorage.app",
  messagingSenderId: "553014659258",
  appId: "1:553014659258:web:cfc30844a88433b7b79a83",
  measurementId: "G-HMMQKJY8NJ"
};

    // Usuarios permitidos y administrador
    const ADMIN_EMAIL = "jeffersonfigueroa@oceantreasure.local";
    const ACCOUNTING_EMAILS = [
      "ericktorres@oceantreasure.local",
      "ceciliamorocho@oceantreasure.local",
      "lisbethmurillo@oceantreasure.local"
    ];
    const ALLOWED_EMAILS = [
      "wintermontiel@oceantreasure.local",
      "juangavilanez@oceantreasure.local",
      ...ACCOUNTING_EMAILS,
      ADMIN_EMAIL
    ];
    const isAllowedEmail = (email) => ALLOWED_EMAILS.includes(String(email || "").trim().toLowerCase());
    const isAdminEmail = (email) => String(email || "").trim().toLowerCase() === ADMIN_EMAIL;
    const isAccountingEmail = (email) => ACCOUNTING_EMAILS.includes(String(email || "").trim().toLowerCase());
    const IS_PUBLIC_VERIFY = new URLSearchParams(window.location.search).has("verify");

    // ========= 2) IMPORTS =========
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import {
      getAuth,
      setPersistence,
      browserLocalPersistence,
      browserSessionPersistence,
      onAuthStateChanged,
      signInWithEmailAndPassword,
      signOut
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
    import {
      getFirestore, collection, addDoc, getDocs, getDoc, setDoc, query, where, orderBy, limit, deleteDoc, doc, updateDoc, serverTimestamp, runTransaction
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
    import {
      getStorage, ref as storageRef, uploadBytes, getDownloadURL
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-storage.js";

    // ========= 3) UI =========
    const gate = document.getElementById("authGate");
    const form = document.getElementById("loginForm");
    const emailEl = document.getElementById("loginEmail");
    const passEl = document.getElementById("loginPassword");
    const errEl  = document.getElementById("loginError");
    const btnEl  = document.getElementById("loginBtn");
    const togEl  = document.getElementById("togglePass");
    const logoutBtn = document.getElementById("logoutBtn");

    // Usuario editable: solo permite correos autorizados al iniciar sesión
    emailEl.value = "";
    emailEl.readOnly = false;

    const showError = (msg) => { errEl.textContent = msg || ""; };
    const setLoading = (on) => {
      btnEl.disabled = !!on;
      btnEl.textContent = on ? "Ingresando..." : "Ingresar";
    };

    togEl.addEventListener("click", () => {
      passEl.type = (passEl.type === "password") ? "text" : "password";
    });

    // ========= 4) INIT =========
    const isPlaceholder = (v) => (typeof v === "string" && v.startsWith("PEGA_AQUI"));
    if (isPlaceholder(firebaseConfig.apiKey) || isPlaceholder(firebaseConfig.authDomain) || isPlaceholder(firebaseConfig.projectId) || isPlaceholder(firebaseConfig.appId)){
      showError("Falta pegar tu firebaseConfig en el HTML (Project settings → Your apps → Config).");
      // no inicializamos Firebase para evitar errores
    } else {
      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const db = getFirestore(app);
      const storage = getStorage(app);

      // Servicios disponibles para la app React (guardar historial en Firestore y PDF digital en Storage)
      window.SLP_FIREBASE = { auth, db, storage, storageBucket: firebaseConfig.storageBucket, collection, addDoc, getDocs, getDoc, setDoc, query, where, orderBy, limit, deleteDoc, doc, updateDoc, serverTimestamp, runTransaction, storageRef, uploadBytes, getDownloadURL };

      // ========= SLM OFFLINE/SYNC: cola local para zonas con internet débil =========
      const SLM_OFFLINE_QUEUE_KEY = "SLM_OFFLINE_WRITES_V1";
      const SLM_LAST_SYNC_KEY = "SLM_LAST_SYNC_LABEL";
      const slmNowLabel = () => new Date().toLocaleString("es-EC", { hour12:false });
      const slmReadQueue = () => {
        try { return JSON.parse(localStorage.getItem(SLM_OFFLINE_QUEUE_KEY) || "[]"); }
        catch(_) { return []; }
      };
      const slmWriteQueue = (items) => {
        try { localStorage.setItem(SLM_OFFLINE_QUEUE_KEY, JSON.stringify(Array.isArray(items) ? items : [])); } catch(_) {}
        window.SLM_UPDATE_NET_BANNER && window.SLM_UPDATE_NET_BANNER();
      };
      const slmSafeClone = (value) => {
        if (value === undefined) return null;
        if (value === null) return null;
        if (value instanceof Date) return { __slmDate: value.toISOString() };
        if (Array.isArray(value)) return value.map(slmSafeClone);
        if (typeof value === "object") {
          // Evita guardar objetos internos de Firebase FieldValue en localStorage.
          if (String(value.constructor?.name || "").includes("FieldValue")) return { __slmServerTimestamp: true };
          const out = {};
          Object.entries(value).forEach(([k,v]) => {
            if (v === undefined) return;
            if ((k === "createdAt" || k === "updatedAt") && typeof v === "object") out[k] = { __slmServerTimestamp: true };
            else out[k] = slmSafeClone(v);
          });
          return out;
        }
        return value;
      };
      const slmRestorePayload = (value) => {
        if (Array.isArray(value)) return value.map(slmRestorePayload);
        if (value && typeof value === "object") {
          if (value.__slmServerTimestamp) return serverTimestamp();
          if (value.__slmDate) return new Date(value.__slmDate);
          const out = {};
          Object.entries(value).forEach(([k,v]) => out[k] = slmRestorePayload(v));
          return out;
        }
        return value;
      };
      const slmQueueWrite = (item) => {
        const q = slmReadQueue();
        q.push({
          id: item.id || `slm_queue_${Date.now()}_${Math.random().toString(36).slice(2,8)}`,
          collectionName: item.collectionName || "slp_liquidaciones_pago",
          docId: item.docId || "",
          op: item.op || "setDoc",
          numero: item.numero || "",
          queuedAt: new Date().toISOString(),
          payload: slmSafeClone(item.payload || {})
        });
        window.__SLM_MANUAL_SYNC_NEEDED = false;
        slmWriteQueue(q);
        return q.length;
      };
      const slmSetBannerState = (mode, text) => {
        const banner = document.getElementById("slmNetBanner");
        const label = document.getElementById("slmNetText");
        const pending = document.getElementById("slmNetPending");
        if (!banner || !label || !pending) return;
        const q = slmReadQueue();

        banner.classList.remove("online","offline","pending");
        banner.classList.add(mode);
        if (window.__SLM_MANUAL_SYNC_NEEDED && window.SLM_IS_ONLINE && window.SLM_IS_ONLINE() && q.length) banner.classList.add("manualSyncNeeded");
        else banner.classList.remove("manualSyncNeeded");
        label.textContent = text;
        pending.textContent = `Pendientes: ${q.length}`;

        const headerBadge = document.getElementById("slmHeaderNetStatus");
        if (headerBadge) {
          const badgeMode = (!window.SLM_IS_ONLINE || !window.SLM_IS_ONLINE()) ? "offline" : (q.length ? "pending" : "online");
          headerBadge.classList.remove("online","offline","pending");
          headerBadge.classList.add(badgeMode);
