<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Oceantreasure — SLM — Sistema de Liquidación de Máquina</title>
  <link rel="icon" href="favicon.ico" />
  <link rel="shortcut icon" href="favicon.ico" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <style>
    :root { --navy:#0b2d4d; --teal:#0ea5a4; --soft:#f3f6fb; --card:#ffffff; --grid:#cbd5e1; --grid2:#94a3b8; --bg:var(--soft); --muted:#64748b; }
    body{ margin:0; font-family: Arial, Helvetica, sans-serif; background:var(--bg); color:#111827;}
    .top{ border-bottom:1px solid var(--grid); }
    .wrap{ max-width: 1150px; margin:0 auto; padding:0 12px; }
    .topbar{ display:flex; justify-content:space-between; align-items:center; gap:12px; padding:10px 0;}
    .brand{ display:flex; align-items:center; gap:12px;}
    .brand .t{ font-weight:400; letter-spacing:.5px; font-size:12px;}
    .brand .s{ color:var(--muted); font-size:12px;}
    .btn{ border:1px solid var(--muted); background:#f3f4f6; padding:7px 12px; font-size:12px; font-weight:400; border-radius:0; cursor:pointer;}
    .btn:hover{ background:#e5e7eb;}
    .btn:disabled{ opacity:.45; cursor:not-allowed; filter:grayscale(.25); }
    .btn:disabled:hover{ background:#ffffff; }
    .tabs{ display:flex; gap:6px; border-bottom:1px solid var(--grid); padding-top:10px;}
    .tab{ border:1px solid var(--grid); border-bottom:0; padding:7px 10px; font-size:12px; font-weight:400; background:#f9fafb; cursor:pointer; border-radius:0;}
    .tab.active{ background:#fff; border-color:var(--grid2); position:relative; top:1px;}
    .panel{ padding:12px 0 20px;} /* tighter */
    .card{ border:1px solid var(--grid); padding:10px; } /* tighter */
    .grid{ display:grid; gap:10px; } /* tighter */
    .grid-2{ grid-template-columns: 1fr 1fr; }
    .grid-3{ grid-template-columns: 1.25fr 1fr 1fr; }
    @media (max-width: 1024px){
      .grid-3{ grid-template-columns: 1fr; }
      .grid-2{ grid-template-columns: 1fr; }
    }
    .h{ font-size:13px; font-weight:400; margin:0 0 8px;}
    .muted{ color:var(--muted); font-size:12px;}
    label{ font-size:11px; color:var(--muted); display:block; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    input{ width:100%; border:1px solid var(--grid); padding:6px 8px; font-size:12px; border-radius:0; outline:none; background:#fff;}
    input:focus{ border-color:var(--muted); }
    select{ border:1px solid var(--grid); padding:5px 8px; font-size:12px; border-radius:0; outline:none; background:#fff; color:#0b2d4d; font-weight:400; }
    select:focus{ border-color:var(--muted); }
    .tallaHead{ display:flex; align-items:center; gap:8px; }
    .tallaHead select{ height:26px; min-width:92px; padding:3px 6px; font-size:11px; }

    /* ---- Compact rows (DATOS table) ---- */
    .inp-cell{ padding:2px 4px; height:20px; box-sizing:border-box; } /* smaller input height */
    table{ border-collapse:collapse; table-layout:fixed; font-size:12px; }
    th,td{ border:1px solid var(--grid); padding:3px 5px; vertical-align:middle;}
    th{ background:#fff; font-weight:400; text-align:left; position:relative; }
    .compact th, .compact td{ padding:2px 4px; }
    .compact { font-size:11px; }
    .compact input{ font-size:11px; box-sizing:border-box; }
    .compact{ width:100%; max-width:100%; }
    .peso-cell{ display:flex; align-items:center; gap:4px; }
    .peso-row-input{ width:54px !important; min-width:54px; padding:2px 4px !important; height:20px; box-sizing:border-box; }
    .peso-unit{ font-size:10px; color:#64748b; min-width:16px; }
    .miniPlus, .miniDel{ width:20px; height:20px; line-height:18px; padding:0; border:1px solid var(--grid2); background:#fff; color:#0b2d4d; font-weight:400; cursor:pointer; }
    .miniPlus:hover{ background:#ecfeff; border-color:#0ea5a4; }
    .miniDel{ color:#991b1b; border-color:#fecaca; }
    .miniDel:hover{ background:#fee2e2; }
    .talla-dup{ color:#64748b; font-size:10px; padding-left:8px; }

    .resize-handle{ position:absolute; top:0; right:0; width:8px; height:100%; cursor:col-resize; user-select:none;}
    .right{ text-align:right;}
    .toast{ position:fixed; left:50%; transform:translateX(-50%); bottom:18px; z-index:9999;}
    .toastbox{ background:#111; color:#fff; border:1px solid #444; padding:8px 10px; font-size:12px; display:flex; gap:12px; align-items:center;}
    .link{ color:#fff; text-decoration:underline; cursor:pointer; opacity:.85;}
    .link:hover{ opacity:1;}

    /* ---- LIQUIDACION (print look) ---- */
    .liq{ width:430px; background:#fff; border:1px solid #9ca3af; padding:8px;} /* narrower */
    .liqHeaderRow{ display:grid; grid-template-columns: 1fr 1fr 1fr; border-bottom:1px solid var(--grid); padding:3px 0; font-size:11px;}
    .liqHeaderRow .lab{ font-weight:400;}
    .liqHeaderRow .val{ grid-column:2 / 4; text-align:right; font-weight:400;}
    .pdfbox{ border:1px solid #6b7280; padding:18px 40px; font-size:11px; } /* compact */
    .classTitle{ background:#d1d5db; border:1px solid #6b7280; font-weight:400; text-align:center; padding:3px 0; font-size:11px;}
    .classHead{ display:grid; grid-template-columns: 1fr 1fr 1fr; background:#6b7280; color:#fff; font-weight:400; font-size:11px; border-left:1px solid #6b7280; border-right:1px solid #6b7280;}
    .classHead div{ padding:3px 5px; border-right:1px solid #6b7280;}
    .classHead div:last-child{ border-right:0;}
    .classBody{ border:1px solid #6b7280; border-top:0;}
    .classRow{ display:grid; grid-template-columns: 1fr 1fr 1fr; font-size:11px;}
    .classRow div{ padding:3px 5px;}
    .classRow .r{ text-align:right;}
    .subRow{ border-top:1px solid #6b7280; font-weight:400;}
  
    .top{ background: var(--navy); border-bottom:1px solid var(--grid2); }
    .brand .t, .brand .s{ color:#fff; }
    .btn{ border:1px solid rgba(255,255,255,.35); background:#ffffff; color:var(--navy); }
    .btn:hover{ background:#e2e8f0; }
    .tabs{ background:transparent; }
    .tab{ background: #e8eef7; color: var(--navy); }
    .tab.active{ border-top:2px solid var(--teal); }
    .card{ background: var(--card); box-shadow: 0 1px 0 rgba(15,23,42,.04); }
    .h{ color: var(--navy); }

  

    /* --- Firebase Auth Gate --- */
    .auth-gate{
      position:fixed; inset:0;
      display:flex; align-items:center; justify-content:center;
      background: radial-gradient(1200px 600px at 50% 20%, rgba(148,163,184,.55), rgba(2,6,23,.92));
      z-index:99999;
      padding:16px;
    }
    .auth-card{
      width: 390px; max-width: 92vw;
      background:#ffffff;
      border-radius:14px;
      padding:20px 22px 18px;
      box-shadow: 0 18px 60px rgba(0,0,0,.35);
      border:1px solid rgba(15,23,42,.12);
    }
    .auth-title{ font-size:18px; font-weight:400; text-align:center; color: var(--navy); }
    .auth-sub{ margin-top:4px; text-align:center; color:#6b7280; font-size:12px; }
    .auth-allowed{ margin-top:10px; text-align:center; color:#6b7280; font-size:12px; }
    .auth-form{ margin-top:14px; }
    .auth-form label{ margin-top:10px; font-size:12px; color:#374151; }
    .auth-form input{
      margin-top:6px;
      width:100%;
      border:1px solid #d1d5db;
      border-radius:10px;
      padding:9px 10px;
      font-size:13px;
      outline:none;
      background:#fff;
    }
    .auth-form input:focus{ border-color:#2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,.12); }
    .auth-passwrap{ position:relative; }
    .auth-eye{
      position:absolute; right:8px; top:50%; transform:translateY(-50%);
      border:0; background:transparent; cursor:pointer;
      font-size:16px; padding:6px; line-height:1;
      opacity:.65;
    }
    .auth-eye:hover{ opacity:1; }
    .auth-error{ margin-top:10px; color:#dc2626; font-size:12px; min-height:16px; text-align:center; }
    .auth-btn{
      margin-top:10px;
      width:100%;
      border:0;
      background:#2563eb;
      color:#fff;
      font-weight:400;
      border-radius:10px;
      padding:10px 12px;
      cursor:pointer;
      font-size:13px;
    }
    .auth-btn:hover{ filter:brightness(.95); }
    .auth-btn:disabled{ opacity:.6; cursor:not-allowed; }
    .auth-logout{
      position:fixed; right:14px; bottom:14px; z-index:99998;
      border:1px solid rgba(255,255,255,.35);
      background:#ffffff;
      color: var(--navy);
      font-weight:400;
      font-size:12px;
      padding:9px 12px;
      border-radius:10px;
      cursor:pointer;
      box-shadow: 0 10px 30px rgba(0,0,0,.25);
      display:none;
    }
    .auth-logout:hover{ background:#e2e8f0; }



    /* --- SLM historial / PDF extras --- */
    .btnSave{ background:#16a34a !important; color:#fff !important; border-color:#15803d !important; }

    /* --- Efecto HALO para botones principales --- */
    .btnHalo{
      --halo-rgb: 14,165,164;
      position:relative;
      overflow:visible;
      transition: transform .12s ease, box-shadow .18s ease, filter .18s ease;
      isolation:isolate;
    }
    .btnHalo::after{
      content:"";
      position:absolute;
      inset:-7px;
      border-radius:3px;
      pointer-events:none;
      opacity:0;
      z-index:-1;
      box-shadow:0 0 0 0 rgba(var(--halo-rgb),.58), 0 0 18px 4px rgba(var(--halo-rgb),.42);
    }
    .btnHalo:active:not(:disabled){
      transform:scale(.96);
      filter:brightness(1.05);
      box-shadow:0 0 0 3px rgba(var(--halo-rgb),.30), 0 0 18px rgba(var(--halo-rgb),.60);
    }
    .btnHalo.haloActive::after{ animation: haloPulse .62s ease-out; }
    .btnHaloNuevo{ --halo-rgb: 59,130,246; }
    .btnHaloLiquidar{ --halo-rgb: 245,158,11; }
    .btnHaloGuardar{ --halo-rgb: 22,163,74; }
    .btnHaloEditar{ --halo-rgb: 14,165,164; }
    .btnHaloPdf{ --halo-rgb: 168,85,247; }
    @keyframes haloPulse{
      0%{ opacity:1; transform:scale(.92); }
      70%{ opacity:.72; transform:scale(1.13); }
      100%{ opacity:0; transform:scale(1.24); }
    }
    .btnDanger{ background:#fee2e2 !important; color:#991b1b !important; border-color:#fecaca !important; }
    .logoBox{ padding:0; width:150px; min-height:54px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; background:transparent; border:0; box-shadow:none; }
    .logoBox img{ max-width:138px; max-height:62px; object-fit:contain; display:block; }
    .qrBlock{ display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; margin-bottom:2px; }
    .qrBlock .qrImg{ width:72px; height:72px; max-width:72px; max-height:72px; object-fit:contain; image-rendering:pixelated; display:block; background:#fff; }
    .qrCaption{ font-size:6px; line-height:1; font-weight:400; color:#111; letter-spacing:.2px; }
    .signArea{ margin-top:18px; display:grid; grid-template-columns:1fr 1fr 1fr; gap:18px; align-items:end; font-size:10px; }
    .signBox{ min-height:88px; display:flex; flex-direction:column; align-items:center; text-align:center; justify-content:flex-end; }
    .signTop{ width:100%; min-height:44px; display:flex; align-items:flex-end; justify-content:center; text-align:center; font-weight:400; padding:0 4px 2px; box-sizing:border-box; }
    .signTop img{ max-width:118px; max-height:42px; object-fit:contain; display:block; }
    .signLine{ width:100%; border-top:1px solid #111; height:0; margin:0; }
    .signRole{ width:100%; padding-top:4px; font-weight:400; text-align:center; }
    .historyFilters{ display:grid; grid-template-columns:repeat(4, minmax(185px,1fr)); gap:10px; align-items:end; margin-bottom:10px; overflow:visible; }
    .historyFilters label{ min-width:0; overflow:visible; }
    .historyFilters input{ min-width:0; width:100%; box-sizing:border-box; height:30px; padding:6px 9px; }
    .historyFilters input[type="date"]{ min-width:170px; padding-right:6px; }
    .historyActions{ display:flex; gap:8px; align-items:end; justify-content:flex-start; min-height:30px; }
    .historyTotalsGrid{ margin:4px 0 10px; display:grid; grid-template-columns: repeat(5, minmax(150px, 1fr)); gap:8px; align-items:end; font-size:12px; font-weight:400; color:#0b2d4d; }
    .historyTotalBox{ display:grid; grid-template-columns:1fr; gap:3px; }
    .historyTotalBox .amount{ border:1px solid var(--grid); background:#fff; padding:6px 10px; min-width:0; text-align:right; color:#111; font-weight:400; }
    .historyTableWrap{ width:100%; overflow-x:hidden; }
    .historyTable{ width:100%; min-width:0; table-layout:fixed; border-collapse:collapse; font-size:10px; }
    .historyTable th, .historyTable td{ border:1px solid var(--grid); padding:3px 3px; vertical-align:middle; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .historyTable th{ background:#fff; color:#0b2d4d; font-weight:400; }
    .historyTable .col-fecha{ width:8.5%; }
    .historyTable .col-liq{ width:6%; }
    .historyTable .col-prov{ width:9%; }
    .historyTable .col-sec{ width:5.5%; }
    .historyTable .col-rec{ width:7.5%; }
    .historyTable .col-emp{ width:7.5%; }
    .historyTable .col-rend{ width:5.5%; }
    .historyTable .col-dif{ width:7.5%; }
    .historyTable .col-planta{ width:7%; }
    .historyTable .col-ctrlv{ width:7%; }
    .historyTable .col-fuera{ width:7.5%; }
    .historyTable .col-ctrl{ width:8%; }
    .historyTable .col-acciones{ width:10%; }
    .historyTable .actionsCell{ display:flex; gap:3px; justify-content:center; align-items:center; }
    .historyTable .btn{ padding:3px 4px; font-size:9px; line-height:1.1; }
    .historyExportActions{ display:flex; gap:8px; align-items:center; justify-content:flex-end; margin:8px 0 8px; flex-wrap:wrap; }
    @media(max-width:900px){ .historyTableWrap{ overflow-x:auto; } .historyTable{ min-width:980px; } }

    .payCopyStrip{ margin-top:8px; border:1px solid var(--grid); background:#f8fafc; display:grid; grid-template-columns:repeat(3, minmax(130px,1fr)) auto; gap:8px; align-items:center; padding:7px 8px; font-size:12px; }
    .payCopyItem{ background:#ffffff; border:1px solid var(--grid); padding:6px 8px; font-weight:400; color:#0b2d4d; text-align:center; white-space:nowrap; }
    .payCopyBtn{ background:#10b981 !important; color:#ffffff !important; border-color:#059669 !important; min-width:140px; }
    @media(max-width:900px){ .payCopyStrip{ grid-template-columns:1fr; } .payCopyBtn{ width:100%; } }
    .precioBox{ display:inline-block; width:auto; max-width:100%; }
    .precioHeaderAbove{ display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:6px; width:100%; }
    @media(max-width:900px){ .historyFilters{ grid-template-columns:1fr; } .historyFilters input[type="date"]{ min-width:0; } .historyTotalsGrid{ grid-template-columns:1fr; } .signArea{ gap:8px; } .logoBox{ width:120px; } }

  </style>


  <style id="slm-final-header-fix">
    .autoBadge{ display:none !important; }

    .brand img,
    .brandLogo,
    .topbar img,
    header img[src*="logo_pdf_blanco"],
    img[src*="logo_pdf_blanco.png"]{
      width:78px !important;
      max-width:78px !important;
      height:auto !important;
      max-height:58px !important;
      object-fit:contain !important;
      display:block !important;
    }

    .brand{
      gap:18px !important;
      min-height:58px !important;
      align-items:center !important;
    }

    .topbar{
      min-height:64px !important;
      padding-top:6px !important;
      padding-bottom:6px !important;
    }

    @media(max-width:700px){
      .brand img,
      .brandLogo,
      .topbar img,
      header img[src*="logo_pdf_blanco"],
      img[src*="logo_pdf_blanco.png"]{
        width:64px !important;
        max-width:64px !important;
        max-height:48px !important;
      }
      .brand{ gap:12px !important; min-height:52px !important; }
      .topbar{ min-height:56px !important; }
    }
  </style>


  <style id="slm-toast-2s-fix">
    .toast{ animation: slmToastIn .16s ease-out both; }
    @keyframes slmToastIn{
      from{ opacity:0; transform:translateX(-50%) translateY(8px); }
      to{ opacity:1; transform:translateX(-50%) translateY(0); }
    }
  </style>


  <style id="slm-auto-fields-normal-weight">
    input[readonly],
    input:disabled,
    .autoField,
    .autoInput,
    .readonlyField,
    .readonlyInput,
    .field-auto,
    .input-auto{
      font-weight:400 !important;
      letter-spacing:normal !important;
      text-transform:none !important;
    }

    input[readonly]::placeholder,
    input:disabled::placeholder{
      font-weight:400 !important;
    }
  </style>


  <style id="slm-historial-cleanup">
    .historyTotalsGrid,
    .historyTotalBox,
    .historyExportActions{
      display:none !important;
    }

    .historyTable .col-dif,
    .historyTable .col-planta,
    .historyTable .col-ctrlv,
    .historyTable .col-fuera,
    .historyTable th.col-dif,
    .historyTable th.col-planta,
    .historyTable th.col-ctrlv,
    .historyTable th.col-fuera,
    .historyTable td.col-dif,
    .historyTable td.col-planta,
    .historyTable td.col-ctrlv,
    .historyTable td.col-fuera{
      display:none !important;
    }
  </style>


  <style id="slm-logo-header-restore">
    .top .brand img,
    .topbar .brand img,
    .brand img[src*="logo_pdf_blanco"],
    .brand img[src*="logo"]{
      width:86px !important;
      max-width:86px !important;
      height:auto !important;
      max-height:62px !important;
      object-fit:contain !important;
      display:block !important;
      flex:0 0 auto !important;
      background:transparent !important;
    }
    .top .brand{
      display:flex !important;
      align-items:center !important;
      gap:16px !important;
      min-height:66px !important;
    }
    .topbar{ min-height:72px !important; }
    @media(max-width:700px){
      .top .brand img,
      .topbar .brand img,
      .brand img[src*="logo_pdf_blanco"],
      .brand img[src*="logo"]{
        width:68px !important;
        max-width:68px !important;
        max-height:50px !important;
      }
      .top .brand{ gap:10px !important; min-height:58px !important; }
      .topbar{ min-height:62px !important; }
    }
  </style>


  <style id="slm-theme-black-gray-navy-olive">
    :root{
      --navy:#0b1f3a;
      --teal:#556b2f;
      --soft:#f3f4f6;
      --card:#ffffff;
      --grid:#c9ced6;
      --grid2:#6b7280;
      --bg:#f3f4f6;
      --muted:#5f6673;
      --text-main:#111827;
      --black:#0b0f14;
      --dark-gray:#2f343a;
      --mid-gray:#4b5563;
      --light-gray:#e5e7eb;
      --white:#ffffff;
      --olive:#556b2f;
      --olive-dark:#3f5122;
      --olive-soft:#dfe7cf;
      --accent-navy:#0b1f3a;
      --accent-blue:#1f4e79;
    }

    body{
      background:linear-gradient(180deg,#f8fafc 0%, #e5e7eb 100%) !important;
      color:var(--text-main) !important;
    }

    .top{
      background:linear-gradient(90deg,#0b0f14 0%, #2f343a 38%, #0b1f3a 72%, #556b2f 100%) !important;
      border-bottom:1px solid #556b2f !important;
      box-shadow:0 3px 14px rgba(0,0,0,.24) !important;
    }

    .brand .t,
    .brand .s{
      color:#ffffff !important;
    }

    .tabs{
      border-bottom-color:#c9ced6 !important;
    }

    .tab{
      background:#e5e7eb !important;
      color:#111827 !important;
      border-color:#c9ced6 !important;
    }

    .tab.active{
      background:#ffffff !important;
      color:#0b1f3a !important;
      border-color:#6b7280 !important;
      border-top:2px solid #556b2f !important;
    }

    .card{
      background:#ffffff !important;
      border:1px solid #c9ced6 !important;
      box-shadow:0 4px 14px rgba(17,24,39,.08) !important;
    }

    .h,
    .historyTotalBox,
    .historyTable th,
    .payCopyItem,
    select,
    .btn,
    .auth-title,
    .auth-logout{
      color:#0b1f3a !important;
    }

    .muted,
    label,
    .peso-unit,
    .talla-dup,
    .auth-sub,
    .auth-allowed{
      color:#5f6673 !important;
    }

    input,
    select,
    textarea{
      background:#ffffff !important;
      border-color:#c9ced6 !important;
      color:#111827 !important;
    }

    input:focus,
    select:focus,
    .auth-form input:focus{
      border-color:#556b2f !important;
      box-shadow:0 0 0 3px rgba(85,107,47,.18) !important;
    }

    input[readonly],
    input:disabled{
      background:#f3f4f6 !important;
      color:#111827 !important;
      opacity:1 !important;
      font-weight:400 !important;
    }

    th{
      background:#e5e7eb !important;
      color:#0b1f3a !important;
    }

    th,
    td{
      border-color:#c9ced6 !important;
    }

    .btn{
      background:#ffffff !important;
      border:1px solid #6b7280 !important;
      color:#111827 !important;
    }

    .btn:hover{
      background:#e5e7eb !important;
    }

    .btnSave,
    .payCopyBtn{
      background:#556b2f !important;
      border-color:#3f5122 !important;
      color:#ffffff !important;
    }

    .btnSave:hover,
    .payCopyBtn:hover{
      background:#3f5122 !important;

  <!-- Firebase (Auth) - SDK modular (CDN) -->
  <script type="module">
    // ========= 1) CONFIGURACIÓN =========
    // For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyCMoLkSnnLowMagRNL7O6ttPo1FXd1URac",
  authDomain: "oceantreasure-app.firebaseapp.com",
  projectId: "oceantreasure-app",
  storageBucket: "oceantreasure-app.firebasestorage.app",
  messagingSenderId: "553014659258",
  appId: "1:553014659258:web:cfc30844a88433b7b79a83",
  measurementId: "G-HMMQKJY8NJ"
};

    // Usuarios permitidos y administrador
    const ADMIN_EMAIL = "jeffersonfigueroa@oceantreasure.local";
    const ACCOUNTING_EMAILS = [
      "ericktorres@oceantreasure.local",
      "ceciliamorocho@oceantreasure.local",
      "lisbethmurillo@oceantreasure.local"
    ];
    const ALLOWED_EMAILS = [
      "wintermontiel@oceantreasure.local",
      "juangavilanez@oceantreasure.local",
      ...ACCOUNTING_EMAILS,
      ADMIN_EMAIL
    ];
    const isAllowedEmail = (email) => ALLOWED_EMAILS.includes(String(email || "").trim().toLowerCase());
    const isAdminEmail = (email) => String(email || "").trim().toLowerCase() === ADMIN_EMAIL;
    const isAccountingEmail = (email) => ACCOUNTING_EMAILS.includes(String(email || "").trim().toLowerCase());
    const IS_PUBLIC_VERIFY = new URLSearchParams(window.location.search).has("verify");

    // ========= 2) IMPORTS =========
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import {
      getAuth,
      setPersistence,
      browserLocalPersistence,
      browserSessionPersistence,
      onAuthStateChanged,
      signInWithEmailAndPassword,
      signOut
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
    import {
      getFirestore, collection, addDoc, getDocs, getDoc, setDoc, query, where, orderBy, limit, deleteDoc, doc, updateDoc, serverTimestamp, runTransaction
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
    import {
      getStorage, ref as storageRef, uploadBytes, getDownloadURL
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-storage.js";

    // ========= 3) UI =========
    const gate = document.getElementById("authGate");
    const form = document.getElementById("loginForm");
    const emailEl = document.getElementById("loginEmail");
    const passEl = document.getElementById("loginPassword");
    const errEl  = document.getElementById("loginError");
    const btnEl  = document.getElementById("loginBtn");
    const togEl  = document.getElementById("togglePass");
    const logoutBtn = document.getElementById("logoutBtn");

    // Usuario editable: solo permite correos autorizados al iniciar sesión
    emailEl.value = "";
    emailEl.readOnly = false;

    const showError = (msg) => { errEl.textContent = msg || ""; };
    const setLoading = (on) => {
      btnEl.disabled = !!on;
      btnEl.textContent = on ? "Ingresando..." : "Ingresar";
    };

    togEl.addEventListener("click", () => {
      passEl.type = (passEl.type === "password") ? "text" : "password";
    });

    // ========= 4) INIT =========
    const isPlaceholder = (v) => (typeof v === "string" && v.startsWith("PEGA_AQUI"));
    if (isPlaceholder(firebaseConfig.apiKey) || isPlaceholder(firebaseConfig.authDomain) || isPlaceholder(firebaseConfig.projectId) || isPlaceholder(firebaseConfig.appId)){
      showError("Falta pegar tu firebaseConfig en el HTML (Project settings → Your apps → Config).");
      // no inicializamos Firebase para evitar errores
    } else {
      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const db = getFirestore(app);
      const storage = getStorage(app);

      // Servicios disponibles para la app React (guardar historial en Firestore y PDF digital en Storage)
      window.SLP_FIREBASE = { db, storage, storageBucket: firebaseConfig.storageBucket, collection, addDoc, getDocs, getDoc, setDoc, query, where, orderBy, limit, deleteDoc, doc, updateDoc, serverTimestamp, runTransaction, storageRef, uploadBytes, getDownloadURL };

      // ========= SLM OFFLINE/SYNC: cola local para zonas con internet débil =========
      const SLM_OFFLINE_QUEUE_KEY = "SLM_OFFLINE_WRITES_V1";
      const SLM_LAST_SYNC_KEY = "SLM_LAST_SYNC_LABEL";
      const slmNowLabel = () => new Date().toLocaleString("es-EC", { hour12:false });
      const slmReadQueue = () => {
        try { return JSON.parse(localStorage.getItem(SLM_OFFLINE_QUEUE_KEY) || "[]"); }
        catch(_) { return []; }
      };
      const slmWriteQueue = (items) => {
        try { localStorage.setItem(SLM_OFFLINE_QUEUE_KEY, JSON.stringify(Array.isArray(items) ? items : [])); } catch(_) {}
        window.SLM_UPDATE_NET_BANNER && window.SLM_UPDATE_NET_BANNER();
      };
      const slmSafeClone = (value) => {
        if (value === undefined) return null;
        if (value === null) return null;
        if (value instanceof Date) return { __slmDate: value.toISOString() };
        if (Array.isArray(value)) return value.map(slmSafeClone);
        if (typeof value === "object") {
          // Evita guardar objetos internos de Firebase FieldValue en localStorage.
          if (String(value.constructor?.name || "").includes("FieldValue")) return { __slmServerTimestamp: true };
          const out = {};
          Object.entries(value).forEach(([k,v]) => {
            if (v === undefined) return;
            if ((k === "createdAt" || k === "updatedAt") && typeof v === "object") out[k] = { __slmServerTimestamp: true };
            else out[k] = slmSafeClone(v);
          });
          return out;
        }
        return value;
      };
      const slmRestorePayload = (value) => {
        if (Array.isArray(value)) return value.map(slmRestorePayload);
        if (value && typeof value === "object") {
          if (value.__slmServerTimestamp) return serverTimestamp();
          if (value.__slmDate) return new Date(value.__slmDate);
          const out = {};
          Object.entries(value).forEach(([k,v]) => out[k] = slmRestorePayload(v));
          return out;
        }
        return value;
      };
      const slmQueueWrite = (item) => {
        const q = slmReadQueue();
        q.push({
          id: item.id || `slm_queue_${Date.now()}_${Math.random().toString(36).slice(2,8)}`,
          collectionName: item.collectionName || "slp_liquidaciones_pago",
          docId: item.docId || "",
          op: item.op || "setDoc",
          numero: item.numero || "",
          queuedAt: new Date().toISOString(),
          payload: slmSafeClone(item.payload || {})
        });
        window.__SLM_MANUAL_SYNC_NEEDED = false;
        slmWriteQueue(q);
        return q.length;
      };
      const slmSetBannerState = (mode, text) => {
        const banner = document.getElementById("slmNetBanner");
        const label = document.getElementById("slmNetText");
        const pending = document.getElementById("slmNetPending");
        if (!banner || !label || !pending) return;
        const q = slmReadQueue();

        banner.classList.remove("online","offline","pending");
        banner.classList.add(mode);
        if (window.__SLM_MANUAL_SYNC_NEEDED && window.SLM_IS_ONLINE && window.SLM_IS_ONLINE() && q.length) banner.classList.add("manualSyncNeeded");
        else banner.classList.remove("manualSyncNeeded");
        label.textContent = text;
        pending.textContent = `Pendientes: ${q.length}`;

        const headerBadge = document.getElementById("slmHeaderNetStatus");
        if (headerBadge) {
          const badgeMode = (!window.SLM_IS_ONLINE || !window.SLM_IS_ONLINE()) ? "offline" : (q.length ? "pending" : "online");
          headerBadge.classList.remove("online","offline","pending");
          headerBadge.classList.add(badgeMode);
          const badgeText = headerBadge.querySelector("span:last-child");
          if (badgeText) badgeText.textContent = badgeMode === "offline" ? "OffLine" : "OnLine";
          headerBadge.title = badgeMode === "offline" ? "Sin conexión a internet" : (q.length ? `Online con ${q.length} pendiente(s) por sincronizar` : "Con conexión a internet");
        }

        const isOnlineClean = (mode === "online" && q.length === 0);
        const isSyncComplete = isOnlineClean && /Sincronización completa/i.test(String(text || ""));
        const lastMode = window.__SLM_LAST_NET_MODE || "";
        const comingBackOnline = isOnlineClean && lastMode === "offline";

        clearTimeout(window.__slmNetHideTimer);

        if (mode === "offline") {
          window.__SLM_ONLINE_NOTICE_SHOWN = false;
          banner.style.display = "flex";
        } else if (mode === "pending" || q.length > 0) {
          banner.style.display = "flex";
        } else if (isSyncComplete || comingBackOnline || !window.__SLM_ONLINE_NOTICE_SHOWN) {
          // Online limpio: se muestra una sola vez y luego queda oculto mientras siga online.
          banner.style.display = "flex";
          window.__SLM_ONLINE_NOTICE_SHOWN = true;
          window.__slmNetHideTimer = setTimeout(()=>{ banner.style.display = "none"; }, 2500);
        } else {
          banner.style.display = "none";
        }

        window.__SLM_LAST_NET_MODE = mode;
      };
      window.SLM_IS_ONLINE = () => navigator.onLine !== false;
      window.SLM_QUEUE_FIRESTORE_WRITE = slmQueueWrite;
      window.SLM_QUEUE_COUNT = () => slmReadQueue().length;
      window.__SLM_MANUAL_SYNC_NEEDED = false;
      window.SLM_UPDATE_NET_BANNER = () => {
        const q = slmReadQueue();
        if (!window.SLM_IS_ONLINE()) slmSetBannerState("offline", q.length ? "SIN INTERNET. Los cambios quedan guardados en este teléfono hasta sincronizar." : "SIN INTERNET. Evita salir sin guardar; el sistema puede guardar localmente.");
        else if (q.length) slmSetBannerState("pending", window.__SLM_MANUAL_SYNC_NEEDED ? "Hay cambios pendientes. Usa SINCRONIZAR si la conexión ya está estable." : "Con internet. Sincronización automática pendiente/en proceso.");
        else slmSetBannerState("online", "Con conexión. Datos listos para guardar.");
      };
      window.SLM_SYNC_PENDING_WRITES = async () => {
        if (!window.SLM_IS_ONLINE()) { window.SLM_UPDATE_NET_BANNER(); return { ok:false, pending: slmReadQueue().length }; }
        let q = slmReadQueue();
        if (!q.length) { window.__SLM_MANUAL_SYNC_NEEDED = false; window.SLM_UPDATE_NET_BANNER(); return { ok:true, pending:0 }; }
        window.__SLM_MANUAL_SYNC_NEEDED = false;
        slmSetBannerState("pending", "Sincronizando cambios locales con Firestore...");
        const remaining = [];
        for (const item of q) {
          try {
            const payload = slmRestorePayload(item.payload || {});
            const collectionName = item.collectionName || "slp_liquidaciones_pago";
            if (item.op === "updateDoc" && item.docId) {
              await updateDoc(doc(db, collectionName, item.docId), payload);
            } else if (item.docId) {
              await setDoc(doc(db, collectionName, item.docId), payload, { merge:true });
            } else {
              await addDoc(collection(db, collectionName), payload);
            }
            try { localStorage.setItem(SLM_LAST_SYNC_KEY, slmNowLabel()); } catch(_) {}
          } catch(e) {
            console.warn("SLM: no se pudo sincronizar un cambio local, se mantiene pendiente.", e);
            remaining.push(item);
          }
        }
        slmWriteQueue(remaining);
        if (remaining.length) {
          window.__SLM_MANUAL_SYNC_NEEDED = true;
          slmSetBannerState("pending", `No se pudo completar la sincronización automática. Quedan ${remaining.length} cambio(s) pendiente(s).`);
        } else {
          window.__SLM_MANUAL_SYNC_NEEDED = false;
          slmSetBannerState("online", "Sincronización completa. Cambios enviados a Firestore.");
        }
        return { ok: remaining.length === 0, pending: remaining.length };
      };
      window.addEventListener("online", () => { window.SLM_UPDATE_NET_BANNER(); setTimeout(()=>window.SLM_SYNC_PENDING_WRITES && window.SLM_SYNC_PENDING_WRITES(), 1200); });
      window.addEventListener("offline", () => window.SLM_UPDATE_NET_BANNER());
      document.addEventListener("DOMContentLoaded", () => {
        const btn = document.getElementById("slmNetSyncBtn");
        if (btn && !btn.__slmBound) { btn.__slmBound = true; btn.addEventListener("click", ()=>window.SLM_SYNC_PENDING_WRITES && window.SLM_SYNC_PENDING_WRITES()); }
        window.SLM_UPDATE_NET_BANNER();
      });
      setTimeout(()=>{ window.SLM_UPDATE_NET_BANNER(); if (navigator.onLine !== false) window.SLM_SYNC_PENDING_WRITES(); }, 1800);
      setInterval(()=>{ window.SLM_UPDATE_NET_BANNER && window.SLM_UPDATE_NET_BANNER(); }, 5000);


      // Persistencia permanente: mantiene la sesión aunque se cierre navegador o APK.
      // Solo se cerrará cuando el usuario presione el botón "Salir".
      try {
        await setPersistence(auth, browserLocalPersistence);
      } catch(e) {
        console.warn("No se pudo activar persistencia local; usando persistencia por sesión.", e);
        await setPersistence(auth, browserSessionPersistence);
      }

      // Exponemos un logout simple para el botón "Salir"
      logoutBtn.addEventListener("click", async () => {
        try { await signOut(auth); } catch(e){}
      });

      onAuthStateChanged(auth, async (user) => {
        if (IS_PUBLIC_VERIFY) {
          gate.style.display = "none";
          logoutBtn.style.display = "none";
          showError("");
          return;
        }

        if (user && isAllowedEmail(user.email)) {
          window.SLM_AUTH_USER = String(user.email || "").toLowerCase();
          window.SLM_IS_ADMIN = isAdminEmail(user.email);
          window.SLM_IS_ACCOUNTING = isAccountingEmail(user.email);
          gate.style.display = "none";
          logoutBtn.style.display = "inline-flex";
          showError("");
        } else {
          window.SLM_AUTH_USER = "";
          window.SLM_IS_ADMIN = false;
          window.SLM_IS_ACCOUNTING = false;
          logoutBtn.style.display = "none";
          gate.style.display = "flex";
          if (user) {
            await signOut(auth);
          }
        }
      });

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        showError("");
        setLoading(true);

        const email = (emailEl.value || "").trim().toLowerCase();
        const pass  = passEl.value || "";

        if (!isAllowedEmail(email)) {
          setLoading(false);
          showError("Este usuario no está autorizado para esta página.");
          return;
        }
        if (!pass) {
          setLoading(false);
          showError("Ingresa la contraseña.");
          return;
        }

        try{
          const cred = await signInWithEmailAndPassword(auth, email, pass);
          if (!isAllowedEmail(cred?.user?.email)) {
            await signOut(auth);
            showError("Este usuario no está autorizado para esta página.");
          }
        }catch(err){
          const code = err?.code || "";
          if (code.includes("auth/invalid-credential") || code.includes("auth/wrong-password")) {
            showError("Usuario o contraseña incorrectos.");
          } else if (code.includes("auth/too-many-requests")) {
            showError("Demasiados intentos. Espera un momento y vuelve a intentar.");
          } else if (code.includes("auth/user-not-found")) {
            showError("El usuario no existe en Firebase Authentication.");
          } else {
            showError("No se pudo iniciar sesión. Revisa configuración y dominios autorizados.");
            console.error(err);
          }
        }finally{
          setLoading(false);
          passEl.focus();
        }
      });
    }
  </script>

    function precioBDesdeA(a){
      const n = Number(a);
      if (!Number.isFinite(n)) return 0;
      // Clase B siempre es 0,30 menos que Clase A.
      return Math.round((n - 0.30) * 100) / 100;
    }

    function buildDefaultPrices(){
      const out = {};
      for (const t of ALL_TALLAS){
        const base = DEFAULT_PRICES[t] || {};
        const A = base.A ?? (TALLAS_A_B.includes(t) ? 0 : undefined);
        const B = TALLAS_A_B.includes(t) ? precioBDesdeA(A ?? 0) : undefined;
        const C = base.C ?? (TALLAS_C.includes(t) ? 0 : undefined);
        out[t] = { A, B, C };
      }
      return out;
    }

    function normalizarPreciosGlobal(src){
      const defaults = buildDefaultPrices();
      const out = {};
      for (const t of ALL_TALLAS){
        const base = defaults[t] || {};
        const item = (src && typeof src === "object" && src[t] && typeof src[t] === "object") ? src[t] : {};
        const val = (key) => {
          const n = Number(item[key]);
          if (Number.isFinite(n)) return Math.round(n * 100) / 100;
          const d = Number(base[key]);
          return Number.isFinite(d) ? Math.round(d * 100) / 100 : 0;
        };

        if (TALLAS_A_B.includes(t)){
          const A = val("A");
          out[t] = { A, B: precioBDesdeA(A), C: 0 };
        }else{
          out[t] = { A: 0, B: 0, C: val("C") };
        }
      }
      return out;
    }

    function horasEntre(horaInicio, horaFinal){
      const parse = (h) => {
        const parts = String(h || "").split(":").map(x=>Number(x));
        if (parts.length < 2 || !Number.isFinite(parts[0]) || !Number.isFinite(parts[1])) return null;
        return (parts[0] * 60) + parts[1] + ((Number(parts[2]) || 0) / 60);
      };
      const ini = parse(horaInicio);
      const fin = parse(horaFinal);
      if (ini === null || fin === null) return 0;
      let min = fin - ini;
      if (min < 0) min += 24 * 60;
      return min > 0 ? min / 60 : 0;
    }

    function parseNumeroEC(v){

      const normalized = raw.replace(/\s+/g, "").replace(/\./g, "").replace(",", ".");
      const n = Number(normalized);
      return Number.isFinite(n) ? n : 0;
    }

    function formatEmpaqueInfo(emp){
      if (!emp || typeof emp !== "object") return "";
      const parts = [];
      const clean = (v) => String(v || "").trim();
      const cliente = clean(emp.cliente);
      const consignatario = clean(emp.consignatario);
      const marca = clean(emp.marca);
      const ordenCompra = clean(emp.ordenCompra);
      if (cliente) parts.push(cliente);
      if (consignatario && !/^SIN\s+CONSIGNATARIO$/i.test(consignatario)) parts.push(consignatario);
      if (marca && !/^SIN\s+MARCA$/i.test(marca)) parts.push(marca);
      if (ordenCompra && !/^SIN\s+ORDEN/i.test(ordenCompra)) parts.push(ordenCompra);
      return parts.join(" | ");
    }

    function normalizarEmpaque(emp){

    function fmtNumEC(n, decimals=2){
      if (n===null || n===undefined || Number.isNaN(n)) return "";
      const sign = n<0 ? "-" : "";
      const abs = Math.abs(n);
      const fixed = abs.toFixed(decimals);
      const [intPart, decPart] = fixed.split(".");
      const withThousands = intPart.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
      return decimals>0 ? `${sign}${withThousands},${decPart}` : `${sign}${withThousands}`;
    }
    function fmtPctEC(n){
      const valor = Number.isFinite(Number(n)) ? Number(n) : 0;
      return valor.toLocaleString("es-EC", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }
    function toNum(v){
      if (v==="" || v===null || v===undefined) return 0;
      if (typeof v === "string"){
        let txt = v.trim();
        if (!txt) return 0;
        // Permite ingresar decimales con coma o punto.
        // Ej.: 1,65 / 1.65 / 1.234,56
        if (txt.includes(",") && txt.includes(".")) txt = txt.replace(/\./g, "").replace(",", ".");
        else txt = txt.replace(",", ".");
        const n = Number(txt);
        return Number.isFinite(n) ? n : 0;
      }
      const n = Number(v);
      return Number.isFinite(n) ? n : 0;
    }

    function ResizableTable({columns, rows, rowKey, tableClassName}){
      const [widths, setWidths] = useState(() => columns.map(c => c.width || 120));

      useEffect(() => {
        setWidths(columns.map(c => c.width || 120));
      }, [columns.length]);

      const onMouseDown = (idx, e) => {
        e.preventDefault();
        const startX = e.clientX;
        const startW = widths[idx];
        const move = (ev) => {
          const dx = ev.clientX - startX;
          setWidths(w => {
            const next = [...w];
            next[idx] = Math.max(55, startW + dx);
            return next;
          });
        };
        const up = () => {
          window.removeEventListener("mousemove", move);
          window.removeEventListener("mouseup", up);
        };
        window.addEventListener("mousemove", move);
        window.addEventListener("mouseup", up);
      };

      return (
        <div style={{overflow:"auto"}}>
          <table className={tableClassName || ""}>
            <thead>
              <tr>
                {columns.map((c,i)=>(
                  <th key={c.key} style={{width: widths[i]}}>
                    <span style={{display:"inline-block", maxWidth:"100%", overflow:"visible", textOverflow:"clip", whiteSpace:"normal"}}>
                      {c.title}
                    </span>
                    <span className="resize-handle" onMouseDown={(e)=>onMouseDown(i,e)} title="Arrastra para ajustar ancho"></span>
                  </th>
                ))}
              </tr>
            </thead>
            <tbody>
              {rows.map((r,ri)=>(
                <tr key={rowKey ? rowKey(r,ri) : ri}>
                  {columns.map((c,ci)=>(
                    <td key={c.key} style={{width: widths[ci]}} className={c.tdClassName || ""}>
                      {c.render ? c.render(r,ri) : r[c.key]}
                    </td>
                  ))}
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    }

              C: toNum(normalizados[t]?.C)
            };
          }
        }
        return out;
      };

      // Esta tabla es la que realmente se usa para CALCULO, RESUMEN, LIQUIDACION, PDF e HISTORIAL.
      // Si DESTINO $ = CONTROLADOR, aquí baja A $0,20 y B queda A ajustado - $0,30.
      // Si DESTINO $ = PLANTA, aquí se conserva la lista original de PRECIO.
      const preciosAplicados = useMemo(()=>buildPreciosAplicados(prices, dolaresDestino), [prices, dolaresDestino]);

      const precioEfectivoPorDestino = (talla, clase) => toNum(preciosAplicados[talla]?.[clase]);

      const buildBlock = (mode) => {
        const rowsA = [];
        const rowsB = [];
        const rowsC = [];

        for (const row of lineRows){
          const t = row.talla;
          const peso = toNum(row.peso);
          const pesoLb = TALLAS_C.includes(t) ? peso : (peso * LB_PER_KG);
          const sourcePrefix = mode === "inv" ? "inv" : "pay";

          if (TALLAS_A_B.includes(t)){
            const qtyA = toNum(row[`${sourcePrefix}A`]);
            const lbsA = qtyA * pesoLb;
            const priceA = precioEfectivoPorDestino(t, "A");
            rowsA.push({ rowId:row.id, classKey:"A", talla:t, peso, pesoLb, qty:qtyA, lbs:lbsA, price:priceA, dollars:lbsA * priceA, empaque:normalizarEmpaque(row.empaque) });

            const qtyB = toNum(row[`${sourcePrefix}B`]);
            const lbsB = qtyB * pesoLb;
            const priceB = precioEfectivoPorDestino(t, "B");
            rowsB.push({ rowId:row.id, classKey:"B", talla:t, peso, pesoLb, qty:qtyB, lbs:lbsB, price:priceB, dollars:lbsB * priceB, empaque:normalizarEmpaque(row.empaque) });
          }

          if (TALLAS_C.includes(t)){
            const qtyC = toNum(row[`${sourcePrefix}C`]);
            const lbsC = qtyC * pesoLb;
            const priceC = toNum(prices[t]?.C);
            rowsC.push({ rowId:row.id, classKey:"C", talla:t, peso, pesoLb, qty:qtyC, lbs:lbsC, price:priceC, dollars:lbsC * priceC, empaque:normalizarEmpaque(row.empaque) });
          }
        }

        const totals = {
          qtyA: rowsA.reduce((s,r)=>s+r.qty,0), lbsA: rowsA.reduce((s,r)=>s+r.lbs,0), dollarsA: rowsA.reduce((s,r)=>s+r.dollars,0),
          qtyB: rowsB.reduce((s,r)=>s+r.qty,0), lbsB: rowsB.reduce((s,r)=>s+r.lbs,0), dollarsB: rowsB.reduce((s,r)=>s+r.dollars,0),
          qtyC: rowsC.reduce((s,r)=>s+r.qty,0), lbsC: rowsC.reduce((s,r)=>s+r.lbs,0), dollarsC: rowsC.reduce((s,r)=>s+r.dollars,0),
        };
        const grand = { qty: totals.qtyA+totals.qtyB+totals.qtyC, lbs: totals.lbsA+totals.lbsB+totals.lbsC, dollars: totals.dollarsA+totals.dollarsB+totals.dollarsC };
        return { rowsA, rowsB, rowsC, totals, grand };
      };

      const calcInv = useMemo(()=>buildBlock("inv"), [lineRows, preciosAplicados]);
      const calcPay = useMemo(()=>buildBlock("inv"), [lineRows, preciosAplicados]);

      const empacado = useMemo(()=>calcPay.grand.lbs, [calcPay.grand.lbs]);
      const rendimiento = useMemo(()=> (recibido!==0 ? empacado/recibido : 0), [empacado, recibido]);
      const librasHora = useMemo(()=>{
        const horas = horasEntre(horaInicio, horaFinal);
        return horas > 0 ? toNum(empacado) / horas : 0;
      }, [horaInicio, horaFinal, empacado]);


      const diffLbs = useMemo(()=>calcInv.grand.lbs - calcPay.grand.lbs, [calcInv.grand.lbs, calcPay.grand.lbs]);
      const diffDollars = useMemo(()=>calcInv.grand.dollars - calcPay.grand.dollars, [calcInv.grand.dollars, calcPay.grand.dollars]);
      const distribucionDolares = useMemo(()=>{
        const total = toNum(diffDollars);

        // DESTINO $CONTROLADOR:
        // con precios ajustados, reparte el valor: 75% a $PLANTA y 25% a $CONTROLADOR.
        if (dolaresDestino === "CONTROLADOR"){
          return { destino:"CONTROLADOR", planta: total * 0.75, controlador: total * 0.25, porFuera: 0, botonOro: total * 0.75 };
        }

        // DESTINO $PLANTA:
        // no se reparte con controlador; el 100% queda como $POR FUERA en historial.
        return { destino:"PLANTA", planta: 0, controlador: 0, porFuera: total, botonOro: total };
      }, [diffDollars, dolaresDestino]);

      // ---- Tabla de control: Gramo Entero / Gramo Cola / Talla Cola (como en Excel DATOS!M13:M15) ----
      // Q32 = SUM(Q2:Q25) = sumatoria de (lbs de A y B) * (454 / tallaPromedio)
      const gramosColaTotal = useMemo(()=>{
        let sum = 0;
        // Clase A
        for (const r of calcPay.rowsA){
          const mid = TALLA_MID[r.talla];
          if (!mid) continue;
          sum += toNum(r.lbs) * (454 / mid);
        }
        // Clase B
        for (const r of calcPay.rowsB){
          const mid = TALLA_MID[r.talla];
          if (!mid) continue;
          sum += toNum(r.lbs) * (454 / mid);
        }
        return sum;
      }, [calcPay.rowsA, calcPay.rowsB]);

      // M14 = Q32 / L32  (L32 incluye también Clase C, tal como está armado en el Excel)
      const gramoCola = useMemo(()=>{
        const denom = toNum(calcPay.grand.lbs);
        if (denom===0) return null;
        return gramosColaTotal / denom;
      }, [gramosColaTotal, calcPay.grand.lbs]);

      // M13 = M14 / 0.66
      const gramoEntero = useMemo(()=>{
        if (gramoCola===null) return null;
        return gramoCola / 0.66;
      }, [gramoCola]);

      // M15 = 454 / M14
      const tallaCola = useMemo(()=>{
        if (!gramoCola || gramoCola===0) return null;
        return 454 / gramoCola;
      }, [gramoCola]);


      const getNextLiquidacionSeq = async () => {
        const fb = window.SLP_FIREBASE;
        if (!fb?.db) return liquidacionSeqFromNo(liquidacionNo) || 1;
        try{
          const q = fb.query(
            fb.collection(fb.db, "slp_liquidaciones_pago"),
            fb.orderBy("liquidacionSeq", "desc"),
            fb.limit(1)
          );
          const snapDocs = await fb.getDocs(q);
          if (snapDocs.empty) return 1;
          const last = snapDocs.docs[0].data();
          const lastSeq = Number(last.liquidacionSeq || liquidacionSeqFromNo(last.liquidacionNo));
          return (Number.isFinite(lastSeq) ? Math.trunc(lastSeq) : 0) + 1;
        }catch(err){
          console.warn("No se pudo consultar el último N° de liquidación.", err);
          return liquidacionSeqFromNo(liquidacionNo) || 1;
        }
      };

      const cargarSiguienteLiquidacionNo = async () => {
        const nextSeq = await getNextLiquidacionSeq();
        setLiquidacionNo(formatLiquidacionNo(nextSeq));
        return nextSeq;
      };

      useEffect(()=>{
        const t1 = setTimeout(()=>{ cargarSiguienteLiquidacionNo(); }, 450);
        const t2 = setTimeout(()=>{ cargarSiguienteLiquidacionNo(); }, 1500);
        return ()=>{ clearTimeout(t1); clearTimeout(t2); };
      }, []);

      const liquidacionData = useMemo(()=>{
        const a = calcPay.rowsA.filter(r=>r.qty!==0 || r.lbs!==0);
        const b = calcPay.rowsB.filter(r=>r.qty!==0 || r.lbs!==0);
        const c = calcPay.rowsC.filter(r=>r.qty!==0 || r.lbs!==0);

        const subtotal = (rows)=>({ qty: rows.reduce((s,r)=>s+r.qty,0), lbs: rows.reduce((s,r)=>s+r.lbs,0) });

        return {
          header: { liquidacionNo, liquidacionSeq: liquidacionSeqFromNo(liquidacionNo), fechaCreacion, librasProgramadas, proveedor, secuencial, lote, controlador, liquidador, gerenteProduccion:"Jefferson Figueroa Rosales", piscina, guia, planta, basura, horaInicio, horaFinal, librasHora, recibido, empacado, rendimiento, dolaresDestino, estatusTabla, dolaresPlanta:distribucionDolares.planta, dolaresControlador:distribucionDolares.controlador, dolaresPorFuera:distribucionDolares.porFuera, botonOro:distribucionDolares.botonOro },
          classA: { rows: a, sub: subtotal(a) },
          classB: { rows: b, sub: subtotal(b) },
          classC: { rows: c, sub: subtotal(c) },
          totals: subtotal([...a,...b,...c])
        };
      }, [calcPay, liquidacionNo, fechaCreacion, librasProgramadas, proveedor, secuencial, lote, controlador, liquidador, piscina, guia, planta, basura, recibido, empacado, rendimiento, dolaresDestino, distribucionDolares, estatusTabla]);

      const snap = liquidacionSnap || liquidacionData;

      const usuarioDesdeEmail = (email) => {
        const raw = String(email || "").trim().toLowerCase();
        if (!raw) return "";
        return raw.replace("@oceantreasure.local", "").toUpperCase();
      };

      const usuarioLogueadoTexto = () => {
        return usuarioDesdeEmail(window.SLM_AUTH_USER);
      };


      const emailActual = () => {
        return String(window.SLM_AUTH_USER || "").trim().toLowerCase();
      };

      const creadorLiquidacion = (item=null) => {
        const src = item || liquidacionSnap || historialDocDataRef.current || {};
        const h = src.header || {};
        return String(
          src.createdByEmail ||
          src.creadoPorEmail ||
          src.usuarioCreacion ||
          src.creadoPor ||
          h.createdByEmail ||
          h.creadoPorEmail ||
          h.usuarioCreacion ||
          h.creadoPor ||
          h.liquidadorEmail ||
          ""
        ).trim().toLowerCase();
      };

      const creadorNombreLiquidacion = (item=null) => {
        const src = item || liquidacionSnap || historialDocDataRef.current || {};
        const h = src.header || {};
        return String(
          src.createdByName ||
          h.createdByName ||
          src.creadoPorNombre ||
          h.creadoPorNombre ||
          src.usuarioCreador ||
          h.usuarioCreador ||
          src.userName ||
          h.userName ||
          src.liquidador ||
          h.liquidador ||
          ""
        ).trim().toUpperCase();
      };

      const nombreCreadorLiquidacion = (item=null) => {
        const src = item || liquidacionSnap || historialDocDataRef.current || {};
        const h = src.header || {};
        const nombreGuardado = String(
          src.createdByName ||
          h.createdByName ||
          src.creadoPorNombre ||
          h.creadoPorNombre ||
          ""
        ).trim();
        if (nombreGuardado) return nombreGuardado.toUpperCase();

        const emailCreador = creadorLiquidacion(src);
        const nombreDesdeEmail = usuarioDesdeEmail(emailCreador);
        if (nombreDesdeEmail) return nombreDesdeEmail;

        // Compatibilidad con liquidaciones antiguas que no tenían createdByName/createdByEmail.
        return String(h.liquidador || src.liquidador || "").trim().toUpperCase();
      };

      const liquidadorActualDeLiquidacion = (item=null) => {
        return nombreCreadorLiquidacion(item) || usuarioLogueadoTexto() || String(liquidador || "").trim().toUpperCase();
      };

      const puedeModificarLiquidacion = (item=null) => {
        const actual = emailActual();
        if (!actual) return false;
        if (actual === ADMIN_EMAIL) return true;

        const creadorEmail = creadorLiquidacion(item);
        if (creadorEmail) return actual === creadorEmail;

        // Refuerzo de privacidad para registros antiguos que no tengan createdByEmail:
        // se compara el nombre del liquidador/creador contra el usuario logueado.
        const usuarioActual = usuarioLogueadoTexto();
        const creadorNombre = creadorNombreLiquidacion(item);
        if (usuarioActual && creadorNombre) return creadorNombre === usuarioActual;

        // Si no se puede identificar creador, solo administrador puede modificar/eliminar.
        return false;
      };

      const formatLoteSCRM = (v) => {
        const raw = String(v || "").trim().toUpperCase();
        if(!raw) return "";
        const m = raw.match(/^(.+?)\s*-\s*(\d{2})(\d{2})(\d{2,4})$/);
        if(m){
          const year = m[4].length === 2 ? "20" + m[4] : m[4];
          return m[1].trim() + " - " + m[2] + "/" + m[3] + "/" + year;
        }
        return raw.replace(/\s+-\s+/g," - ");
      };

      const normalizarTextoBusqueda = (v) => String(v || "").trim().toUpperCase().replace(/\s+/g," ");

      const buscarSCRMporSecuencial = async (secValor) => {
        const sec = Number(String(secValor || "").replace(/\D/g, ""));
        if (!sec || !Number.isFinite(sec)) return null;
        const fb = window.SLP_FIREBASE;
        if (!fb?.db || !fb?.where || !fb?.getDocs) return null;

        const q = fb.query(
          fb.collection(fb.db, "scrm_recepcion"),
          fb.where("secuencial", "==", sec),
          fb.limit(1)
        );
        const snapDocs = await fb.getDocs(q);
        if (snapDocs.empty) return null;
        const d = snapDocs.docs[0];
        return { id:d.id, ...d.data() };
      };

      const buscarLoteCalidadPorAnalisis = async (analisisValor) => {
        const analisis = normalizarTextoBusqueda(analisisValor);
        if (!analisis) return null;
        const fb = window.SLP_FIREBASE;
        if (!fb?.db || !fb?.where || !fb?.getDocs) return null;

        const q = fb.query(
          fb.collection(fb.db, "scrm_lotes_calidad"),
          fb.where("analisis", "==", analisis),
          fb.limit(1)
        );
        const snapDocs = await fb.getDocs(q);
        if (snapDocs.empty) return null;
        const d = snapDocs.docs[0];
        return { id:d.id, ...d.data() };
      };

      const buscarLoteCalidadPorLoteGenerado = async (loteValor) => {
        const lote = formatLoteSCRM(loteValor);
        if (!lote) return null;
        const fb = window.SLP_FIREBASE;
        if (!fb?.db || !fb?.where || !fb?.getDocs) return null;

        const q = fb.query(
          fb.collection(fb.db, "scrm_lotes_calidad"),
          fb.where("lote", "==", lote),
          fb.limit(1)
        );
        const snapDocs = await fb.getDocs(q);
        if (snapDocs.empty) return null;
        const d = snapDocs.docs[0];
        return { id:d.id, ...d.data() };
      };

      const buscarSCRMporLoteGenerado = async (loteValor) => {
        const lote = formatLoteSCRM(loteValor);
        if (!lote) return null;
        const fb = window.SLP_FIREBASE;
        if (!fb?.db || !fb?.where || !fb?.getDocs) return null;

        const q = fb.query(
          fb.collection(fb.db, "scrm_recepcion"),
          fb.where("lote", "==", lote),
          fb.limit(1)
        );
        const snapDocs = await fb.getDocs(q);
        if (snapDocs.empty) return null;
        const d = snapDocs.docs[0];
        return { id:d.id, ...d.data() };
      };

      const aplicarDatosSCRM = async (data, origen="SCRM") => {
        if (!data) return;

        // En SLM, el campo LOTE debe mostrar el ANÁLISIS de Lotes - Calidad.
        let analisis = "";
        if (data.lote) {
          const loteCalidad = await buscarLoteCalidadPorLoteGenerado(data.lote);
          analisis = loteCalidad?.analisis || "";
        }

        // Mantener el SECUENCIAL digitado por el usuario como dato maestro de la consulta.
        // No se reemplaza desde búsquedas indirectas para evitar saltos automáticos entre secuenciales.
        const secData = data.secuencial !== undefined && data.secuencial !== null ? String(data.secuencial) : "";
        const secPantalla = String(secuencial || "").trim();
        if (!secPantalla && secData) setSecuencial(secData);
        setProveedor(String(data.razonSocial || "").toUpperCase());
        setLote(String(analisis || "").toUpperCase());
        setPiscina(String(data.piscina || "").toUpperCase());
        setGuia(Number(data.totalLibras || 0));
        setLibrasProgramadas(parseNumeroEC(
          data.totalProgramadas ??
          data.librasProgramadas ??
          data.programadas ??
          data.totalLibrasProgramadas ??
          data.librasProgramada ??
          data.librasPrograma ??
          0
        ));

        const usuarioLiq = liquidadorActualDeLiquidacion();
        if (!historialDocId && usuarioLiq) setLiquidador(usuarioLiq);

        const est = String(data.estatus || "").toUpperCase();
        if (ESTATUS_MAQUINA.includes(est) && !cargandoHistorialRef.current) cambiarEstatusTabla(est);

        setToast(`Datos cargados desde ${origen}. SEC. ${data.secuencial || ""}`.trim());
      };

      useEffect(() => {
        const secTxt = String(secuencial || "").replace(/\D/g, "").trim();
        if (!secTxt || cargandoHistorialRef.current) return;

        let consultaVigente = true;
        if (autoFillTimerRef.current) clearTimeout(autoFillTimerRef.current);
        const timer = setTimeout(async () => {
          if (!consultaVigente || cargandoHistorialRef.current) return;
          try{
            const data = await buscarSCRMporSecuencial(secTxt);
            // Blindaje anti-cambio: si el usuario ya escribió otro secuencial,
            // se descarta la respuesta antigua y no se toca la pantalla.
            const secActualPantalla = String(secuencial || "").replace(/\D/g, "").trim();
            if (!consultaVigente || !data || cargandoHistorialRef.current || secActualPantalla !== secTxt) return;
            await aplicarDatosSCRM(data, "SCRM por secuencial");
          }catch(err){
            console.warn("No se pudo consultar SCRM por secuencial.", err);
          }
        }, 450);
        autoFillTimerRef.current = timer;
        return () => { consultaVigente = false; clearTimeout(timer); };
      }, [secuencial]);

      useEffect(() => {
        // BLOQUEO CRÍTICO: el LOTE/ANÁLISIS es automático y puede repetirse en varios secuenciales.
        // Por seguridad, esta pantalla ya NO usa el lote para buscar y cambiar el SECUENCIAL.
        // El único disparador automático permitido es el SECUENCIAL digitado por el usuario.
        // Así evitamos casos donde el usuario ingresa 4987, carga correcto, y segundos después
        // una búsqueda por lote/análisis lo reemplaza por otro secuencial del mismo lote.
        return undefined;
      }, [lote]);

      const activarHaloTop = (boton, accion) => {
        setHaloTop(boton);
        setTimeout(()=>setHaloTop(""), 650);
        if (typeof accion === "function") accion();
      };

      const setQty = (setter, obj, talla, v) => {
        const n = (v==="" ? 0 : Number(v));
        setter({ ...obj, [talla]: Number.isFinite(n) ? n : 0 });
      };

      const cambiarDolaresDestino = (valor) => {
        const nuevoDestino = valor === "CONTROLADOR" ? "CONTROLADOR" : "PLANTA";
        setDolaresDestino(nuevoDestino);
        // Si ya se había presionado LIQUIDAR, se limpia el snapshot para que LIQUIDACION/PDF
        // usen inmediatamente la nueva lista de precios aplicada y el nuevo reparto.
        setLiquidacionSnap(null);
      };

      const cambiarEstatusTabla = (valor) => {
        const nuevo = ESTATUS_MAQUINA.includes(valor) ? valor : "COLA";
        setEstatusTabla(nuevo);
        setLineRows(makeDefaultLineRows(nuevo));
        setLiquidacionSnap(null);
        setToast(`Estatus ${nuevo} aplicado en la tabla de cantidades.`);
      };

      const updateLineRow = (id, key, value) => {
        if (["invA","invB","invC"].includes(key)){
          setToast("Inventario bloqueado. Use el botón de color y registre INGRESO o EGRESO desde el modal.");
          return;
        }
        if (historialDocId && !puedeModificarLiquidacion()){
          setToast("No puede modificar esta liquidación. Solo el usuario que la creó o el administrador pueden hacerlo.");
          return;
        }
        setLineRows(prev => prev.map(r => {
          if (r.id !== id) return r;
          // En PESO se permite escribir libremente con coma decimal: 1,65 / 1,6 / 1,9.
          // Se conserva el texto mientras escribes para que no se corte al ingresar la coma.
          if (key === "peso"){
            const limpio = String(value ?? "").replace(/[^0-9.,]/g, "");
            return { ...r, [key]: limpio };
          }
          const n = value === "" ? 0 : toNum(value);
          return { ...r, [key]: Number.isFinite(n) ? n : 0 };
        }));
      };

      const copiarInventarioAPago = () => {
        setLineRows(prev => prev.map(r => ({
          ...r,
          payA: toNum(r.invA),
          payB: toNum(r.invB),
          payC: toNum(r.invC)
        })));
        setToast("Inventario copiado en Pago correctamente.");
      };
      const addLineRow = (id) => {
        setLineRows(prev => {
          const idx = prev.findIndex(r => r.id === id);
          if (idx < 0) return prev;
          const base = prev[idx];
          const nuevo = { id: makeLineId(base.talla), talla: base.talla, peso:"", invA:0, invB:0, invC:0, payA:0, payB:0, payC:0, empaque:null, invMovs:emptyInvMovs() };
          const next = [...prev];
          next.splice(idx + 1, 0, nuevo);
          return next;
        });
      };
      const deleteLineRow = (id) => {
        setLineRows(prev => {
          const row = prev.find(r=>r.id===id);
          if (!row) return prev;
          if (prev.filter(r=>r.talla===row.talla).length <= 1) return prev;
          return prev.filter(r=>r.id!==id);
        });
      };

      const setPrice = (talla, key, v) => {
        const raw = String(v ?? "").replace(",", ".");
        const n = (raw==="" ? 0 : Number(raw));
        const valor = Number.isFinite(n) ? n : 0;

        setPrices(p=>{
          const actual = { ...(p[talla] || {}) };

          // Tallas A/B: solo se edita A; B se calcula automáticamente como A - 0,30.
          if (TALLAS_A_B.includes(talla)){
            const nuevoA = key === "A" ? valor : Number(actual.A || 0);
            return {
              ...p,
              [talla]: { ...actual, A: nuevoA, B: precioBDesdeA(nuevoA), C: 0 }
            };
          }

          // Tallas C: solo se edita C.
          return {
            ...p,
            [talla]: { ...actual, A: 0, B: 0, C: key === "C" ? valor : Number(actual.C || 0) }
          };
        });
      };

      const cargarPreciosFirestore = async () => {
        const fb = window.SLP_FIREBASE;
        if (!fb?.db || !fb?.getDoc) return false;
        try{
          const refPrecios = fb.doc(fb.db, "slp_configuracion", "precios_pago");
          const snapPrecios = await fb.getDoc(refPrecios);
          if (snapPrecios.exists()){
            const data = snapPrecios.data() || {};
            setPrices(normalizarPreciosGlobal(data.prices || data.precios || data));
            return true;
          }
        }catch(err){
          console.warn("No se pudieron cargar los precios desde Firestore.", err);
        }
        return false;
      };

      useEffect(()=>{
        let cancelado = false;
        let intentos = 0;
        const timer = setInterval(async ()=>{
          if (cancelado) return;
          intentos += 1;
          const ok = await cargarPreciosFirestore();
          if (ok || intentos >= 8) clearInterval(timer);
        }, 700);
        return ()=>{ cancelado = true; clearInterval(timer); };
      }, []);

      const guardarPreciosFirestore = async () => {

        const tipo = String(invModal.tipo || "FILA").toUpperCase() === "COCHE" ? "COCHE" : "FILA";
        const classKey = claseKeyFromInvKey(invModal.classKey);
        const invField = invFieldFromClass(classKey);
        const items = (Array.isArray(invModal.items) ? invModal.items : []).map((it, idx)=>({
          ref: String(it.ref || (tipo === "FILA" ? idx + 1 : "")).trim(),
          cajas: Math.trunc(toNum(it.cajas))
        }));
        const totalCajas = items.reduce((s,it)=>s + (Number.isFinite(it.cajas) && it.cajas > 0 ? it.cajas : 0), 0);

        if (!invModal.rowId){
          setToast("No se pudo identificar la fila de inventario.");
          return;
        }
        if (!items.length){
          setToast(tipo === "FILA" ? "Ingrese la cantidad de filas." : "Ingrese la cantidad de coches.");
          return;
        }
        const sinReferencia = items.find((it)=>!it.ref);
        if (sinReferencia){
          setToast(tipo === "FILA" ? "Revise el número de fila." : "Ingrese el número de cada coche.");
          return;
        }
        const sinCajas = items.find((it)=>!Number.isFinite(it.cajas) || it.cajas <= 0);
        if (sinCajas){
          setToast("Ingrese la cantidad de cajas por cada " + (tipo === "FILA" ? "fila." : "coche."));
          return;
        }
        if (!Number.isFinite(totalCajas) || totalCajas <= 0){
          setToast("Ingrese una cantidad de cajas válida.");
          return;
        }

        let ok = true;
        let mensaje = "";
        const esEliminar = ["ELIMINAR","EGRESO"].includes(String(accion || "").toUpperCase());

        setLineRows(prev => prev.map(r => {
          if (r.id !== invModal.rowId) return r;
          const actual = toNum(r[invField]);
          if (esEliminar && totalCajas > actual){
            ok = false;
            mensaje = `No puede hacer EGRESO de ${totalCajas} cajas. Saldo disponible ${actual}.`;
            return r;
          }

          let saldo = actual;
          const movs = normalizarInvMovs(r.invMovs);
          const nuevos = items.map((it)=> {
            saldo = esEliminar ? Math.max(0, saldo - it.cajas) : saldo + it.cajas;

              ref: it.ref,

              delta: esEliminar ? -it.cajas : it.cajas,
              saldo
            };
          });

          return { ...r, [invField]: saldo, invMovs: movs };
        }));

        // Conserva objetos especiales de Firebase, como serverTimestamp(), sin convertirlos en {}.
        if (obj && typeof obj === "object" && obj.constructor && obj.constructor.name !== "Object") return obj;
        if (obj && typeof obj === "object"){
          const out = {};
          Object.entries(obj).forEach(([k,v])=>{

          estadoCandado: (historialDocId && (historialDocDataRef.current?.candadoCerrado || historialDocDataRef.current?.estadoCandado === "CERRADO")) ? "CERRADO" : "ABIERTO",
          pdfHabilitado: !!(historialDocId && (historialDocDataRef.current?.pdfHabilitado || historialDocDataRef.current?.candadoCerrado))
        };
        const dataToSave = { ...liquidacionData, stamp };
        dataToSave.header = {
          ...dataToSave.header,
          createdByEmail: emailCreadorGuardado,
          createdByName: nombreCreadorGuardado,
          liquidacionNo: numeroActual,
          liquidacionSeq: seqActual,
          proveedor,

          lote,
          controlador,
          liquidador: liquidadorCreador,
          gerenteProduccion:"Jefferson Figueroa Rosales",
          dolaresDestino,
          estatusTabla,
          dolaresPlanta: Number(distribucionDolares.planta || 0),
          dolaresControlador: Number(distribucionDolares.controlador || 0),

          botonOro: Number(distribucionDolares.botonOro || 0)
        };
        dataToSave.formInputs = formInputs;
        const basePayload = limpiarObjetoFirestore({
          ...dataToSave,
          formInputs,
          stamp,

          createdByEmail: emailCreadorGuardado,

          fechaCreacion: fechaCreacion || fechaSistemaTexto(),
          librasProgramadas: Number(librasProgramadas || 0),
          horaInicio: horaInicioPayload,
