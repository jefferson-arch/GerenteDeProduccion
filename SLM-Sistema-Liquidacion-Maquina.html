        let lbsC = 0;
        for (const r of rows){
          const peso = toNum(r.peso);
          const pesoLb = TALLAS_C.includes(r.talla) ? peso : (peso * LB_PER_KG);
          if (TALLAS_A_B.includes(r.talla)){
            lbsA += toNum(r.payA) * pesoLb;
            lbsB += toNum(r.payB) * pesoLb;
          }
          if (TALLAS_C.includes(r.talla)){
            lbsC += toNum(r.payC) * pesoLb;
          }
        }
        const total = lbsA + lbsB + lbsC;
        const pct = (v) => total > 0 ? (v / total) * 100 : 0;
        return { A:pct(lbsA), B:pct(lbsB), C:pct(lbsC) };
      }, [rows]);
      const rowOrderByTalla = useMemo(()=>{
        const count = {};
        const map = {};
        for (const r of rows){
          count[r.talla] = (count[r.talla] || 0) + 1;
          map[r.id] = count[r.talla];
        }
        return map;
      }, [rows]);

      const cellRefs = useRef({});

      const registerCell = (r, c) => (el) => {
        const k = `${r}:${c}`;
        if (el) cellRefs.current[k] = el;
        else delete cellRefs.current[k];
      };

      const INPUT_COLS = ["peso","invA","invB","invC"];

      const moveCell = (r, c, delta) => {
        const dRow = delta?.dRow ?? 0;
        const dCol = delta?.dCol ?? 0;
        const wrap = !!delta?.wrap;

        const rowCount = rows.length;
        const colCount = INPUT_COLS.length;

        const focusCell = (rr, cc) => {
          const el = cellRefs.current[`${rr}:${cc}`];
          if (!el) return false;
          el.focus();
          if (el.scrollIntoView) el.scrollIntoView({block:"nearest", inline:"nearest"});
          if (el.select) el.select();
          return true;
        };

        const cIdx0 = Math.max(0, INPUT_COLS.indexOf(c));
        let nr = r + dRow;
        let ncIdx = cIdx0 + dCol;

        if (wrap && dCol !== 0){
          if (ncIdx >= colCount){
            nr += 1;
            ncIdx = 0;
          }else if (ncIdx < 0){
            nr -= 1;
            ncIdx = colCount - 1;
          }
        }

        if (nr < 0) nr = 0;
        if (nr >= rowCount) nr = rowCount - 1;
        if (ncIdx < 0) ncIdx = 0;
        if (ncIdx >= colCount) ncIdx = colCount - 1;

        const targetCol = INPUT_COLS[ncIdx];
        if (focusCell(nr, targetCol)) return;

        // Enter en la última talla A/B (91-110): saltar automáticamente a la primera fila de C (BL).
        if (dRow > 0 && dCol === 0){
          if (c === "invA" || c === "invB"){
            const firstC = rows.findIndex(x => TALLAS_C.includes(x.talla));
            if (firstC >= 0 && focusCell(firstC, "invC")) return;
          }
          if (c === "payA" || c === "payB"){
            const firstC = rows.findIndex(x => TALLAS_C.includes(x.talla));
            if (firstC >= 0 && focusCell(firstC, "payC")) return;
          }
        }

        // Si la fila destino no tiene esa celda, buscar la siguiente celda disponible en la misma columna.
        if (dRow !== 0 && dCol === 0){
          const step = dRow > 0 ? 1 : -1;
          for (let rr = nr; rr >= 0 && rr < rowCount; rr += step){
            if (focusCell(rr, c)) return;
          }
        }
      };

    function QrImg({value}){
      const [src, setSrc] = useState("");

      useEffect(()=>{
        let cancelled = false;
        if (!value){
          setSrc("");
          return;
        }

        const fallbackUrl = "https://api.qrserver.com/v1/create-qr-code/?size=160x160&margin=8&data=" + encodeURIComponent(value);

        try{
          if (window.QRCode && typeof window.QRCode.toDataURL === "function"){
            window.QRCode.toDataURL(value, { width:140, margin:1, errorCorrectionLevel:"M" }, (err, url)=>{
              if (cancelled) return;
              if (err || !url){
                console.warn("No se pudo generar QR local, usando respaldo externo.", err);
                setSrc(fallbackUrl);
              }else{
                setSrc(url);
              }
            });
          }else{
            setSrc(fallbackUrl);
          }
        }catch(err){
          console.warn("No se pudo generar QR local, usando respaldo externo.", err);
          setSrc(fallbackUrl);
        }

        return ()=>{ cancelled = true; };
      }, [value]);

      if (!value || !src) return null;
      return <img className="qrImg" src={src} crossOrigin="anonymous" alt="QR PDF digital" />;
    }

      return (
        <img
          className={className}
          src={src}
          alt="Oceantreasure"
          onError={(e)=>{
            if (tries === 0){ setTries(1); setSrc(initialSrc === "logo.png" ? "LOGOOCEANTREASURESA(1).png" : "logo.png"); }
            else if (tries === 1){ setTries(2); setSrc(initialSrc === "logo.png" ? "logo_pdf_blanco.png" : "LOGOOCEANTREASURESA(1).png"); }
            else { e.currentTarget.style.display = "none"; }
          }}
        />
      );
    }

    function ContabilidadInventarioTab({historial, loading, onRefresh, onOpen}){
      const hoy = todayDateInput();
      const [filtro, setFiltro] = useState({ desde:hoy, hasta:hoy, liquidacionNo:"", proveedor:"", secuencial:"", lote:"", estado:"" });

      const dateToTexto = (d) => {
        if (!(d instanceof Date) || Number.isNaN(d.getTime())) return "";
        return `${pad2(d.getDate())}/${pad2(d.getMonth()+1)}/${d.getFullYear()}`;
      };
      const dateToIso = (d) => {
        if (!(d instanceof Date) || Number.isNaN(d.getTime())) return "";
        return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
      };
      const toDateSafe = (v) => {
        if (!v) return null;
        if (v instanceof Date) return v;
        if (typeof v === "object" && typeof v.toDate === "function") {
          try { return v.toDate(); } catch(e){ return null; }
        }
        if (typeof v === "object" && Number.isFinite(Number(v.seconds))) {
          return new Date(Number(v.seconds) * 1000);
        }
        return null;
      };
      const textoSeguro = (v) => {
        if (v === null || v === undefined) return "";
        const d = toDateSafe(v);
        if (d) return dateToTexto(d);
        if (typeof v === "object") return "";
        return String(v);
      };
      const parseFecha = (txt) => {
        const d = toDateSafe(txt);
        if (d) return dateToIso(d);
        const s = String(txt || "").trim();
        let m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
        if (m) return `${m[3]}-${String(m[2]).padStart(2,"0")}-${String(m[1]).padStart(2,"0")}`;
        m = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
        if (m) return `${m[1]}-${String(m[2]).padStart(2,"0")}-${String(m[3]).padStart(2,"0")}`;
        return "";
      };
      const norm = (v) => textoSeguro(v).trim().toUpperCase();
      const cleanHour = (v) => {
        const h = String(v || "").trim();
        return (!h || h === "--:--" || h === "-- : --") ? "" : h;
      };
      const estadoLiquidacion = (raw) => {
        const h = raw?.header || {};
        const f = raw?.formInputs || {};
        const hf = cleanHour(raw?.horaFinal || f.horaFinal || h.horaFinal);
        return hf ? "CERRADA" : "EN PROCESO";
      };
      const valorContable = (raw) => {
        const h = raw?.header || {};
        const val = Number(raw?.diffDollars ?? raw?.dolaresInvPago ?? h.botonOro ?? 0);
        return Number.isFinite(val) ? val : 0;
      };

      const rowsAll = useMemo(()=>{
        const lista = Array.isArray(historial) ? historial : [];
        return lista.filter(raw=>raw && typeof raw === "object").map(raw=>{
          const h = raw.header && typeof raw.header === "object" ? raw.header : {};
          const f = raw.formInputs && typeof raw.formInputs === "object" ? raw.formInputs : {};
          const fechaRaw = raw.fechaCreacion ?? f.fechaCreacion ?? h.fechaCreacion ?? raw.createdAt ?? raw.updatedAt ?? "";
          const fechaIso = parseFecha(fechaRaw);
          const fecha = textoSeguro(fechaRaw) || (fechaIso ? `${fechaIso.slice(8,10)}/${fechaIso.slice(5,7)}/${fechaIso.slice(0,4)}` : "");
          const estado = estadoLiquidacion(raw);
          const recibido = toNum(raw.recibido ?? h.recibido ?? 0);
          const empacado = toNum(raw.empacado ?? h.empacado ?? raw.totalLibras ?? 0);
          const rend = toNum(raw.rendimiento ?? h.rendimiento ?? (recibido ? (empacado/recibido)*100 : 0));
          const horaInicio = cleanHour(raw.horaInicio || f.horaInicio || h.horaInicio);
          const horaFinal = cleanHour(raw.horaFinal || f.horaFinal || h.horaFinal);
          return {
            raw,
            id: textoSeguro(raw.id),
            fecha, fechaIso,
            estado,
            liquidacionNo: textoSeguro(raw.liquidacionNo || h.liquidacionNo),
            proveedor: textoSeguro(raw.proveedor || h.proveedor),
            secuencial: textoSeguro(raw.secuencial || h.secuencial),
            lote: textoSeguro(raw.lote || h.lote),
            piscina: textoSeguro(h.piscina || raw.piscina),
            guia: toNum(raw.guia ?? h.guia ?? 0),
            planta: toNum(raw.planta ?? h.planta ?? 0),
            basura: toNum(raw.basura ?? h.basura ?? 0),
            controlador: textoSeguro(raw.controlador || h.controlador),
            liquidador: textoSeguro(raw.liquidador || h.liquidador),
            horaInicio,
            horaFinal,
            recibido,
            empacado,
            rendimiento: rend,
            librasHora: toNum(raw.librasHora ?? f.librasHora ?? h.librasHora ?? 0),
            totalCajas: toNum(raw.totalCajas ?? 0),
            valor: valorContable(raw),
            qr: textoSeguro(raw.publicUrl || raw.pdfUrl || raw.digitalUrl),
            creadoPor: textoSeguro(raw.createdByName || h.createdByName) || usuarioDesdeEmail(raw.createdByEmail || h.createdByEmail || "")
          };
        }).filter(r=>r.liquidacionNo || r.proveedor || r.secuencial || r.fecha);
      }, [historial]);

      const rows = useMemo(()=>rowsAll.filter(r=>{
        if (filtro.desde && r.fechaIso && r.fechaIso < filtro.desde) return false;
        if (filtro.hasta && r.fechaIso && r.fechaIso > filtro.hasta) return false;
        if (filtro.estado && r.estado !== filtro.estado) return false;
        if (filtro.liquidacionNo && !norm(r.liquidacionNo).includes(norm(filtro.liquidacionNo))) return false;
        if (filtro.proveedor && !norm(r.proveedor).includes(norm(filtro.proveedor))) return false;
        if (filtro.secuencial && !norm(r.secuencial).includes(norm(filtro.secuencial))) return false;
        if (filtro.lote && !norm(r.lote).includes(norm(filtro.lote))) return false;
        return true;
      }), [rowsAll, filtro]);

      const totales = useMemo(()=>{
        const cerradas = rows.filter(r=>r.estado === "CERRADA").length;
        const proceso = rows.filter(r=>r.estado !== "CERRADA").length;
        const recibido = rows.reduce((s,r)=>s + toNum(r.recibido),0);
        const empacado = rows.reduce((s,r)=>s + toNum(r.empacado),0);
        return {
          registros: rows.length,
          cerradas,
          proceso,
          recibido,
          empacado,
          rendimiento: recibido > 0 ? (empacado / recibido) * 100 : 0,
          valor: rows.reduce((s,r)=>s + toNum(r.valor),0)
        };
      }, [rows]);

      const exportExcel = () => {
        if (!rows.length){ alert("No hay información para exportar."); return; }
        const data = rows.map(r=>({
          ESTADO:r.estado, FECHA:r.fecha, LIQUIDACION:r.liquidacionNo, PROVEEDOR:r.proveedor, SECUENCIAL:r.secuencial,
          LOTE:r.lote, PISCINA:r.piscina, GUIA:r.guia, PLANTA:r.planta, BASURA:r.basura, CONTROLADOR:r.controlador,
          LIQUIDADOR:r.liquidador, HORA_INICIO:r.horaInicio, HORA_FINAL:r.horaFinal, RECIBIDO:r.recibido,
          EMPACADO:r.empacado, RENDIMIENTO_PORC:r.rendimiento, LIBRAS_HORA:r.librasHora, VALOR_CONTABLE:r.valor,
          CREADO_POR:r.creadoPor, DISPONIBLE_CONTABILIDAD: r.estado === "CERRADA" ? "SI" : "NO"
        }));
        const wb = XLSX.utils.book_new();
        const ws = XLSX.utils.json_to_sheet(data);
        ws["!cols"] = Object.keys(data[0]).map(k=>({wch: Math.min(Math.max(k.length+4, 12), 26)}));
        XLSX.utils.book_append_sheet(wb, ws, "CONTABILIDAD");
        XLSX.writeFile(wb, `INVENTARIO_CONTABILIDAD_SLM_${filtro.desde || "SIN-DESDE"}_a_${filtro.hasta || "SIN-HASTA"}.xlsx`);
      };

      const exportPdf = () => {
        if (!rows.length){ alert("No hay información para exportar."); return; }
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF({ orientation:"landscape", unit:"pt", format:"a4" });
        const pageW = pdf.internal.pageSize.getWidth();
        pdf.setFont("helvetica", "bold");
        pdf.setFontSize(13);
        pdf.text("CONTROL DE LIQUIDACIONES PARA CONTABILIDAD", pageW/2, 34, {align:"center"});
        pdf.setFontSize(8);
        pdf.text(`Periodo: ${filtro.desde || ""} a ${filtro.hasta || ""}   |   Registros: ${rows.length}   |   Cerradas: ${totales.cerradas}   |   En proceso: ${totales.proceso}`, 40, 52);
        pdf.text(`Recibido: ${fmtNumEC(totales.recibido,2)} lb   Empacado: ${fmtNumEC(totales.empacado,2)} lb   Rend.: ${fmtPctEC(totales.rendimiento)}%   Valor contable: $ ${fmtNumEC(totales.valor,2)}`, 40, 64);
        pdf.autoTable({
          startY:78,
          head:[["ESTADO","FECHA","N°","PROVEEDOR","SEC.","LOTE","PISC.","CONTROLADOR","LIQUIDADOR","H. INI","H. FIN","RECIBIDO","EMPACADO","REND.","VALOR"]],
          body: rows.map(r=>[r.estado,r.fecha,r.liquidacionNo,r.proveedor,r.secuencial,r.lote,r.piscina,r.controlador,r.liquidador,r.horaInicio,r.horaFinal,fmtNumEC(r.recibido,2),fmtNumEC(r.empacado,2),fmtPctEC(r.rendimiento)+"%","$ "+fmtNumEC(r.valor,2)]),
          theme:"grid",
          styles:{fontSize:6.8, cellPadding:2, overflow:"ellipsize", lineColor:[203,213,225], lineWidth:.35},
          headStyles:{fillColor:[11,31,58], textColor:[255,255,255], fontStyle:"bold"},
          columnStyles:{0:{cellWidth:64},1:{cellWidth:48},2:{cellWidth:50},3:{cellWidth:86},4:{cellWidth:42},5:{cellWidth:42},6:{cellWidth:38},7:{cellWidth:68},8:{cellWidth:72},9:{cellWidth:38},10:{cellWidth:38},11:{cellWidth:58,halign:"right"},12:{cellWidth:58,halign:"right"},13:{cellWidth:38,halign:"right"},14:{cellWidth:58,halign:"right"}},
          margin:{left:40,right:40},
          didDrawPage:()=>{ pdf.setFontSize(7); pdf.text(`Página ${pdf.internal.getNumberOfPages()}`, pageW-62, pdf.internal.pageSize.getHeight()-18); }
        });
        pdf.save(`INVENTARIO_CONTABILIDAD_SLM_${filtro.desde || "SIN-DESDE"}_a_${filtro.hasta || "SIN-HASTA"}.pdf`);
      };

      return (
        <div className="card">
          <div className="h">INVENTARIO DE LIQUIDACIONES — CONTABILIDAD</div>
          <div className="muted" style={{marginBottom:8}}>Pantalla de control para que Contabilidad revise liquidaciones en proceso y liquidaciones cerradas disponibles para registro contable.</div>
          <div className="contaFilters">
            <LabelInput label="DESDE" type="date" value={filtro.desde} onChange={(v)=>setFiltro({...filtro, desde:v})} />
            <LabelInput label="HASTA" type="date" value={filtro.hasta} onChange={(v)=>setFiltro({...filtro, hasta:v})} />
            <label><div>ESTADO</div><select value={filtro.estado} onChange={(e)=>setFiltro({...filtro, estado:e.target.value})}><option value="">TODAS</option><option value="EN PROCESO">EN PROCESO</option><option value="CERRADA">CERRADA</option></select></label>
            <LabelInput label="N° LIQUIDACIÓN" value={filtro.liquidacionNo} onChange={(v)=>setFiltro({...filtro, liquidacionNo:v})} />
            <LabelInput label="PROVEEDOR" value={filtro.proveedor} onChange={(v)=>setFiltro({...filtro, proveedor:v})} />
            <LabelInput label="SECUENCIAL" value={filtro.secuencial} onChange={(v)=>setFiltro({...filtro, secuencial:v})} />
            <LabelInput label="LOTE" value={filtro.lote} onChange={(v)=>setFiltro({...filtro, lote:v})} />
            <div className="contaActions">
              <button className="btn" onClick={onRefresh}>{loading ? "CARGANDO..." : "ACTUALIZAR"}</button>
              <button className="btn" onClick={()=>setFiltro({ desde:hoy, hasta:hoy, liquidacionNo:"", proveedor:"", secuencial:"", lote:"", estado:"" })}>LIMPIAR</button>
              <button className="btn" onClick={exportExcel}>EXCEL</button>
              <button className="btn" onClick={exportPdf}>PDF</button>
            </div>
          </div>

          <div className="contaKpis">
            <div className="contaKpi"><div className="klabel">Liquidaciones</div><div className="kval">{fmtNumEC(totales.registros,0)}</div></div>
            <div className="contaKpi"><div className="klabel">En proceso</div><div className="kval">{fmtNumEC(totales.proceso,0)}</div></div>
            <div className="contaKpi"><div className="klabel">Cerradas</div><div className="kval">{fmtNumEC(totales.cerradas,0)}</div></div>
            <div className="contaKpi"><div className="klabel">Recibido lb</div><div className="kval">{fmtNumEC(totales.recibido,2)}</div></div>
            <div className="contaKpi"><div className="klabel">Empacado lb</div><div className="kval">{fmtNumEC(totales.empacado,2)}</div></div>
            <div className="contaKpi"><div className="klabel">Valor contable</div><div className="kval">$ {fmtNumEC(totales.valor,2)}</div></div>
          </div>

          <div className="contaTableWrap">
            <table className="contaTable">
              <thead>
                <tr>
                  <th style={{width:88}}>ESTADO</th><th style={{width:58}}>FECHA</th><th style={{width:62}}>N° LIQ.</th><th style={{width:100}}>PROVEEDOR</th><th style={{width:58}}>SEC.</th><th style={{width:55}}>LOTE</th><th style={{width:55}}>PISCINA</th><th style={{width:70}}>GUÍA</th><th style={{width:70}}>PLANTA</th><th style={{width:60}}>BASURA</th><th style={{width:82}}>CONTROL.</th><th style={{width:88}}>LIQUIDADOR</th><th style={{width:55}}>H. INI.</th><th style={{width:55}}>H. FIN.</th><th style={{width:78}}>RECIBIDO</th><th style={{width:78}}>EMPACADO</th><th style={{width:55}}>REND.</th><th style={{width:72}}>LB/HORA</th><th style={{width:80}}>VALOR</th><th style={{width:74}}>ACCIÓN</th>
                </tr>
              </thead>
              <tbody>
                {rows.map((r,idx)=>(
                  <tr key={`${r.id || r.liquidacionNo}_${idx}`}>
                    <td><span className={"contaBadge " + (r.estado === "CERRADA" ? "cerrada" : "proceso")}>{r.estado}</span></td>
                    <td>{r.fecha}</td><td>{r.liquidacionNo}</td><td className="colProveedor" title={r.proveedor}>{r.proveedor}</td><td>{r.secuencial}</td><td>{r.lote}</td><td>{r.piscina}</td>
                    <td className="right">{fmtNumEC(r.guia,2)}</td><td className="right">{fmtNumEC(r.planta,2)}</td><td className="right">{fmtNumEC(r.basura,2)}</td>
                    <td title={r.controlador}>{r.controlador}</td><td title={r.liquidador}>{r.liquidador}</td><td>{r.horaInicio}</td><td>{r.horaFinal}</td>
                    <td className="right">{fmtNumEC(r.recibido,2)}</td><td className="right">{fmtNumEC(r.empacado,2)}</td><td className="right">{fmtPctEC(r.rendimiento)}%</td><td className="right">{fmtNumEC(r.librasHora,2)}</td><td className="right">$ {fmtNumEC(r.valor,2)}</td>
                    <td className="center"><button className="btn" style={{padding:"3px 6px", fontSize:"9px"}} onClick={()=>onOpen && onOpen(r.raw)}>ABRIR</button></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          <div className="contaNote">Estado usado por Contabilidad: <b>EN PROCESO</b> cuando la liquidación aún no tiene hora final; <b>CERRADA</b> cuando ya fue guardada con hora final y queda disponible para revisión contable.</div>
        </div>
      );
    }

    function HistorialTab({historial, loading, filtro, setFiltro, onRefresh, onOpen, onEdit, onDelete, onPdfItem, onExcelItem, isLockedItem, isAccounting}){
      const parseDateOnly = (s, endOfDay=false) => {
        if (!s) return null;
        const [y,m,d] = String(s).split("-").map(Number);
        if (!y || !m || !d) return null;
        return new Date(y, m-1, d, endOfDay ? 23 : 0, endOfDay ? 59 : 0, endOfDay ? 59 : 0, endOfDay ? 999 : 0);
      };

      const getCreatedDate = (item) => {
        if (item?.createdAt?.toDate) return item.createdAt.toDate();
        if (item?.updatedAt?.toDate) return item.updatedAt.toDate();
        if (item?.stamp){
          const parts = String(item.stamp).match(/(\d{4})-(\d{2})-(\d{2})/);
          if (parts) return new Date(Number(parts[1]), Number(parts[2])-1, Number(parts[3]));
        }
        return null;
      };

      const getMostrarSeq = (item) => {
        const h = item.header || {};
        const n = Number(h.secuencial ?? item.secuencial ?? 0);
        return Number.isFinite(n) ? n : 0;
      };

      const hasPositiveQty = (obj) => {
        if (!obj) return false;
        if (Array.isArray(obj)) return obj.some(hasPositiveQty);
        if (typeof obj === "object") return Object.values(obj).some(hasPositiveQty);
        const n = parseNumeroEC(obj);
        return Number.isFinite(n) && n > 0;
      };

      const tienePagoSLP = (item) => {
        const fi = item?.formInputs || {};
        if (hasPositiveQty(fi.payA) || hasPositiveQty(fi.payB) || hasPositiveQty(fi.payC)) return true;
        if (Array.isArray(fi.lineRows) && fi.lineRows.some(r => toNum(r?.payA) > 0 || toNum(r?.payB) > 0 || toNum(r?.payC) > 0)) return true;
        return false;
      };

      const esRegistroSLP = (item) => {
        const h = item?.header || {};
        const marcas = [
          item?.origenSistema, item?.sistema, item?.modulo, item?.app, item?.source, item?.sourceSystem, item?.tipoLiquidacion,
          h?.origenSistema, h?.sistema, h?.modulo, h?.app, h?.source, h?.sourceSystem, h?.tipoLiquidacion
        ].map(v => String(v || "").toUpperCase()).join(" |");
        if (marcas.includes("LIQUIDACION_DE_PAGO") || marcas.includes("LIQUIDACIÓN DE PAGO") || marcas.includes("LIQUIDACION-DE-PAGO") || marcas.includes("PAGO_WEB") || marcas.includes("SLP-PAGO")) return true;
        if (marcas.includes("SLM") || marcas.includes("INVENTARIO_SLM")) return false;
        return tienePagoSLP(item);
      };

      const usuarioRegistroSLP = (item) => {
        const h = item?.header || {};
        const nombre = h.createdByName || item?.createdByName || h.usuarioCreador || item?.usuarioCreador || h.userName || item?.userName || h.usuario || item?.usuario || h.liquidador || item?.liquidador || "";
        if (String(nombre || "").trim()) return String(nombre).trim().toUpperCase();
        const email = h.createdByEmail || item?.createdByEmail || h.emailUsuario || item?.emailUsuario || "";
        return usuarioDesdeEmail(email);
      };

      const creadorEmailHistorial = (item) => {
        const h = item?.header || {};
        return String(
          item?.createdByEmail || item?.creadoPorEmail || item?.usuarioCreacion || item?.creadoPor ||
          h?.createdByEmail || h?.creadoPorEmail || h?.usuarioCreacion || h?.creadoPor || h?.liquidadorEmail || ""
        ).trim().toLowerCase();
      };

      const creadorNombreHistorial = (item) => {
        const h = item?.header || {};
        return String(
          item?.createdByName || h?.createdByName || item?.creadoPorNombre || h?.creadoPorNombre ||
          item?.usuarioCreador || h?.usuarioCreador || item?.userName || h?.userName ||
          item?.liquidador || h?.liquidador || ""
        ).trim().toUpperCase();
      };

      const puedeAccionarHistorial = (item) => {
        const actual = String(window.SLM_AUTH_USER || "").trim().toLowerCase();
        if (!actual) return false;
        if (actual === ADMIN_EMAIL) return true;

        const creadorEmail = creadorEmailHistorial(item);
        if (creadorEmail) return actual === creadorEmail;

        const usuarioActual = String(actual).replace("@oceantreasure.local", "").toUpperCase();
        const creadorNombre = creadorNombreHistorial(item);
        if (usuarioActual && creadorNombre) return usuarioActual === creadorNombre;

        return false;
      };

      const mensajePrivacidad = (item) => {
        const creador = creadorNombreHistorial(item) || creadorEmailHistorial(item) || "otro usuario";
        return `Privacidad: esta liquidación fue creada por ${creador}. Solo su creador o Jefferson pueden editarla o eliminarla.`;
      };

      const calcDollarsFromInputs = (item) => {
        const fi = item?.formInputs || {};
        const h = item?.header || {};
        const p = fi.prices || {};
        const destinoRaw = h.dolaresDestino || item?.dolaresDestino || fi.dolaresDestino || "PLANTA";
        const destino = destinoRaw === "CONTROLADOR" ? "CONTROLADOR" : "PLANTA";
        const precioHist = (talla, clase) => {
          if (!TALLAS_A_B.includes(talla)) return toNum(p[talla]?.[clase]);
          const baseA = toNum(p[talla]?.A);
          if (destino !== "CONTROLADOR") return clase === "B" ? precioBDesdeA(baseA) : baseA;
          const aCtrl = Math.round((baseA - 0.20) * 100) / 100;
          return clase === "B" ? precioBDesdeA(aCtrl) : aCtrl;
        };

        // Registros nuevos: calcular por cada fila y su peso propio.
        if (Array.isArray(fi.lineRows) && fi.lineRows.length){
          const rows = normalizarLineRows(fi.lineRows);
          const sumModeRows = (prefix) => {
            let sum = 0;
            for (const row of rows){
              const t = row.talla;
              const pesoRaw = Number(row.peso);
              const peso = (Number.isFinite(pesoRaw) && pesoRaw > 0) ? pesoRaw : defaultPesoForTalla(t);
              const pesoLb = TALLAS_C.includes(t) ? peso : peso * LB_PER_KG;
              if (TALLAS_A_B.includes(t)){
                sum += toNum(row[prefix + "A"]) * pesoLb * precioHist(t, "A");
                sum += toNum(row[prefix + "B"]) * pesoLb * precioHist(t, "B");
              }
              if (TALLAS_C.includes(t)){
                sum += toNum(row[prefix + "C"]) * pesoLb * toNum(p[t]?.C);
              }
            }
            return sum;
          };
          return sumModeRows("inv") - sumModeRows("pay");
        }

        // Compatibilidad con registros antiguos guardados con pesos globales.
        const pa = (toNum(fi.pesoAkg) || defaultPesoForTalla("26-30")) * LB_PER_KG;
        const pb = (toNum(fi.pesoBkg) || defaultPesoForTalla("26-30")) * LB_PER_KG;
        const pc = toNum(fi.pesoClbs) || defaultPesoForTalla("BM");
        const sumMode = (prefix) => {
          let sum = 0;
          for (const t of TALLAS_A_B){
            sum += toNum(fi[prefix + "A"]?.[t]) * pa * precioHist(t, "A");
            sum += toNum(fi[prefix + "B"]?.[t]) * pb * precioHist(t, "B");
          }
          for (const t of TALLAS_C){
            sum += toNum(fi[prefix + "C"]?.[t]) * pc * toNum(p[t]?.C);
          }
          return sum;
        };
        const inv = sumMode("inv");
        const pay = sumMode("pay");
        return inv - pay;
      };

      const getDiffDollars = (item) => {
        const direct = Number(item.diffDollars ?? item.dolaresInvPago ?? item.diferenciaDolares);
        if (Number.isFinite(direct)) return direct;
        return calcDollarsFromInputs(item);
      };
      const getDistribucionDolares = (item) => {
        const h = item.header || {};
        const fi = item.formInputs || {};
        const total = getDiffDollars(item);
        const destinoRaw = h.dolaresDestino || item.dolaresDestino || fi.dolaresDestino || "PLANTA";
        const destino = destinoRaw === "CONTROLADOR" ? "CONTROLADOR" : "PLANTA";
        const plantaDirect = Number(h.dolaresPlanta ?? item.dolaresPlanta ?? fi.dolaresPlanta);
        const controladorDirect = Number(h.dolaresControlador ?? item.dolaresControlador ?? fi.dolaresControlador);
        const porFueraDirect = Number(h.dolaresPorFuera ?? item.dolaresPorFuera ?? fi.dolaresPorFuera);
        let planta = Number.isFinite(plantaDirect) ? plantaDirect : 0;
        let controlador = Number.isFinite(controladorDirect) ? controladorDirect : 0;
        let porFuera = Number.isFinite(porFueraDirect) ? porFueraDirect : 0;
        if (!Number.isFinite(plantaDirect) && !Number.isFinite(controladorDirect) && !Number.isFinite(porFueraDirect)){
          if (destino === "CONTROLADOR"){
            planta = total * 0.75;
            controlador = total * 0.25;
            porFuera = 0;
          } else {
            planta = 0;
            controlador = 0;
            porFuera = total;
          }
        }
        return { destino, planta, controlador, porFuera, botonOro: planta + porFuera };
      };

      const desdeDate = parseDateOnly(filtro.desde, false);
      const hastaDate = parseDateOnly(filtro.hasta, true);
      const mostrarDesde = Number(filtro.mostrarDesde || "");
      const mostrarHasta = Number(filtro.mostrarHasta || "");

      const filtered = (historial || []).filter(item=>{
        const h = item.header || {};
        if (isAccounting && !(typeof isLockedItem === "function" ? isLockedItem(item) : !!(item?.candadoCerrado || item?.locked || item?.estadoCandado === "CERRADO" || item?.header?.candadoCerrado || item?.header?.estadoCandado === "CERRADO"))) return false;
        const num = (h.liquidacionNo || item.liquidacionNo || "").toString().toLowerCase();
        const prov = (h.proveedor || item.proveedor || "").toString().toLowerCase();
        const sec = (h.secuencial || item.secuencial || "").toString().toLowerCase();
        const lot = (h.lote || item.lote || "").toString().toLowerCase();
        const ctrl = (h.controlador || item.controlador || "").toString().toLowerCase();
        const created = getCreatedDate(item);
        const seq = getMostrarSeq(item);

        if (!num.includes((filtro.liquidacionNo||"").toLowerCase())) return false;
        if (!prov.includes((filtro.proveedor||"").toLowerCase())) return false;
        if (!sec.includes((filtro.secuencial||"").toLowerCase())) return false;
        if (!lot.includes((filtro.lote||"").toLowerCase())) return false;
        if (!ctrl.includes((filtro.controlador||"").toLowerCase())) return false;
        if (desdeDate && created && created < desdeDate) return false;
        if (hastaDate && created && created > hastaDate) return false;
        if (Number.isFinite(mostrarDesde) && filtro.mostrarDesde !== "" && seq < mostrarDesde) return false;
        if (Number.isFinite(mostrarHasta) && filtro.mostrarHasta !== "" && seq > mostrarHasta) return false;
        return true;
      });

      const rows = filtered.map(item=>{
        const h = item.header || {};
        const created = getCreatedDate(item);
        const distribucion = getDistribucionDolares(item);
        const esSLP = esRegistroSLP(item);
        return {
          raw:item,
          esSLP,
          fecha: created ? created.toLocaleString("es-EC") : (item.stamp || ""),
          liquidacionNo: h.liquidacionNo || item.liquidacionNo || "",
          proveedor: h.proveedor || item.proveedor || "",
          secuencial: h.secuencial || item.secuencial || "",
          recibido: h.recibido ?? item.recibido ?? 0,
          empacado: h.empacado ?? item.empacado ?? 0,
          rendimiento: h.rendimiento ?? item.rendimiento ?? 0,
          dolaresInvPago: getDiffDollars(item),
          dolaresPlanta: distribucion.planta,
          dolaresControlador: distribucion.controlador,
          dolaresPorFuera: distribucion.porFuera,
          botonOro: distribucion.botonOro,
          destinoDolares: distribucion.destino,
          controlador: h.controlador || item.controlador || "",
          liquidador: esSLP ? usuarioRegistroSLP(item) : (h.liquidador || item.liquidador || h.usuarioCreador || item.usuarioCreador || ""),
          candadoCerrado: (typeof isLockedItem === "function" ? isLockedItem(item) : !!(item?.candadoCerrado || item?.locked || item?.estadoCandado === "CERRADO" || item?.header?.candadoCerrado || item?.header?.estadoCandado === "CERRADO"))
        };
      });

      const totalDolaresFiltrados = rows.reduce((s,r)=>s + toNum(r.dolaresInvPago), 0);
      const totalPlantaFiltrado = rows.reduce((s,r)=>s + toNum(r.dolaresPlanta), 0);
      const totalControladorFiltrado = rows.reduce((s,r)=>s + toNum(r.dolaresControlador), 0);
      const totalPorFueraFiltrado = rows.reduce((s,r)=>s + toNum(r.dolaresPorFuera), 0);
      const totalBotonOroFiltrado = rows.reduce((s,r)=>s + toNum(r.botonOro), 0);

      const resumenControladores = useMemo(()=>{
        const map = new Map();
        rows.forEach(r=>{
          const nombre = String(r.controlador || "").trim();
          if (!nombre) return;
          const actual = map.get(nombre) || 0;
          map.set(nombre, actual + toNum(r.dolaresControlador));
        });
        return Array.from(map.entries())
          .map(([controlador, valor])=>({ controlador, valor }))
          .filter(r=>Math.abs(toNum(r.valor)) > 0.000001)
          .sort((a,b)=>a.controlador.localeCompare(b.controlador, "es"));
      }, [rows]);

      const resumenControladoresMesActual = useMemo(()=>{
        const ahora = new Date();
        const inicioMes = new Date(ahora.getFullYear(), ahora.getMonth(), 1, 0, 0, 0, 0);
        const finMes = new Date(ahora.getFullYear(), ahora.getMonth() + 1, 0, 23, 59, 59, 999);
        const mesNombre = ahora.toLocaleDateString("es-EC", { month:"long" }).toUpperCase();
        const map = new Map();
        let totalPlantaMes = 0;
        let totalPorFueraMes = 0;

        (historial || []).forEach(item=>{
          const creado = getCreatedDate(item);
          if (!creado || creado < inicioMes || creado > finMes) return;

          const h = item.header || {};
          const distribucion = getDistribucionDolares(item);
          const nombre = String(h.controlador || item.controlador || "").trim();
          const valorControlador = toNum(distribucion.controlador);

          if (nombre && Math.abs(valorControlador) > 0.000001){
            map.set(nombre, (map.get(nombre) || 0) + valorControlador);
          }

          totalPlantaMes += toNum(distribucion.planta);
          totalPorFueraMes += toNum(distribucion.porFuera);
        });

        const detalle = Array.from(map.entries())
          .map(([controlador, valor])=>({ controlador, valor }))
          .filter(r=>Math.abs(toNum(r.valor)) > 0.000001)
          .sort((a,b)=>a.controlador.localeCompare(b.controlador, "es"));

        detalle.push({ controlador:"$PLANTA", valor: totalPlantaMes });
        detalle.push({ controlador:"$POR FUERA", valor: totalPorFueraMes });

        // BOTÓN DE ORO - MES: dinero que queda en planta.
        // Considera únicamente $PLANTA + $POR FUERA y excluye lo que se llevan los controladores.
        const totalBotonOroMes = toNum(totalPlantaMes) + toNum(totalPorFueraMes);
        return { mesNombre, detalle, totalBotonOroMes, totalPlantaMes, totalPorFueraMes };
      }, [historial]);

      const exportRows = rows.map(r=>({
        "FECHA": r.fecha,
        "N° LIQ.": r.liquidacionNo,
        "PROVEEDOR": r.proveedor,
        "SEC.": r.secuencial,
        "$ DIF.": Number(r.dolaresInvPago || 0),
        "$PLANTA": Number(r.dolaresPlanta || 0),
        "$CONTROLADOR": Number(r.dolaresControlador || 0),
        "$POR FUERA": Number(r.dolaresPorFuera || 0),
        "CONTROLADOR": r.controlador || ""
      }));

      const exportResumenExcel = () => {
        const resumen = [
          ["CONCEPTO", "VALOR", "", "CONTROLADOR", "VALOR A RECIBIR"],
          ["TOTAL DÓLARES (Inv - Pago)", Number(totalDolaresFiltrados || 0), "", resumenControladores[0]?.controlador || "", Number(resumenControladores[0]?.valor || 0)],
          ["TOTAL $PLANTA", Number(totalPlantaFiltrado || 0), "", resumenControladores[1]?.controlador || "", Number(resumenControladores[1]?.valor || 0)],
          ["TOTAL $CONTROLADOR", Number(totalControladorFiltrado || 0), "", resumenControladores[2]?.controlador || "", Number(resumenControladores[2]?.valor || 0)],
          ["TOTAL $POR FUERA", Number(totalPorFueraFiltrado || 0), "", resumenControladores[3]?.controlador || "", Number(resumenControladores[3]?.valor || 0)],
          ["BOTÓN DE ORO", Number(totalBotonOroFiltrado || 0), "", resumenControladores[4]?.controlador || "", Number(resumenControladores[4]?.valor || 0)],
        ];
        resumenControladores.slice(5).forEach(r=>resumen.push(["", "", "", r.controlador, Number(r.valor || 0)]));

        const nombre = `Resumen_Historial_SLP_${filtro.desde || "SIN-DESDE"}_a_${filtro.hasta || "SIN-HASTA"}.xlsx`;

        if (window.XLSX){
          const wb = window.XLSX.utils.book_new();
          const wsResumen = window.XLSX.utils.aoa_to_sheet(resumen);
          const wsDetalle = window.XLSX.utils.json_to_sheet(exportRows);
          wsResumen["!cols"] = [{wch:34},{wch:18},{wch:4},{wch:28},{wch:18}];
          wsDetalle["!cols"] = [
            {wch:19},{wch:10},{wch:20},{wch:10},{wch:14},{wch:14},{wch:16},{wch:16},{wch:22}
          ];

          // Estilos referenciales: algunos navegadores/librerías pueden ignorarlos,
          // pero la estructura del Excel sí queda aplicada con las columnas solicitadas.
          const pastel = "D9EAD3";
          const navy = "0B2D4D";
          const blanco = "FFFFFF";
          const baseStyle = { font:{ bold:true, color:{ rgb: navy } }, alignment:{ vertical:"center" } };
          Object.keys(wsResumen).forEach(addr=>{
            if (addr[0] === "!") return;
            wsResumen[addr].s = { ...baseStyle, fill:{ fgColor:{ rgb: blanco } } };
          });
          // Encabezados de la tabla CONCEPTO/VALOR y CONTROLADOR/VALOR A RECIBIR.
          ["A1","B1","D1","E1"].forEach(addr=>{
            if (wsResumen[addr]) wsResumen[addr].s = { ...baseStyle, fill:{ fgColor:{ rgb: pastel } } };
          });
          // Fila BOTÓN DE ORO.
          ["A6","B6"].forEach(addr=>{
            if (wsResumen[addr]) wsResumen[addr].s = {
              fill:{ fgColor:{ rgb: navy } },
              font:{ bold:true, color:{ rgb: pastel } },
              alignment:{ vertical:"center" }
            };
          });
          Object.keys(wsDetalle).forEach(addr=>{
            if (addr[0] === "!") return;
            const isHeader = /^[A-Z]+1$/.test(addr);
            wsDetalle[addr].s = { ...baseStyle, fill:{ fgColor:{ rgb: isHeader ? pastel : blanco } } };
          });

          window.XLSX.utils.book_append_sheet(wb, wsResumen, "Resumen");
          window.XLSX.utils.book_append_sheet(wb, wsDetalle, "Detalle");
          window.XLSX.writeFile(wb, nombre);
          return;
        }

        const csv = [
          "CONCEPTO;VALOR;;CONTROLADOR;VALOR A RECIBIR",
          ...resumen.slice(1).map(r=>`${r[0]};${String(r[1]).replace('.', ',')};;${r[3]};${String(r[4]).replace('.', ',')}`),
          "",
          Object.keys(exportRows[0] || {}).join(";"),
          ...exportRows.map(r=>Object.values(r).map(v=>`"${String(v ?? "").replace(/"/g,'""')}"`).join(";"))
        ].join("\n");
        const blob = new Blob(["\ufeff" + csv], {type:"text/csv;charset=utf-8;"});
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = nombre.replace(/\.xlsx$/i, ".csv");
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
      };

      const imgToDataUrl = (src) => new Promise((resolve) => {
        const img = new Image();
        img.crossOrigin = "anonymous";
        img.onload = () => {
          try{
            const canvas = document.createElement("canvas");
            canvas.width = img.naturalWidth || img.width;
            canvas.height = img.naturalHeight || img.height;
            const ctx = canvas.getContext("2d");
            ctx.drawImage(img, 0, 0);
            resolve(canvas.toDataURL("image/png"));
          }catch(e){ resolve(null); }
        };
        img.onerror = () => resolve(null);
        img.src = src;
      });

      const exportResumenPdf = async () => {
        try{
          if (!window.jspdf?.jsPDF){ alert("No se pudo cargar jsPDF."); return; }
          const { jsPDF } = window.jspdf;
          const pdf = new jsPDF({ orientation:"landscape", unit:"pt", format:"a4" });
          const pageW = pdf.internal.pageSize.getWidth();
          const pastelGreen = [217,234,211];
          const pastelYellow = [255,242,204];
          const navy = [11,45,77];
          const militaryGreen = [56,87,35];

          pdf.setFont("helvetica", "bold");
          pdf.setFontSize(13);
          pdf.setTextColor(...navy);
          pdf.text("OCEANTREASURE S.A.", 40, 34);
          pdf.setFontSize(10);
          pdf.text("RESUMEN DE HISTORIAL DE LIQUIDACIONES", 40, 50);
          pdf.setFont("helvetica", "normal");
          pdf.setFontSize(8);
          pdf.setTextColor(80,80,80);
          pdf.text(`Rango: ${filtro.desde || "SIN DESDE"} hasta ${filtro.hasta || "SIN HASTA"}`, 40, 64);
          pdf.text(`Generado: ${new Date().toLocaleString("es-EC")}`, 40, 76);

          const resumenBody = [
            ["TOTAL DÓLARES (Inv - Pago)", "$ " + fmtNumEC(totalDolaresFiltrados,2)],
            ["TOTAL $PLANTA", "$ " + fmtNumEC(totalPlantaFiltrado,2)],
            ["TOTAL $CONTROLADOR", "$ " + fmtNumEC(totalControladorFiltrado,2)],
            ["TOTAL $POR FUERA", "$ " + fmtNumEC(totalPorFueraFiltrado,2)],
            ["BOTÓN DE ORO", "$ " + fmtNumEC(totalBotonOroFiltrado,2)]
          ];

          const controladorBody = [
            ...resumenControladoresMesActual.detalle.map(r=>[r.controlador, "$ " + fmtNumEC(r.valor,2)]),
            [`BOTÓN DE ORO - ${resumenControladoresMesActual.mesNombre}:`, "$ " + fmtNumEC(resumenControladoresMesActual.totalBotonOroMes,2)]
          ];

          pdf.autoTable({
            startY: 92,
            head: [["CONCEPTO", "VALOR"]],
            body: resumenBody,
            theme: "grid",
            styles: { fontSize: 8, cellPadding: 4, lineColor:[203,213,225], lineWidth:0.5, textColor:navy, fontStyle:"bold" },
            headStyles: { fillColor:pastelGreen, textColor:navy, fontStyle:"bold" },
            bodyStyles: { fillColor:[255,255,255], textColor:navy, fontStyle:"bold" },
            columnStyles: { 0:{cellWidth:210}, 1:{cellWidth:110, halign:"right"} },
            margin: { left: 40, right: 40 },
            didParseCell: (data) => {
              if (data.section === "body" && data.row.index === 4){
                data.cell.styles.fillColor = navy;
                data.cell.styles.textColor = pastelGreen;
                data.cell.styles.fontStyle = "bold";
              }
            }
          });
          const resumenFinalY = pdf.lastAutoTable?.finalY || 92;

          pdf.autoTable({
            startY: 92,
            head: [["CONTROLADOR", "VALOR A RECIBIR"]],
            body: controladorBody,
            theme: "grid",
            styles: { fontSize: 8, cellPadding: 4, lineColor:[203,213,225], lineWidth:0.5, textColor:navy, fontStyle:"bold" },
            headStyles: { fillColor:pastelGreen, textColor:navy, fontStyle:"bold" },
            bodyStyles: { fillColor:[255,255,255], textColor:navy, fontStyle:"bold" },
            columnStyles: { 0:{cellWidth:215}, 1:{cellWidth:110, halign:"right"} },
            margin: { left: 390, right: 40 },
            didParseCell: (data) => {
              if (data.section === "body" && data.row.index === controladorBody.length - 1){
                data.cell.styles.fillColor = pastelYellow;
                data.cell.styles.textColor = militaryGreen;
                data.cell.styles.fontStyle = "bold";
              }
            }
          });
          const controlFinalY = pdf.lastAutoTable?.finalY || 92;

          const detailBody = rows.map(r=>[
            r.fecha, r.liquidacionNo, r.proveedor, r.secuencial,
            "$ "+fmtNumEC(r.dolaresInvPago,2), "$ "+fmtNumEC(r.dolaresPlanta,2),
            "$ "+fmtNumEC(r.dolaresControlador,2), "$ "+fmtNumEC(r.dolaresPorFuera,2), r.controlador || ""
          ]);

          pdf.autoTable({
            startY: Math.max(resumenFinalY, controlFinalY) + 14,
            head: [["FECHA", "N°", "PROVEEDOR", "SEC.", "$ DIF.", "$PLANTA", "$CONTROL.", "$POR FUERA", "CONTROLADOR"]],
            body: detailBody,
            theme: "grid",
            styles: { fontSize: 7, cellPadding: 2.8, overflow:"ellipsize", lineColor:[203,213,225], lineWidth:0.4, textColor:navy, fontStyle:"bold" },
            headStyles: { fillColor:pastelGreen, textColor:navy, fontStyle:"bold", fontSize:7 },
            bodyStyles: { fillColor:[255,255,255], textColor:navy, fontStyle:"bold" },
            columnStyles: {
              0:{cellWidth:82}, 1:{cellWidth:42}, 2:{cellWidth:100}, 3:{cellWidth:48},
              4:{cellWidth:70, halign:"right"}, 5:{cellWidth:70, halign:"right"},
              6:{cellWidth:78, halign:"right"}, 7:{cellWidth:82, halign:"right"}, 8:{cellWidth:110}
            },
            margin: { left: 40, right: 40 },
            didDrawPage: (data) => {
              const page = pdf.internal.getNumberOfPages();
              pdf.setFontSize(7);
              pdf.setTextColor(90);
              pdf.text(`Página ${page}`, pageW - 60, pdf.internal.pageSize.getHeight() - 18);
            }
          });

          pdf.save(`Boton_de_Oro_SLP_${filtro.desde || "SIN-DESDE"}_a_${filtro.hasta || "SIN-HASTA"}.pdf`);
        }catch(err){
          console.error(err);
          alert("No se pudo generar el PDF de resumen.");
        }
      };

      return (
        <div className="card">
          <div className="h">HISTORIAL DE LIQUIDACIONES</div>
          {isAccounting && <div className="muted" style={{marginBottom:8}}>Vista Contabilidad: solo se muestran liquidaciones con candado cerrado. Acciones disponibles: PDF y EXCEL.</div>}
          <div className="historyFilters">
            <LabelInput label="DESDE" type="date" value={filtro.desde} onChange={(v)=>setFiltro({...filtro, desde:v})} />
            <LabelInput label="HASTA" type="date" value={filtro.hasta} onChange={(v)=>setFiltro({...filtro, hasta:v})} />
            <LabelInput label="MOSTRAR DESDE" type="number" value={filtro.mostrarDesde} onChange={(v)=>setFiltro({...filtro, mostrarDesde:v})} />
            <LabelInput label="MOSTRAR HASTA" type="number" value={filtro.mostrarHasta} onChange={(v)=>setFiltro({...filtro, mostrarHasta:v})} />
            <LabelInput label="FILTRAR N° LIQ." value={filtro.liquidacionNo} onChange={(v)=>setFiltro({...filtro, liquidacionNo:v})} />
            <LabelInput label="FILTRAR PROVEEDOR" value={filtro.proveedor} onChange={(v)=>setFiltro({...filtro, proveedor:v})} />
            <LabelInput label="FILTRAR SECUENCIAL" value={filtro.secuencial} onChange={(v)=>setFiltro({...filtro, secuencial:v})} />
            <LabelInput label="FILTRAR LOTE" value={filtro.lote} onChange={(v)=>setFiltro({...filtro, lote:v})} />
            <LabelInput label="FILTRAR CONTROLADOR" value={filtro.controlador} onChange={(v)=>setFiltro({...filtro, controlador:v})} />
            <div className="historyActions">
              <button className="btn" onClick={onRefresh}>{loading ? "CARGANDO..." : "ACTUALIZAR"}</button>
              <button className="btn" onClick={()=>{ const hoy = todayDateInput(); setFiltro({ liquidacionNo:"", proveedor:"", secuencial:"", lote:"", controlador:"", desde:hoy, hasta:hoy, mostrarDesde:"", mostrarHasta:"" }); }}>LIMPIAR</button>
            </div>
          </div>

          <div className="historyTotalsGrid">
            <div className="historyTotalBox"><span>TOTAL DÓLARES (Inv - Pago)</span><span className="amount">$ {fmtNumEC(totalDolaresFiltrados,2)}</span></div>
            <div className="historyTotalBox"><span>TOTAL $PLANTA</span><span className="amount">$ {fmtNumEC(totalPlantaFiltrado,2)}</span></div>
            <div className="historyTotalBox"><span>TOTAL $CONTROLADOR</span><span className="amount">$ {fmtNumEC(totalControladorFiltrado,2)}</span></div>
            <div className="historyTotalBox"><span>TOTAL $POR FUERA</span><span className="amount">$ {fmtNumEC(totalPorFueraFiltrado,2)}</span></div>
            <div className="historyTotalBox"><span>BOTÓN DE ORO</span><span className="amount">$ {fmtNumEC(totalBotonOroFiltrado,2)}</span></div>
          </div>

          <div className="historyExportActions">
            <button className="btn" onClick={exportResumenExcel}>RESUMEN EXCEL</button>
            <button className="btn" onClick={exportResumenPdf}>PDF RESUMEN</button>
          </div>

          <div className="historyTableWrap">
            <table className="historyTable">
              <thead>
                <tr>
                  <th className="col-fecha">FECHA</th>
                  <th className="col-liq">N° LIQ.</th>
                  <th className="col-prov">PROVEEDOR</th>
                  <th className="col-sec">SEC.</th>
                  <th className="col-rec">RECIBIDO</th>
                  <th className="col-emp">EMPACADO</th>
                  <th className="col-rend">REND</th>
                  <th className="col-dif">$ DIF.</th>
                  <th className="col-planta">$PLANTA</th>
                  <th className="col-ctrlv">$CONTROL.</th>
                  <th className="col-fuera">$POR FUERA</th>
                  <th className="col-lock">CAND.</th>
                  <th className="col-controlador">CONTROLADOR</th>
                  <th className="col-liquidador">LIQUIDADOR</th>
                  <th className="col-acciones">ACCIONES</th>
                </tr>
              </thead>
              <tbody>
                {rows.map((r,idx)=>(
                  <tr key={(r.liquidacionNo || "liq") + "_" + idx} className={r.esSLP ? "slpPagoRow" : ""}>
                    <td className="col-fecha" title={r.fecha}>{r.fecha}</td>
                    <td className="col-liq" title={r.liquidacionNo}>{r.liquidacionNo}</td>
                    <td className="col-prov" title={r.proveedor}>{r.proveedor}</td>
                    <td className="col-sec" title={r.secuencial}>{r.secuencial}</td>
                    <td className="col-rec right">{fmtNumEC(r.recibido,2)}</td>
                    <td className="col-emp right">{fmtNumEC(r.empacado,2)}</td>
                    <td className="col-rend right">{fmtNumEC((r.rendimiento||0)*100,2)}%</td>
                    <td className="col-dif right">$ {fmtNumEC(r.dolaresInvPago,2)}</td>
                    <td className="col-planta right">$ {fmtNumEC(r.dolaresPlanta,2)}</td>
                    <td className="col-ctrlv right">$ {fmtNumEC(r.dolaresControlador,2)}</td>
                    <td className="col-fuera right">$ {fmtNumEC(r.dolaresPorFuera,2)}</td>
                    <td className="col-lock" title={r.candadoCerrado ? "Candado cerrado" : "Candado abierto"}>
                      <span className={"lockIcon " + (r.candadoCerrado ? "closed" : "open")}>{r.candadoCerrado ? "🔒" : "🔓"}</span>
                    </td>
                    <td className="col-controlador" title={r.controlador}>{r.controlador}</td>
                    <td className="col-liquidador" title={r.liquidador}>{r.liquidador}</td>
                    <td className="col-acciones">
                      <div className="actionsCell">
                        {isAccounting ? (
                          <>
                            <button className="btn" onClick={()=>onPdfItem && onPdfItem(r.raw)}>PDF</button>
                            <button className="btn" onClick={()=>onExcelItem && onExcelItem(r.raw)}>EXCEL</button>
                          </>
                        ) : (
                          <>
                            <button className="btn" onClick={()=>onOpen(r.raw)}>ABRIR</button>
                            {!r.candadoCerrado && puedeAccionarHistorial(r.raw) && (
                              <>
                                <button className="btn" onClick={()=>onEdit(r.raw)}>EDITAR</button>
                                <button className="btn btnDanger" onClick={()=>onDelete(r.raw)}>ELIM.</button>
                              </>
                            )}
                            {!r.candadoCerrado && !puedeAccionarHistorial(r.raw) && (
                              <button className="btn" title={mensajePrivacidad(r.raw)} onClick={()=>alert(mensajePrivacidad(r.raw))}>SOLO CONSULTA</button>
                            )}
                          </>
                        )}
                      </div>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          <div className="muted" style={{marginTop:8}}>{isAccounting ? "Contabilidad visualiza únicamente registros cerrados disponibles para revisión." : "Se muestran hasta los últimos 200 registros guardados en Firestore."}</div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>

  <!-- Recomendación: abrir en localhost para que el Guardar como funcione mejor -->

<script id="slm-historial-delete-open-lock-fix">
(function(){
  // Refuerzo de privacidad aplicado en React:
  // liquidaciones abiertas solo pueden editarse/eliminarse por su creador o por Jefferson administrador.
})();
</script>
</body>
</html>
