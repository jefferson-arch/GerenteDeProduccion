    /* --- Efecto HALO para botones principales y PRECIO --- */
    .btnHalo{
      --halo-rgb: 14,165,164;
      position:relative;
      overflow:visible;
      transition: transform .12s ease, box-shadow .18s ease, filter .18s ease;
      isolation:isolate;
    }
    .btnHalo::after{
      content:"";
      position:absolute;
      inset:-7px;
      border-radius:3px;
      pointer-events:none;
      opacity:0;
      z-index:-1;
      box-shadow:0 0 0 0 rgba(var(--halo-rgb),.58), 0 0 18px 4px rgba(var(--halo-rgb),.42);
    }
    .btnHalo:active:not(:disabled){
      transform:scale(.96);
      filter:brightness(1.05);
      box-shadow:0 0 0 3px rgba(var(--halo-rgb),.30), 0 0 18px rgba(var(--halo-rgb),.60);
    }
    .btnHalo.haloActive::after{ animation: haloPulse .62s ease-out; }
    .btnHaloNuevo{ --halo-rgb: 59,130,246; }
    .btnHaloLiquidar{ --halo-rgb: 245,158,11; }
    .btnHaloGuardar{ --halo-rgb: 22,163,74; }
    .btnHaloEditar{ --halo-rgb: 14,165,164; }
    .btnHaloPdf{ --halo-rgb: 168,85,247; }
    @keyframes haloPulse{
      0%{ opacity:1; transform:scale(.92); }
      70%{ opacity:.72; transform:scale(1.13); }
      100%{ opacity:0; transform:scale(1.24); }
    }

<body>

  <!-- Firebase Auth Gate (login único) -->
  <div id="authGate" class="auth-gate">
    <div class="auth-card">
      <div class="auth-title">Liquidación de Pago</div>
      <div class="auth-sub"><img class="auth-logo" src="logo_pdf_blanco.png" alt="Oceantreasure" /></div>

      <form id="loginForm" class="auth-form" autocomplete="on">
        <label for="loginEmail">Usuario</label>
        <input id="loginEmail" type="email" inputmode="email" autocomplete="username" />

        <label for="loginPassword">Contraseña</label>
        <div class="auth-passwrap">
          <input id="loginPassword" type="password" autocomplete="current-password" />
          <button id="togglePass" class="auth-eye" type="button" aria-label="Mostrar/Ocultar contraseña">👁</button>
        </div>

        <div id="loginError" class="auth-error"></div>

        <button id="loginBtn" class="auth-btn" type="submit">Ingresar</button>
      </form>
    </div>
  </div>

  <button id="logoutBtn" class="auth-logout" type="button">Salir</button>


  <div id="root"></div>

  <script id="slp-white-screen-guard">
    (function(){
      window.mostrarErrorSLP = function(msg){
        try{
          var root = document.getElementById("root");
          if (!root) return;
          root.innerHTML = '<div style="margin:24px auto;max-width:760px;background:#fff;border:1px solid #dc2626;color:#7f1d1d;border-radius:12px;padding:18px;font-family:Arial,Helvetica,sans-serif;box-shadow:0 10px 30px rgba(0,0,0,.12)"><h2 style="margin:0 0 8px;color:#991b1b;font-size:18px">SLP no pudo cargar correctamente</h2><div style="font-size:14px;line-height:1.45">'+ String(msg || "Error desconocido").replace(/[<>&]/g,function(c){return {"<":"&lt;",">":"&gt;","&":"&amp;"}[c];}) +'</div><div style="margin-top:10px;font-size:12px;color:#475569">Esta pantalla reemplaza la página en blanco para poder identificar el problema.</div></div>';
        }catch(e){}
      };
      window.addEventListener("error", function(ev){
        window.mostrarErrorSLP(ev && ev.message ? ev.message : "Error JavaScript al iniciar SLP.");
      });
      window.addEventListener("unhandledrejection", function(ev){
        var r = ev && ev.reason;
        window.mostrarErrorSLP((r && (r.message || r.code)) ? (r.message || r.code) : "Promesa rechazada al iniciar SLP.");
      });
    })();
  </script>

  <script type="module">

const firebaseConfig = {

    // Sonido tipo caja registradora al presionar INGRESAR.
    // Se genera con Web Audio para no depender de archivos externos.
    function playCashRegisterSound(){
      try{
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        if (!AudioCtx) return;
        const ctx = new AudioCtx();
        const master = ctx.createGain();
        master.gain.setValueAtTime(0.0001, ctx.currentTime);
        master.gain.exponentialRampToValueAtTime(0.32, ctx.currentTime + 0.015);
        master.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.95);
        master.connect(ctx.destination);

        const bell = (freq, start, dur, vol=0.35) => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = "triangle";
          osc.frequency.setValueAtTime(freq, ctx.currentTime + start);
          gain.gain.setValueAtTime(0.0001, ctx.currentTime + start);
          gain.gain.exponentialRampToValueAtTime(vol, ctx.currentTime + start + 0.012);
          gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + start + dur);
          osc.connect(gain);
          gain.connect(master);
          osc.start(ctx.currentTime + start);
          osc.stop(ctx.currentTime + start + dur + 0.03);
        };

        bell(1174.66, 0.00, 0.18, 0.32);
        bell(1567.98, 0.08, 0.22, 0.28);
        bell(2093.00, 0.18, 0.28, 0.24);
        bell(880.00,  0.36, 0.18, 0.22);
