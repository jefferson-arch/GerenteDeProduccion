<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Oceantreasure — Liquidación de Pago (Web)</title>
  <style>
    :root { --navy:#0b2d4d; --teal:#0ea5a4; --soft:#f3f6fb; --card:#ffffff; --grid:#cbd5e1; --grid2:#94a3b8; --bg:var(--soft); --muted:#64748b; }
    body{ margin:0; font-family: Arial, Helvetica, sans-serif; background:var(--bg); color:#111827;}
    .top{ border-bottom:1px solid var(--grid); }
    .wrap{ max-width: 1150px; margin:0 auto; padding:0 12px; }
    .topbar{ display:flex; justify-content:space-between; align-items:center; gap:12px; padding:10px 0;}
    .brand{ display:flex; align-items:center; gap:12px;}
    .brand .t{ font-weight:700; letter-spacing:.5px; font-size:12px;}
    .brand .s{ color:var(--muted); font-size:12px;}
    .btn{ border:1px solid var(--muted); background:#f3f4f6; padding:7px 12px; font-size:12px; font-weight:700; border-radius:0; cursor:pointer;}
    .btn:hover{ background:#e5e7eb;}
    .tabs{ display:flex; gap:6px; border-bottom:1px solid var(--grid); padding-top:10px;}
    .tab{ border:1px solid var(--grid); border-bottom:0; padding:7px 10px; font-size:12px; font-weight:700; background:#f9fafb; cursor:pointer; border-radius:0;}
    .tab.active{ background:#fff; border-color:var(--grid2); position:relative; top:1px;}
    .panel{ padding:12px 0 20px;} /* tighter */
    .card{ border:1px solid var(--grid); padding:10px; } /* tighter */
    .grid{ display:grid; gap:10px; } /* tighter */
    .grid-2{ grid-template-columns: 1fr 1fr; }
    .grid-3{ grid-template-columns: 1.25fr 1fr 1fr; }
    @media (max-width: 1024px){
      .grid-3{ grid-template-columns: 1fr; }
      .grid-2{ grid-template-columns: 1fr; }
    }
    .h{ font-size:13px; font-weight:700; margin:0 0 8px;}
    .muted{ color:var(--muted); font-size:12px;}
    label{ font-size:11px; color:var(--muted); display:block; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    input{ width:100%; border:1px solid var(--grid); padding:6px 8px; font-size:12px; border-radius:0; outline:none; background:#fff;}
    input:focus{ border-color:var(--muted); }

    /* ---- Compact rows (DATOS table) ---- */
    .inp-cell{ padding:2px 6px; height:20px; } /* smaller input height */
    table{ border-collapse:collapse; table-layout:fixed; font-size:12px; }
    th,td{ border:1px solid var(--grid); padding:3px 5px; vertical-align:middle;}
    th{ background:#fff; font-weight:700; text-align:left; position:relative; }
    .compact th, .compact td{ padding:2px 4px; }
    .compact { font-size:11px; }
    .compact input{ font-size:11px; }

    .resize-handle{ position:absolute; top:0; right:0; width:8px; height:100%; cursor:col-resize; user-select:none;}
    .right{ text-align:right;}
    .toast{ position:fixed; left:50%; transform:translateX(-50%); bottom:18px; z-index:9999;}
    .toastbox{ background:#111; color:#fff; border:1px solid #444; padding:8px 10px; font-size:12px; display:flex; gap:12px; align-items:center;}
    .link{ color:#fff; text-decoration:underline; cursor:pointer; opacity:.85;}
    .link:hover{ opacity:1;}

    /* ---- LIQUIDACION (print look) ---- */
    .liq{ width:430px; background:#fff; border:1px solid #9ca3af; padding:8px;} /* narrower */
    .liqHeaderRow{ display:grid; grid-template-columns: 1fr 1fr 1fr; border-bottom:1px solid var(--grid); padding:3px 0; font-size:11px;}
    .liqHeaderRow .lab{ font-weight:700;}
    .liqHeaderRow .val{ grid-column:2 / 4; text-align:right; font-weight:700;}
    .pdfbox{ border:1px solid #6b7280; padding:18px 40px; font-size:11px; } /* compact */
    .classTitle{ background:#d1d5db; border:1px solid #6b7280; font-weight:700; text-align:center; padding:3px 0; font-size:11px;}
    .classHead{ display:grid; grid-template-columns: 1fr 1fr 1fr; background:#6b7280; color:#fff; font-weight:700; font-size:11px; border-left:1px solid #6b7280; border-right:1px solid #6b7280;}
    .classHead div{ padding:3px 5px; border-right:1px solid #6b7280;}
    .classHead div:last-child{ border-right:0;}
    .classBody{ border:1px solid #6b7280; border-top:0;}
    .classRow{ display:grid; grid-template-columns: 1fr 1fr 1fr; font-size:11px;}
    .classRow div{ padding:3px 5px;}
    .classRow .r{ text-align:right;}
    .subRow{ border-top:1px solid #6b7280; font-weight:700;}
  
    .top{ background: var(--navy); border-bottom:1px solid var(--grid2); }
    .brand .t, .brand .s{ color:#fff; }
    .btn{ border:1px solid rgba(255,255,255,.35); background:#ffffff; color:var(--navy); }
    .btn:hover{ background:#e2e8f0; }
    .tabs{ background:transparent; }
    .tab{ background: #e8eef7; color: var(--navy); }
    .tab.active{ border-top:2px solid var(--teal); }
    .card{ background: var(--card); box-shadow: 0 1px 0 rgba(15,23,42,.04); }
    .h{ color: var(--navy); }

  

    /* --- Firebase Auth Gate --- */
    .auth-gate{
      position:fixed; inset:0;
      display:flex; align-items:center; justify-content:center;
      background: radial-gradient(1200px 600px at 50% 20%, rgba(148,163,184,.55), rgba(2,6,23,.92));
      z-index:99999;
      padding:16px;
    }
    .auth-card{
      width: 390px; max-width: 92vw;
      background:#ffffff;
      border-radius:14px;
      padding:20px 22px 18px;
      box-shadow: 0 18px 60px rgba(0,0,0,.35);
      border:1px solid rgba(15,23,42,.12);
    }
    .auth-title{ font-size:18px; font-weight:800; text-align:center; color: var(--navy); }
    .auth-sub{ margin-top:4px; text-align:center; color:#6b7280; font-size:12px; }
    .auth-allowed{ margin-top:10px; text-align:center; color:#6b7280; font-size:12px; }
    .auth-form{ margin-top:14px; }
    .auth-form label{ margin-top:10px; font-size:12px; color:#374151; }
    .auth-form input{
      margin-top:6px;
      width:100%;
      border:1px solid #d1d5db;
      border-radius:10px;
      padding:9px 10px;
      font-size:13px;
      outline:none;
      background:#fff;
    }
    .auth-form input:focus{ border-color:#2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,.12); }
    .auth-passwrap{ position:relative; }
    .auth-eye{
      position:absolute; right:8px; top:50%; transform:translateY(-50%);
      border:0; background:transparent; cursor:pointer;
      font-size:16px; padding:6px; line-height:1;
      opacity:.65;
    }
    .auth-eye:hover{ opacity:1; }
    .auth-error{ margin-top:10px; color:#dc2626; font-size:12px; min-height:16px; text-align:center; }
    .auth-btn{
      margin-top:10px;
      width:100%;
      border:0;
      background:#2563eb;
      color:#fff;
      font-weight:800;
      border-radius:10px;
      padding:10px 12px;
      cursor:pointer;
      font-size:13px;
    }
    .auth-btn:hover{ filter:brightness(.95); }
    .auth-btn:disabled{ opacity:.6; cursor:not-allowed; }
    .auth-logout{
      position:fixed; right:14px; bottom:14px; z-index:99998;
      border:1px solid rgba(255,255,255,.35);
      background:#ffffff;
      color: var(--navy);
      font-weight:800;
      font-size:12px;
      padding:9px 12px;
      border-radius:10px;
      cursor:pointer;
      box-shadow: 0 10px 30px rgba(0,0,0,.25);
      display:none;
    }
    .auth-logout:hover{ background:#e2e8f0; }



    /* --- SLP historial / PDF extras --- */
    .btnSave{ background:#16a34a !important; color:#fff !important; border-color:#15803d !important; }
    .btnDanger{ background:#fee2e2 !important; color:#991b1b !important; border-color:#fecaca !important; }
    .logoBox{ border:1px solid #6b7280; padding:6px; width:150px; min-height:54px; display:flex; align-items:center; justify-content:center; background:#fff; }
    .logoBox img{ max-width:138px; max-height:62px; object-fit:contain; }
    .signArea{ margin-top:18px; display:grid; grid-template-columns:1fr 1fr 1fr; gap:18px; align-items:end; font-size:10px; }
    .signBox{ min-height:54px; display:flex; flex-direction:column; justify-content:flex-end; align-items:center; text-align:center; }
    .signBox img{ max-width:118px; max-height:42px; object-fit:contain; margin-bottom:2px; }
    .signLine{ width:100%; border-top:1px solid #111; padding-top:3px; font-weight:700; }
    .historyFilters{ display:grid; grid-template-columns:1fr 1fr 1fr auto; gap:8px; align-items:end; margin-bottom:10px; }
    @media(max-width:800px){ .historyFilters{ grid-template-columns:1fr; } .signArea{ gap:8px; } .logoBox{ width:120px; } }

  </style>

  <!-- Firebase Auth Gate (login único) -->
  <div id="authGate" class="auth-gate">

  <div id="root"></div>


  <!-- Firebase (Auth) - SDK modular (CDN) -->
  <script type="module">
    // ========= 1) CONFIGURACIÓN =========
    // For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyCMoLkSnnLowMagRNL7O6ttPo1FXd1URac",
  authDomain: "oceantreasure-app.firebaseapp.com",
  projectId: "oceantreasure-app",
  storageBucket: "oceantreasure-app.firebasestorage.app",
  messagingSenderId: "553014659258",
  appId: "1:553014659258:web:cfc30844a88433b7b79a83",
  measurementId: "G-HMMQKJY8NJ"
};

    // Login único permitido
    const ALLOWED_EMAIL = "liquidacionesdepago@oceantreasure.local";

    // ========= 2) IMPORTS =========
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import {
      getAuth,
      setPersistence,
      browserLocalPersistence,
      onAuthStateChanged,
      signInWithEmailAndPassword,
      signOut
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
    import {
      getFirestore, collection, addDoc, getDocs, query, orderBy, limit, deleteDoc, doc, updateDoc, serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

    // ========= 3) UI =========
    const gate = document.getElementById("authGate");
    const form = document.getElementById("loginForm");
    const emailEl = document.getElementById("loginEmail");
    const passEl = document.getElementById("loginPassword");
    const errEl  = document.getElementById("loginError");
    const btnEl  = document.getElementById("loginBtn");
    const togEl  = document.getElementById("togglePass");
    const logoutBtn = document.getElementById("logoutBtn");

    // Prefill y bloqueo del usuario
    emailEl.value = ALLOWED_EMAIL;
    emailEl.readOnly = true;

    const showError = (msg) => { errEl.textContent = msg || ""; };
    const setLoading = (on) => {
      btnEl.disabled = !!on;
      btnEl.textContent = on ? "Ingresando..." : "Ingresar";
    };

    togEl.addEventListener("click", () => {
      passEl.type = (passEl.type === "password") ? "text" : "password";
    });

    // ========= 4) INIT =========
    const isPlaceholder = (v) => (typeof v === "string" && v.startsWith("PEGA_AQUI"));
    if (isPlaceholder(firebaseConfig.apiKey) || isPlaceholder(firebaseConfig.authDomain) || isPlaceholder(firebaseConfig.projectId) || isPlaceholder(firebaseConfig.appId)){
      showError("Falta pegar tu firebaseConfig en el HTML (Project settings → Your apps → Config).");
      // no inicializamos Firebase para evitar errores
    } else {
      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const db = getFirestore(app);

      // Servicios disponibles para la app React (guardar historial en Firestore)
      window.SLP_FIREBASE = { db, collection, addDoc, getDocs, query, orderBy, limit, deleteDoc, doc, updateDoc, serverTimestamp };

      // Persistencia local (para no pedir login cada vez)
      await setPersistence(auth, browserLocalPersistence);

      // Exponemos un logout simple para el botón "Salir"
      logoutBtn.addEventListener("click", async () => {
        try { await signOut(auth); } catch(e){}
      });

      onAuthStateChanged(auth, async (user) => {
        if (user && user.email === ALLOWED_EMAIL) {
          gate.style.display = "none";
          logoutBtn.style.display = "inline-flex";
          showError("");
        } else {
          logoutBtn.style.display = "none";
          gate.style.display = "flex";
          if (user) {
            await signOut(auth);
          }
        }
      });

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        showError("");
        setLoading(true);

        const email = (emailEl.value || "").trim().toLowerCase();
        const pass  = passEl.value || "";

        if (email !== ALLOWED_EMAIL) {
          setLoading(false);
          showError("Este usuario no está autorizado para esta página.");
          return;
        }
        if (!pass) {
          setLoading(false);
          showError("Ingresa la contraseña.");
          return;
        }

        try{
          const cred = await signInWithEmailAndPassword(auth, email, pass);
          if (cred?.user?.email !== ALLOWED_EMAIL) {
            await signOut(auth);
            showError("Este usuario no está autorizado para esta página.");
          }
        }catch(err){
          const code = err?.code || "";
          if (code.includes("auth/invalid-credential") || code.includes("auth/wrong-password")) {
            showError("Usuario o contraseña incorrectos.");
          } else if (code.includes("auth/too-many-requests")) {
            showError("Demasiados intentos. Espera un momento y vuelve a intentar.");
          } else if (code.includes("auth/user-not-found")) {
            showError("El usuario no existe en Firebase Authentication.");
          } else {
            showError("No se pudo iniciar sesión. Revisa configuración y dominios autorizados.");
            console.error(err);
          }
        }finally{
          setLoading(false);
          passEl.focus();
        }
      });
    }
  </script>


  <!-- React + Babel (CDN) -->

  <script type="text/babel">
    const { useEffect, useMemo, useRef, useState } = React;

    const LB_PER_KG = 2.2;

    const TALLAS_A_B = ["U12","U15","16-20","21-25","26-30","31-35","36-40","41-50","51-60","61-70","71-90","91-110"];
    const TALLAS_C = ["BL","BM","BS","BVS","JUVENIL","ROJO"];
    const ALL_TALLAS = [...TALLAS_A_B, ...TALLAS_C];

    // Promedio "talla cola" (conteo por libra) usado en el Excel para cálculos de gramos
    const TALLA_MID = {
      "U12": 11,
      "U15": 13,
      "16-20": 18,
      "21-25": 23,
      "26-30": 28,
      "31-35": 33,
      "36-40": 38,
      "41-50": 45.5,
      "51-60": 55.5,
      "61-70": 65.5,
      "71-90": 80.5,
      "91-110": 100.5,
    };


    const DEFAULT_PRICES = {
      "U12": { A: 2.8 },
      "U15": { A: 2.6 },
      "16-20": { A: 2.4 },
      "21-25": { A: 2.2 },
      "26-30": { A: 2.15 },
      "31-35": { A: 2.05 },
      "36-40": { A: 2.0 },
      "41-50": { A: 1.9 },
      "51-60": { A: 1.65 },
      "61-70": { A: 1.4 },
      "71-90": { A: 1.35 },
      "91-110": { A: 0.9 },
      "BL": { C: 0.50 },
      "BM": { C: 0.40 },
      "BS": { C: 0.30 },
      "BVS": { C: 0.20 },
      "JUVENIL": { C: 0.20 },
      "ROJO": { C: 0.20 },
    };

    function pad2(n){ return String(n).padStart(2,"0"); }
    function nowStamp(){
      const d = new Date();
      return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}_${pad2(d.getHours())}-${pad2(d.getMinutes())}-${pad2(d.getSeconds())}`;
    }
    function cleanFileName(s){
      return (s||"").toString().trim().replace(/[\\/:*?"<>|]/g," ").replace(/\s+/g," ").trim();
    }
    function formatLiquidacionNo(n){
      const num = Number(n || 0);
      if (!Number.isFinite(num) || num <= 0) return "0000001";
      return String(Math.trunc(num)).padStart(7, "0");
    }
    function liquidacionSeqFromNo(v){
      const num = Number(String(v || "").replace(/\D/g, ""));
      return Number.isFinite(num) && num > 0 ? Math.trunc(num) : 0;
    }
    function fmtNumEC(n, decimals=2){
      if (n===null || n===undefined || Number.isNaN(n)) return "";
      const sign = n<0 ? "-" : "";
      const abs = Math.abs(n);
      const fixed = abs.toFixed(decimals);
      const [intPart, decPart] = fixed.split(".");
      const withThousands = intPart.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
      return decimals>0 ? `${sign}${withThousands},${decPart}` : `${sign}${withThousands}`;
    }
    function toNum(v){
      if (v==="" || v===null || v===undefined) return 0;
      const n = Number(v);
      return Number.isFinite(n) ? n : 0;
    }

    function Toast({msg, onClose}){
      if (!msg) return null;
      return (
        <div className="toast">
          <div className="toastbox">
            <span>{msg}</span>
            <span className="link" onClick={onClose}>Cerrar</span>
          </div>
        </div>
      );
    }

    function ResizableTable({columns, rows, rowKey, tableClassName}){
      const [widths, setWidths] = useState(() => columns.map(c => c.width || 120));

      useEffect(() => {
        setWidths(columns.map(c => c.width || 120));
      }, [columns.length]);

      const onMouseDown = (idx, e) => {
        e.preventDefault();
        const startX = e.clientX;
        const startW = widths[idx];
        const move = (ev) => {
          const dx = ev.clientX - startX;
          setWidths(w => {
            const next = [...w];
            next[idx] = Math.max(55, startW + dx);
            return next;
          });
        };
        const up = () => {
          window.removeEventListener("mousemove", move);
          window.removeEventListener("mouseup", up);
        };
        window.addEventListener("mousemove", move);
        window.addEventListener("mouseup", up);
      };

      return (
        <div style={{overflow:"auto"}}>
          <table className={tableClassName || ""}>
            <thead>
              <tr>
                {columns.map((c,i)=>(
                  <th key={c.key} style={{width: widths[i]}}>
                    <span style={{display:"inline-block", maxWidth:"100%", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap"}}>
                      {c.title}
                    </span>
                    <span className="resize-handle" onMouseDown={(e)=>onMouseDown(i,e)} title="Arrastra para ajustar ancho"></span>
                  </th>
                ))}
              </tr>
            </thead>
            <tbody>
              {rows.map((r,ri)=>(
                <tr key={rowKey ? rowKey(r,ri) : ri}>
                  {columns.map((c,ci)=>(
                    <td key={c.key} style={{width: widths[ci]}} className={c.tdClassName || ""}>
                      {c.render ? c.render(r,ri) : r[c.key]}
                    </td>
                  ))}
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    }

    const TABS = ["DATOS","PRECIO","CALCULO","LIQUIDACION","HISTORIAL"];

    function App(){
      const [proveedor, setProveedor] = useState("");
      const [liquidacionNo, setLiquidacionNo] = useState("0000001");
      const [secuencial, setSecuencial] = useState("");
      const [lote, setLote] = useState("");
      const [controlador, setControlador] = useState("");
      const [liquidador, setLiquidador] = useState("");
      const [piscina, setPiscina] = useState("");
      const [guia, setGuia] = useState("");
      const [planta, setPlanta] = useState("");
      const [basura, setBasura] = useState("");

      const [pesoAkg, setPesoAkg] = useState(2.00);
      const [pesoBkg, setPesoBkg] = useState(2.00);
      const [pesoClbs, setPesoClbs] = useState(5.0);

      const zeroAll = useMemo(()=>Object.fromEntries(ALL_TALLAS.map(t=>[t,0])), []);
      const [invA, setInvA] = useState(()=>({...zeroAll}));
      const [invB, setInvB] = useState(()=>({...zeroAll}));
      const [invC, setInvC] = useState(()=>({...zeroAll}));
      const [payA, setPayA] = useState(()=>({...zeroAll}));
      const [payB, setPayB] = useState(()=>({...zeroAll}));
      const [payC, setPayC] = useState(()=>({...zeroAll}));

      const [prices, setPrices] = useState(()=>{
        const out = {};
        for (const t of ALL_TALLAS){
          const base = DEFAULT_PRICES[t] || {};
          const A = base.A ?? (TALLAS_A_B.includes(t) ? 0 : undefined);
          const B = TALLAS_A_B.includes(t) ? (A ?? 0) - 0.3 : undefined;
          const C = base.C ?? (TALLAS_C.includes(t) ? 0 : undefined);
          out[t] = { A, B, C };
        }
        return out;
      });

      const [tab, setTab] = useState("DATOS");
      const [toast, setToast] = useState("");
      const [liquidacionSnap, setLiquidacionSnap] = useState(null);
      const [historial, setHistorial] = useState([]);
      const [historialLoading, setHistorialLoading] = useState(false);
      const [historialFiltro, setHistorialFiltro] = useState({ liquidacionNo:"", proveedor:"", secuencial:"", lote:"" });
      const [historialDocId, setHistorialDocId] = useState(null);
      const liqRef = useRef(null);
      const lastSavedSeqRef = useRef(0);

      const enLbsA = useMemo(()=>toNum(pesoAkg)*LB_PER_KG, [pesoAkg]);
      const enLbsB = useMemo(()=>toNum(pesoBkg)*LB_PER_KG, [pesoBkg]);
      const enLbsC = useMemo(()=>toNum(pesoClbs), [pesoClbs]);

      const recibido = useMemo(()=>toNum(planta)-toNum(basura), [planta, basura]);

      const buildBlock = (mode) => {
        const qA = mode==="inv" ? invA : payA;
        const qB = mode==="inv" ? invB : payB;
        const qC = mode==="inv" ? invC : payC;

        const rowsA = TALLAS_A_B.map(t=>{
          const qty = toNum(qA[t]);
          const lbs = qty * enLbsA;
          const price = toNum(prices[t]?.A);
          const dollars = lbs * price;
          return { classKey:"A", talla:t, qty, lbs, price, dollars };
        });
        const rowsB = TALLAS_A_B.map(t=>{
          const qty = toNum(qB[t]);
          const lbs = qty * enLbsB;
          const price = toNum(prices[t]?.B);
          const dollars = lbs * price;
          return { classKey:"B", talla:t, qty, lbs, price, dollars };
        });
        const rowsC = TALLAS_C.map(t=>{
          const qty = toNum(qC[t]);
          const lbs = qty * enLbsC;
          const price = toNum(prices[t]?.C);
          const dollars = lbs * price;
          return { classKey:"C", talla:t, qty, lbs, price, dollars };
        });

        const totals = {
          qtyA: rowsA.reduce((s,r)=>s+r.qty,0), lbsA: rowsA.reduce((s,r)=>s+r.lbs,0), dollarsA: rowsA.reduce((s,r)=>s+r.dollars,0),
          qtyB: rowsB.reduce((s,r)=>s+r.qty,0), lbsB: rowsB.reduce((s,r)=>s+r.lbs,0), dollarsB: rowsB.reduce((s,r)=>s+r.dollars,0),
          qtyC: rowsC.reduce((s,r)=>s+r.qty,0), lbsC: rowsC.reduce((s,r)=>s+r.lbs,0), dollarsC: rowsC.reduce((s,r)=>s+r.dollars,0),
        };
        const grand = { qty: totals.qtyA+totals.qtyB+totals.qtyC, lbs: totals.lbsA+totals.lbsB+totals.lbsC, dollars: totals.dollarsA+totals.dollarsB+totals.dollarsC };
        return { rowsA, rowsB, rowsC, totals, grand };
      };

      const calcInv = useMemo(()=>buildBlock("inv"), [invA, invB, invC, prices, enLbsA, enLbsB, enLbsC]);
      const calcPay = useMemo(()=>buildBlock("pay"), [payA, payB, payC, prices, enLbsA, enLbsB, enLbsC]);

      const empacado = useMemo(()=>calcPay.grand.lbs, [calcPay.grand.lbs]);
      const rendimiento = useMemo(()=> (recibido!==0 ? empacado/recibido : 0), [empacado, recibido]);

      const diffLbs = useMemo(()=>calcInv.grand.lbs - calcPay.grand.lbs, [calcInv.grand.lbs, calcPay.grand.lbs]);
      const diffDollars = useMemo(()=>calcInv.grand.dollars - calcPay.grand.dollars, [calcInv.grand.dollars, calcPay.grand.dollars]);

      // ---- Tabla de control: Gramo Entero / Gramo Cola / Talla Cola (como en Excel DATOS!M13:M15) ----
      // Q32 = SUM(Q2:Q25) = sumatoria de (lbs de A y B) * (454 / tallaPromedio)
      const gramosColaTotal = useMemo(()=>{
        let sum = 0;
        // Clase A
        for (const r of calcPay.rowsA){
          const mid = TALLA_MID[r.talla];
          if (!mid) continue;
          sum += toNum(r.lbs) * (454 / mid);
        }
        // Clase B
        for (const r of calcPay.rowsB){
          const mid = TALLA_MID[r.talla];
          if (!mid) continue;
          sum += toNum(r.lbs) * (454 / mid);
        }
        return sum;
      }, [calcPay.rowsA, calcPay.rowsB]);

      // M14 = Q32 / L32  (L32 incluye también Clase C, tal como está armado en el Excel)
      const gramoCola = useMemo(()=>{
        const denom = toNum(calcPay.grand.lbs);
        if (denom===0) return null;
        return gramosColaTotal / denom;
      }, [gramosColaTotal, calcPay.grand.lbs]);

      // M13 = M14 / 0.66
      const gramoEntero = useMemo(()=>{
        if (gramoCola===null) return null;
        return gramoCola / 0.66;
      }, [gramoCola]);

      // M15 = 454 / M14
      const tallaCola = useMemo(()=>{
        if (!gramoCola || gramoCola===0) return null;
        return 454 / gramoCola;
      }, [gramoCola]);


      const getNextLiquidacionSeq = async () => {
        const fb = window.SLP_FIREBASE;
        if (!fb?.db) return liquidacionSeqFromNo(liquidacionNo) || 1;
        try{
          const q = fb.query(
            fb.collection(fb.db, "slp_liquidaciones_pago"),
            fb.orderBy("liquidacionSeq", "desc"),
            fb.limit(1)
          );
          const snapDocs = await fb.getDocs(q);
          if (snapDocs.empty) return 1;
          const last = snapDocs.docs[0].data();
          const lastSeq = Number(last.liquidacionSeq || liquidacionSeqFromNo(last.liquidacionNo));
          return (Number.isFinite(lastSeq) ? Math.trunc(lastSeq) : 0) + 1;
        }catch(err){
          console.warn("No se pudo consultar el último N° de liquidación.", err);
          return liquidacionSeqFromNo(liquidacionNo) || 1;
        }
      };

      const cargarSiguienteLiquidacionNo = async () => {
        const nextSeq = await getNextLiquidacionSeq();
        setLiquidacionNo(formatLiquidacionNo(nextSeq));
        return nextSeq;
      };

      useEffect(()=>{
        const t1 = setTimeout(()=>{ cargarSiguienteLiquidacionNo(); }, 450);
        const t2 = setTimeout(()=>{ cargarSiguienteLiquidacionNo(); }, 1500);
        return ()=>{ clearTimeout(t1); clearTimeout(t2); };
      }, []);

      const liquidacionData = useMemo(()=>{
        const a = calcPay.rowsA.filter(r=>r.qty!==0 || r.lbs!==0);
        const b = calcPay.rowsB.filter(r=>r.qty!==0 || r.lbs!==0);
        const c = calcPay.rowsC.filter(r=>r.qty!==0 || r.lbs!==0);

        const subtotal = (rows)=>({ qty: rows.reduce((s,r)=>s+r.qty,0), lbs: rows.reduce((s,r)=>s+r.lbs,0) });

        return {
          header: { liquidacionNo, liquidacionSeq: liquidacionSeqFromNo(liquidacionNo), proveedor, secuencial, lote, controlador, liquidador, gerenteProduccion:"Jefferson Figueroa Rosales", piscina, guia, planta, basura, recibido, empacado, rendimiento },
          classA: { rows: a, sub: subtotal(a) },
          classB: { rows: b, sub: subtotal(b) },
          classC: { rows: c, sub: subtotal(c) },
          totals: subtotal([...a,...b,...c])
        };
      }, [calcPay, liquidacionNo, proveedor, secuencial, lote, controlador, liquidador, piscina, guia, planta, basura, recibido, empacado, rendimiento]);

      const snap = liquidacionSnap || liquidacionData;

      const setQty = (setter, obj, talla, v) => {
        const n = (v==="" ? 0 : Number(v));
        setter({ ...obj, [talla]: Number.isFinite(n) ? n : 0 });
      };

      const setPrice = (talla, key, v) => {
        const n = (v==="" ? 0 : Number(v));
        setPrices(p=>({ ...p, [talla]: { ...p[talla], [key]: Number.isFinite(n) ? n : 0 } }));
      };

      const onNuevo = async () => {
        setLiquidacionNo("");
        setProveedor("");
        setSecuencial("");
        setLote("");
        setControlador("");
        setLiquidador("");
        setPiscina("");
        setGuia(0);
        setPlanta(0);
        setBasura(0);

        const z = Object.fromEntries(ALL_TALLAS.map(t=>[t,0]));
        setInvA(z); setInvB(z); setInvC(z);
        setPayA(z); setPayB(z); setPayC(z);

        setLiquidacionSnap(null);
        setHistorialDocId(null);
        await cargarSiguienteLiquidacionNo();
        setToast("DATOS limpiados. Siguiente N° de liquidación listo.");
        setTab("DATOS");
      };

      const onLiquidar = () => {
        const stamp = nowStamp();
        setLiquidacionSnap({ ...liquidacionData, stamp });
        setToast("Liquidación generada.");
        setTab("LIQUIDACION");
      };

      const limpiarObjetoFirestore = (obj) => {
        if (Array.isArray(obj)) return obj.map(limpiarObjetoFirestore);
        if (obj && typeof obj === "object"){
          const out = {};
          Object.entries(obj).forEach(([k,v])=>{
            if (v === undefined) out[k] = null;
            else out[k] = limpiarObjetoFirestore(v);
          });
          return out;
        }
        return obj;
      };

      const preciosLimpios = () => {
        const out = {};
        for (const t of ALL_TALLAS){
          out[t] = {
            A: Number.isFinite(Number(prices[t]?.A)) ? Number(prices[t]?.A) : 0,
            B: Number.isFinite(Number(prices[t]?.B)) ? Number(prices[t]?.B) : 0,
            C: Number.isFinite(Number(prices[t]?.C)) ? Number(prices[t]?.C) : 0,
          };
        }
        return out;
      };

      const buildFirestorePayload = (numeroActual, seqActual, stamp, extra={}) => {
        const formInputs = {
          invA: normalizarCantidades(invA),
          invB: normalizarCantidades(invB),
          invC: normalizarCantidades(invC),
          payA: normalizarCantidades(payA),
          payB: normalizarCantidades(payB),
          payC: normalizarCantidades(payC),
          pesoAkg: toNum(pesoAkg),
          pesoBkg: toNum(pesoBkg),
          pesoClbs: toNum(pesoClbs),
          prices: preciosLimpios()
        };
        const dataToSave = { ...liquidacionData, stamp };
        dataToSave.header = {
          ...dataToSave.header,
          liquidacionNo: numeroActual,
          liquidacionSeq: seqActual,
          proveedor,
          secuencial,
          lote,
          controlador,
          liquidador,
          gerenteProduccion:"Jefferson Figueroa Rosales"
        };
        dataToSave.formInputs = formInputs;
        const basePayload = limpiarObjetoFirestore({
          ...dataToSave,
          formInputs,
          stamp,
          liquidacionNo: numeroActual,
          liquidacionSeq: seqActual,
          proveedor: proveedor.trim(),
          secuencial: String(secuencial || "").trim(),
          lote: String(lote || "").trim(),
          totalCajas: Number(dataToSave?.totals?.qty || 0),
          totalLibras: Number(dataToSave?.totals?.lbs || 0),
          recibido: Number(dataToSave?.header?.recibido || 0),
          empacado: Number(dataToSave?.header?.empacado || 0),
          rendimiento: Number(dataToSave?.header?.rendimiento || 0),
          controlador: String(controlador || "").trim(),
          liquidador: String(liquidador || "").trim(),
          gerenteProduccion: "Jefferson Figueroa Rosales"
        });
        return { ...basePayload, ...extra };
      };

      const loadHistorial = async () => {
        const fb = window.SLP_FIREBASE;
        if (!fb?.db){
          setToast("Firestore aún no está listo. Espera unos segundos e intenta nuevamente.");
          return;
        }
        setHistorialLoading(true);
        try{
          const q = fb.query(
            fb.collection(fb.db, "slp_liquidaciones_pago"),
            fb.orderBy("createdAt", "desc"),
            fb.limit(200)
          );
          const snapDocs = await fb.getDocs(q);
          const data = snapDocs.docs.map(d=>({ id:d.id, ...d.data() }));
          setHistorial(data);
        }catch(err){
          console.error(err);
          setToast("No se pudo cargar el historial. Revisa reglas de Firestore.");
        }finally{
          setHistorialLoading(false);
        }
      };

      useEffect(()=>{
        if (tab === "HISTORIAL") loadHistorial();
      }, [tab]);

      const onGuardar = async () => {
        const fb = window.SLP_FIREBASE;
        if (!fb?.db){
          setToast("Firestore aún no está listo. Espera unos segundos e intenta nuevamente.");
          return;
        }
        if (!proveedor.trim() || !secuencial.toString().trim()){
          setToast("Completa PROVEEDOR y SECUENCIAL antes de guardar.");
          return;
        }
        const stamp = nowStamp();
        const seqActual = await getNextLiquidacionSeq();
        const numeroActual = formatLiquidacionNo(seqActual);
        const payload = buildFirestorePayload(numeroActual, seqActual, stamp, { createdAt: fb.serverTimestamp(), updatedAt: fb.serverTimestamp() });

        try{
          const ref = await fb.addDoc(fb.collection(fb.db, "slp_liquidaciones_pago"), payload);
          lastSavedSeqRef.current = Math.max(lastSavedSeqRef.current || 0, seqActual);
          setHistorialDocId(ref.id);
          setLiquidacionNo(numeroActual);
          setLiquidacionSnap({ ...payload, id: ref.id });
          setToast(`Liquidación ${numeroActual} guardada en historial.`);
          if (tab === "HISTORIAL") loadHistorial();
        }catch(err){
          console.error(err);
          setToast("No se pudo guardar. Revisa reglas de Firestore o valores vacíos no permitidos.");
        }
      };

      const onEditar = async () => {
        const fb = window.SLP_FIREBASE;
        if (!fb?.db){
          setToast("Firestore aún no está listo. Espera unos segundos e intenta nuevamente.");
          return;
        }
        if (!historialDocId){
          setToast("Primero abre una liquidación desde HISTORIAL para poder editarla.");
          return;
        }
        if (!proveedor.trim() || !secuencial.toString().trim()){
          setToast("Completa PROVEEDOR y SECUENCIAL antes de editar.");
          return;
        }
        const numeroActual = formatLiquidacionNo(liquidacionSeqFromNo(liquidacionNo) || 1);
        const seqActual = liquidacionSeqFromNo(numeroActual);
        const stamp = (liquidacionSnap && liquidacionSnap.stamp) ? liquidacionSnap.stamp : nowStamp();
        const payload = buildFirestorePayload(numeroActual, seqActual, stamp, { updatedAt: fb.serverTimestamp() });

        try{
          await fb.updateDoc(fb.doc(fb.db, "slp_liquidaciones_pago", historialDocId), payload);
          setLiquidacionSnap({ ...payload, id: historialDocId });
          setToast(`Liquidación ${numeroActual} actualizada correctamente.`);
          if (tab === "HISTORIAL") loadHistorial();
        }catch(err){
          console.error(err);
          setToast("No se pudo editar. Revisa reglas de Firestore.");
        }
      };

      const normalizarCantidades = (src) => {
        const out = Object.fromEntries(ALL_TALLAS.map(t=>[t,0]));
        if (!src || typeof src !== "object") return out;
        for (const t of ALL_TALLAS){
          const n = Number(src[t]);
          out[t] = Number.isFinite(n) ? n : 0;
        }
        return out;
      };

      const cantidadesDesdeFilas = (rows) => {
        const out = Object.fromEntries(ALL_TALLAS.map(t=>[t,0]));
        (rows || []).forEach(r=>{
          if (r && r.talla && Object.prototype.hasOwnProperty.call(out, r.talla)){
            const n = Number(r.qty);
            out[r.talla] = Number.isFinite(n) ? n : 0;
          }
        });
        return out;
      };

      const cargarDesdeHistorial = (item) => {
        if (!item) return;
        setLiquidacionSnap(item);
        setHistorialDocId(item.id || null);
        const h = item.header || {};
        const inputs = item.formInputs || item.inputs || {};
        setLiquidacionNo(h.liquidacionNo || item.liquidacionNo || formatLiquidacionNo(h.liquidacionSeq || item.liquidacionSeq || 1));
        setProveedor(h.proveedor || item.proveedor || "");
        setSecuencial(h.secuencial || item.secuencial || "");
        setLote(h.lote || item.lote || "");
        setControlador(h.controlador || item.controlador || "");
        setLiquidador(h.liquidador || item.liquidador || "");
        setPiscina(h.piscina || "");
        setGuia(Number(h.guia || 0));
        setPlanta(Number(h.planta || 0));
        setBasura(Number(h.basura || 0));

        if (inputs && Object.keys(inputs).length){
          setInvA(normalizarCantidades(inputs.invA));
          setInvB(normalizarCantidades(inputs.invB));
          setInvC(normalizarCantidades(inputs.invC));
          setPayA(normalizarCantidades(inputs.payA));
          setPayB(normalizarCantidades(inputs.payB));
          setPayC(normalizarCantidades(inputs.payC));
          if (Number.isFinite(Number(inputs.pesoAkg))) setPesoAkg(Number(inputs.pesoAkg));
          if (Number.isFinite(Number(inputs.pesoBkg))) setPesoBkg(Number(inputs.pesoBkg));
          if (Number.isFinite(Number(inputs.pesoClbs))) setPesoClbs(Number(inputs.pesoClbs));
          if (inputs.prices && typeof inputs.prices === "object") setPrices(p=>({ ...p, ...inputs.prices }));
        }else{
          // Compatibilidad con registros guardados antes de esta mejora:
          // se reconstruyen las cantidades de PAGO desde las filas de liquidación.
          setInvA(Object.fromEntries(ALL_TALLAS.map(t=>[t,0])));
          setInvB(Object.fromEntries(ALL_TALLAS.map(t=>[t,0])));
          setInvC(Object.fromEntries(ALL_TALLAS.map(t=>[t,0])));
          setPayA(cantidadesDesdeFilas(item.classA?.rows));
          setPayB(cantidadesDesdeFilas(item.classB?.rows));
          setPayC(cantidadesDesdeFilas(item.classC?.rows));
        }

        setTab("DATOS");
        setToast("Liquidación cargada desde historial con sus cantidades.");
      };

      const eliminarHistorial = async (item) => {
        const fb = window.SLP_FIREBASE;
        if (!fb?.db || !item?.id) return;
        if (!confirm("¿Eliminar esta liquidación del historial?")) return;
        try{
          await fb.deleteDoc(fb.doc(fb.db, "slp_liquidaciones_pago", item.id));
          if (historialDocId === item.id) setHistorialDocId(null);
          setToast("Registro eliminado del historial.");
          loadHistorial();
        }catch(err){
          console.error(err);
          setToast("No se pudo eliminar el registro.");
        }
      };

      const onPdf = async () => {
        const stamp = (liquidacionSnap && liquidacionSnap.stamp) ? liquidacionSnap.stamp : nowStamp();
        const prov = cleanFileName(snap?.header?.proveedor || "PROVEEDOR") || "PROVEEDOR";
        const sec = cleanFileName(snap?.header?.secuencial || "SECUENCIAL") || "SECUENCIAL";
        const numLiq = cleanFileName(snap?.header?.liquidacionNo || liquidacionNo || "0000001");
        const suggested = `${numLiq}_${prov}_${sec}_${stamp}.pdf`;

        if (!liqRef.current){
          setToast("No se pudo encontrar el área de LIQUIDACION para exportar.");
          return;
        }

        const canvas = await window.html2canvas(liqRef.current, { scale: 2, backgroundColor: "#ffffff", useCORS: true });
        const imgData = canvas.toDataURL("image/png");

        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF({ orientation:"portrait", unit:"pt", format:"a4" });

        const pageW = pdf.internal.pageSize.getWidth();
        const pageH = pdf.internal.pageSize.getHeight();

        const imgW = canvas.width;
        const imgH = canvas.height;

        const margin = 24; // tighter margin
        const maxW = pageW - margin*2;
        const maxH = pageH - margin*2;

        const ratio = Math.min(maxW/imgW, maxH/imgH);
        const w = imgW * ratio;
        const h = imgH * ratio;
        const x = (pageW - w)/2;
        const y = margin; // start from top (less header space)

        pdf.addImage(imgData, "PNG", x, y, w, h);

        const blob = pdf.output("blob");

        try{
          if (window.showSaveFilePicker){
            const handle = await window.showSaveFilePicker({
              suggestedName: suggested,
              types: [{ description:"PDF", accept: { "application/pdf": [".pdf"] } }]
            });
            const writable = await handle.createWritable();
            await writable.write(blob);
            await writable.close();

            const url = URL.createObjectURL(blob);
            window.open(url, "_blank", "noopener,noreferrer");
            setToast("PDF guardado y abierto.");
            return;
          }
        }catch(e){}

        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = suggested;
        document.body.appendChild(a);
        a.click();
        a.remove();
        window.open(url, "_blank", "noopener,noreferrer");
        setToast("PDF descargado y abierto.");
      };

      return (
        <div>
          <div className="top">
            <div className="wrap">
              <div className="topbar">
                <div className="brand">
                  <div className="t">OCEANTREASURE</div>
                  <div className="s">Liquidación de Pago (Web)</div>
                </div>
                <div style={{display:"flex", gap:"8px"}}>
                  <button className="btn" onClick={onNuevo}>NUEVO</button>
                  <button className="btn" onClick={onLiquidar}>LIQUIDAR</button>
                  <button className="btn btnSave" onClick={onGuardar}>GUARDAR</button>
                  <button className="btn" onClick={onEditar}>EDITAR</button>
                  <button className="btn" onClick={onPdf}>PDF</button>
                </div>
              </div>
            </div>
          </div>

          <div className="wrap">
            <div className="tabs">
              {TABS.map(t=>(
                <button key={t} className={"tab " + (tab===t ? "active" : "")} onClick={()=>setTab(t)}>{t}</button>
              ))}
            </div>

            <div className="panel">
              {tab==="DATOS" && (
                <DatosTab
                  liquidacionNo={liquidacionNo} proveedor={proveedor} secuencial={secuencial} lote={lote} controlador={controlador} liquidador={liquidador} piscina={piscina} guia={guia} planta={planta} basura={basura}
                  setProveedor={setProveedor} setSecuencial={setSecuencial} setLote={setLote} setControlador={setControlador} setLiquidador={setLiquidador} setPiscina={setPiscina}
                  setGuia={(v)=>setGuia(Number(v))} setPlanta={(v)=>setPlanta(Number(v))} setBasura={(v)=>setBasura(Number(v))}
                  invA={invA} invB={invB} invC={invC} payA={payA} payB={payB} payC={payC}
                  setInvA={(t,v)=>setQty(setInvA, invA, t, v)}
                  setInvB={(t,v)=>setQty(setInvB, invB, t, v)}
                  setInvC={(t,v)=>setQty(setInvC, invC, t, v)}
                  setPayA={(t,v)=>setQty(setPayA, payA, t, v)}
                  setPayB={(t,v)=>setQty(setPayB, payB, t, v)}
                  setPayC={(t,v)=>setQty(setPayC, payC, t, v)}
                  pesoAkg={pesoAkg} pesoBkg={pesoBkg} pesoClbs={pesoClbs}
                  setPesoAkg={(v)=>setPesoAkg(Number(v))}
                  setPesoBkg={(v)=>setPesoBkg(Number(v))}
                  setPesoClbs={(v)=>setPesoClbs(Number(v))}
                  enLbsA={enLbsA} enLbsB={enLbsB} enLbsC={enLbsC}
                  recibido={recibido} empacado={empacado} rendimiento={rendimiento}
                  diffLbs={diffLbs} diffDollars={diffDollars}
                  gramoEntero={gramoEntero} gramoCola={gramoCola} tallaCola={tallaCola}
                />
              )}

              {tab==="PRECIO" && (
                <PrecioTab prices={prices} setPrice={setPrice} />
              )}

              {tab==="CALCULO" && (
                <CalculoTab calcInv={calcInv} calcPay={calcPay} enLbsA={enLbsA} enLbsB={enLbsB} enLbsC={enLbsC} />
              )}

              {tab==="LIQUIDACION" && (
                <LiquidacionTab snap={snap} liqRef={liqRef} />
              )}

              {tab==="HISTORIAL" && (
                <HistorialTab
                  historial={historial}
                  loading={historialLoading}
                  filtro={historialFiltro}
                  setFiltro={setHistorialFiltro}
                  onRefresh={loadHistorial}
                  onOpen={cargarDesdeHistorial}
                  onDelete={eliminarHistorial}
                />
              )}
            </div>
          </div>

          <Toast msg={toast} onClose={()=>setToast("")} />
        </div>
      );
    }

    function LabelInput({label, value, onChange, type="text", readOnly=false}){
      const isNum = type === "number";
      const displayValue = (isNum && (value===0 || value==="0")) ? "" : value;
      return (
        <label>
          <div>{label}</div>
          <input value={displayValue} onChange={(e)=>{ if(!readOnly && typeof onChange === "function") onChange(e.target.value); }} type={type} readOnly={readOnly} style={readOnly ? {background:"#f8fafc", fontWeight:700} : undefined} />
        </label>
      );
    }

    function NumCell({value, onChange, rowIndex, colKey, register, move}){
      const displayValue = (Number(value)===0 ? "" : value);

      const onKeyDown = (e) => {
        if (e.key === "Tab"){
          e.preventDefault();
          if (typeof move === "function"){
            move(rowIndex, colKey, { dRow: 0, dCol: e.shiftKey ? -1 : 1, wrap: true });
          }
          return;
        }
        if (e.key === "Enter"){
          e.preventDefault();
          if (typeof move === "function"){
            move(rowIndex, colKey, { dRow: e.shiftKey ? -1 : 1, dCol: 0, wrap: false });
          }
          return;
        }
      };

      return (
        <input
          className="inp-cell"
          type="number"
          value={displayValue}
          ref={typeof register === "function" ? register(rowIndex, colKey) : null}
          onKeyDown={onKeyDown}
          onChange={(e)=>onChange(e.target.value)}
        />
      );
    }


    function DatosTab(props){
      const {
        liquidacionNo,proveedor,secuencial,lote,controlador,liquidador,piscina,guia,planta,basura,
        setProveedor,setSecuencial,setLote,setControlador,setLiquidador,setPiscina,setGuia,setPlanta,setBasura,
        invA,invB,invC,payA,payB,payC,
        setInvA,setInvB,setInvC,setPayA,setPayB,setPayC,
        pesoAkg,pesoBkg,pesoClbs,setPesoAkg,setPesoBkg,setPesoClbs,
        enLbsA,enLbsB,enLbsC,recibido,empacado,rendimiento,diffLbs,diffDollars,gramoEntero,gramoCola,tallaCola
      } = props;

      const rows = ALL_TALLAS.map(t=>({ talla:t, invA:invA[t], invB:invB[t], invC:invC[t], payA:payA[t], payB:payB[t], payC:payC[t] }));

      const cellRefs = useRef({});

      const registerCell = (r, c) => (el) => {
        const k = `${r}:${c}`;
        if (el) cellRefs.current[k] = el;
        else delete cellRefs.current[k];
      };

      const INPUT_COLS = ["invA","invB","invC","payA","payB","payC"];

      const moveCell = (r, c, delta) => {
        const dRow = delta?.dRow ?? 0;
        const dCol = delta?.dCol ?? 0;
        const wrap = !!delta?.wrap;

        const rowCount = rows.length;
        const colCount = INPUT_COLS.length;

        const cIdx0 = Math.max(0, INPUT_COLS.indexOf(c));
        let nr = r + dRow;
        let ncIdx = cIdx0 + dCol;

        if (wrap && dCol !== 0){
          if (ncIdx >= colCount){
            nr += 1;
            ncIdx = 0;
          }else if (ncIdx < 0){
            nr -= 1;
            ncIdx = colCount - 1;
          }
        }

        if (nr < 0) nr = 0;
        if (nr >= rowCount) nr = rowCount - 1;
        if (ncIdx < 0) ncIdx = 0;
        if (ncIdx >= colCount) ncIdx = colCount - 1;

        const key = `${nr}:${INPUT_COLS[ncIdx]}`;
        const el = cellRefs.current[key];

        if (el){
          el.focus();
          if (el.scrollIntoView) el.scrollIntoView({block:"nearest", inline:"nearest"});
          if (el.select) el.select();
        }
      };



      return (
        <div className="grid grid-3">
          <div className="card">
            <div className="h">DATOS</div>
            <div className="grid grid-2">
              <LabelInput label="N° LIQUIDACIÓN" value={liquidacionNo} onChange={()=>{}} readOnly={true} />
              <LabelInput label="PROVEEDOR" value={proveedor} onChange={setProveedor} />
              <LabelInput label="SECUENCIAL" value={secuencial} onChange={setSecuencial} />
              <LabelInput label="LOTE" value={lote} onChange={setLote} />
              <LabelInput label="PISCINA" value={piscina} onChange={setPiscina} />
              <LabelInput label="CONTROLADOR" value={controlador} onChange={setControlador} />
              <LabelInput label="LIQUIDADOR" value={liquidador} onChange={setLiquidador} />
              <LabelInput label="GUIA" type="number" value={guia} onChange={setGuia} />
              <LabelInput label="PLANTA" type="number" value={planta} onChange={setPlanta} />
              <LabelInput label="BASURA" type="number" value={basura} onChange={setBasura} />
            </div>

            <div className="grid grid-2" style={{marginTop:10, gridTemplateColumns:"1fr 1.75fr"}}>
              <div className="card" style={{padding:8}}>
                <div className="muted" style={{fontWeight:700, marginBottom:6, whiteSpace:"nowrap"}}>PESOS (editable)</div>
                <div className="grid grid-2">
                  <LabelInput label='PESO \"A\" (kg)' type="number" value={pesoAkg} onChange={setPesoAkg} />
                  <div className="muted"><div>EN LIBRAS</div><div style={{fontWeight:700, color:"#111"}}>{fmtNumEC(enLbsA,3)}</div></div>
                  <LabelInput label='PESO \"B\" (kg)' type="number" value={pesoBkg} onChange={setPesoBkg} />
                  <div className="muted"><div>EN LIBRAS</div><div style={{fontWeight:700, color:"#111"}}>{fmtNumEC(enLbsB,3)}</div></div>
                  <LabelInput label='PESO \"C\" (lb)' type="number" value={pesoClbs} onChange={setPesoClbs} />
                  <div className="muted"><div>EN LIBRAS</div><div style={{fontWeight:700, color:"#111"}}>{fmtNumEC(enLbsC,2)}</div></div>
                </div>
              </div>

              <div className="card" style={{padding:8}}>
                <div className="muted" style={{fontWeight:700, marginBottom:6, whiteSpace:"nowrap"}}>RESUMEN</div>
                <div style={{display:"grid", gridTemplateColumns:"2.4fr 0.6fr", gap:"5px", fontSize:"12px", whiteSpace:"nowrap"}}>
                  <div className="muted">RECIBIDO</div><div className="right" style={{fontWeight:700}}>{fmtNumEC(recibido,2)}</div>
                  <div className="muted">EMPACADO</div><div className="right" style={{fontWeight:700}}>{fmtNumEC(empacado,2)}</div>
                  <div className="muted">RENDIMIENTO</div><div className="right" style={{fontWeight:700}}>{fmtNumEC(rendimiento*100,2)}%</div>
                  <div className="muted">LIBRAS (Inv - Pago)</div><div className="right" style={{fontWeight:700}}>{fmtNumEC(diffLbs,2)}</div>
                  <div className="muted">DOLARES (Inv - Pago)</div><div className="right" style={{fontWeight:700}}>$ {fmtNumEC(diffDollars,2)}</div>
                  <div className="muted">GRAMO ENTERO</div><div className="right" style={{fontWeight:700}}>{fmtNumEC(gramoEntero,2)}</div>
                  <div className="muted">GRAMO COLA</div><div className="right" style={{fontWeight:700}}>{fmtNumEC(gramoCola,2)}</div>
                  <div className="muted">TALLA COLA</div><div className="right" style={{fontWeight:700}}>{fmtNumEC(tallaCola,2)}</div>

                </div>
              </div>
            </div>
          </div>

          <div className="card" style={{gridColumn:"span 2"}}>
            <div className="h">CANTIDADES (Inventario y Pago)</div>
            <ResizableTable
              tableClassName="compact"
              columns={[
                { key:"talla", title:"TALLA", width:95 },
                { key:"invA", title:"INV A", width:78, render:(r,ri)=> <NumCell value={r.invA} rowIndex={ri} colKey="invA" register={registerCell} move={moveCell} onChange={(v)=>setInvA(r.talla,v)} /> },
                { key:"invB", title:"INV B", width:78, render:(r,ri)=> <NumCell value={r.invB} rowIndex={ri} colKey="invB" register={registerCell} move={moveCell} onChange={(v)=>setInvB(r.talla,v)} /> },
                { key:"invC", title:"INV C", width:78, render:(r,ri)=> <NumCell value={r.invC} rowIndex={ri} colKey="invC" register={registerCell} move={moveCell} onChange={(v)=>setInvC(r.talla,v)} /> },
                { key:"payA", title:"PAGO A", width:78, render:(r,ri)=> <NumCell value={r.payA} rowIndex={ri} colKey="payA" register={registerCell} move={moveCell} onChange={(v)=>setPayA(r.talla,v)} /> },
                { key:"payB", title:"PAGO B", width:78, render:(r,ri)=> <NumCell value={r.payB} rowIndex={ri} colKey="payB" register={registerCell} move={moveCell} onChange={(v)=>setPayB(r.talla,v)} /> },
                { key:"payC", title:"PAGO C", width:78, render:(r,ri)=> <NumCell value={r.payC} rowIndex={ri} colKey="payC" register={registerCell} move={moveCell} onChange={(v)=>setPayC(r.talla,v)} /> },
              ]}
              rows={rows}
            />
            <div className="muted" style={{marginTop:8}}>
              Nota: En Excel, Inventario viene de C/D/E y Pago viene de H/I/J. Aquí están ambos en la misma tabla.
            </div>
          </div>
        </div>
      );
    }

    function PrecioTab({prices, setPrice}){
      const rows = ALL_TALLAS.map(t=>({ talla:t, A:prices[t]?.A ?? "", B:prices[t]?.B ?? "", C:prices[t]?.C ?? "" }));
      return (
        <div className="card">
          <div className="h">PRECIO</div>
          <ResizableTable
            columns={[
              { key:"talla", title:"TALLA", width:130 },
              { key:"A", title:"PRECIO A", width:110, render:(r)=>(
                <input className="inp-cell" type="number" step="0.01" value={(Number(r.A)===0 ? "" : r.A)}
                  onChange={(e)=>setPrice(r.talla,"A",e.target.value)} disabled={!TALLAS_A_B.includes(r.talla)} />
              )},
              { key:"B", title:"PRECIO B", width:110, render:(r)=>(
                <input className="inp-cell" type="number" step="0.01" value={(Number(r.B)===0 ? "" : r.B)}
                  onChange={(e)=>setPrice(r.talla,"B",e.target.value)} disabled={!TALLAS_A_B.includes(r.talla)} />
              )},
              { key:"C", title:"PRECIO C", width:110, render:(r)=>(
                <input className="inp-cell" type="number" step="0.01" value={(Number(r.C)===0 ? "" : r.C)}
                  onChange={(e)=>setPrice(r.talla,"C",e.target.value)} disabled={!TALLAS_C.includes(r.talla)} />
              )},
            ]}
            rows={rows}
          />
          <div className="muted" style={{marginTop:8}}>
            En el Excel, PRECIO B normalmente es A - 0,30. Aquí lo puedes editar si deseas.
          </div>
        </div>
      );
    }

    function CalculoTab({calcInv, calcPay, enLbsA, enLbsB, enLbsC}){
      const cols = [
        { key:"talla", title:"TALLA", width:110 },
        { key:"qty", title:"EMPAQUE", width:100, render:(r)=>fmtNumEC(r.qty,0), tdClassName:"right" },
        { key:"lbs", title:"LIBRAS", width:120, render:(r)=>fmtNumEC(r.lbs,2), tdClassName:"right" },
        { key:"price", title:"PRECIO", width:110, render:(r)=>fmtNumEC(r.price,2), tdClassName:"right" },
        { key:"dollars", title:"DOLARES", width:130, render:(r)=>"$ "+fmtNumEC(r.dollars,2), tdClassName:"right" },
        { key:"classKey", title:"CLASE", width:80 }
      ];
      const invRows = [...calcInv.rowsA, ...calcInv.rowsB, ...calcInv.rowsC];
      const payRows = [...calcPay.rowsA, ...calcPay.rowsB, ...calcPay.rowsC];

      return (
        <div className="grid grid-2">
          <div className="card">
            <div className="h">CALCULO — INVENTARIO</div>
            <div className="muted" style={{marginBottom:8}}>Pesos: A {fmtNumEC(enLbsA,3)} lb, B {fmtNumEC(enLbsB,3)} lb, C {fmtNumEC(enLbsC,2)} lb</div>
            <ResizableTable columns={cols} rows={invRows} />
            <div style={{display:"flex", justifyContent:"flex-end", gap:"24px", marginTop:10}}>
              <div>
                <div className="muted">TOTAL LIBRAS</div>
                <div style={{fontWeight:700}} className="right">{fmtNumEC(calcInv.grand.lbs,2)}</div>
              </div>
              <div>
                <div className="muted">TOTAL $</div>
                <div style={{fontWeight:700}} className="right">$ {fmtNumEC(calcInv.grand.dollars,2)}</div>
              </div>
            </div>
          </div>

          <div className="card">
            <div className="h">CALCULO — PAGO</div>
            <div className="muted" style={{marginBottom:8}}>(Equivalente a columnas J/K/L en Excel para generar LIQUIDACION)</div>
            <ResizableTable columns={cols} rows={payRows} />
            <div style={{display:"flex", justifyContent:"flex-end", gap:"24px", marginTop:10}}>
              <div>
                <div className="muted">TOTAL LIBRAS</div>
                <div style={{fontWeight:700}} className="right">{fmtNumEC(calcPay.grand.lbs,2)}</div>
              </div>
              <div>
                <div className="muted">TOTAL $</div>
                <div style={{fontWeight:700}} className="right">$ {fmtNumEC(calcPay.grand.dollars,2)}</div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function LiquidacionTab({snap, liqRef}){
      const H = snap?.header || {};
      return (
        <div style={{display:"flex", justifyContent:"center"}}>
          <div ref={liqRef} className="liq">
            <div className="grid grid-2" style={{gap:"10px"}}>
              <div>
                <HeaderRow label="N° LIQUIDACIÓN" value={H.liquidacionNo} />
                <HeaderRow label="PROVEEDOR" value={H.proveedor} />
                <HeaderRow label="SECUENCIAL" value={H.secuencial} />
                <HeaderRow label="LOTE" value={H.lote} />
                <HeaderRow label="PISCINA" value={H.piscina} />
                <HeaderRow label="GUIA" value={fmtNumEC(H.guia,2)} />
                <HeaderRow label="PLANTA" value={fmtNumEC(H.planta,2)} />
                <HeaderRow label="BASURA" value={fmtNumEC(H.basura,2)} />
                <HeaderRow label="RECIBIDO" value={fmtNumEC(H.recibido,2)} />
                <HeaderRow label="EMPACADO" value={fmtNumEC(H.empacado,2)} />
                <HeaderRow label="RENDIMIENTO" value={fmtNumEC((H.rendimiento||0)*100,2)+"%"} />
              </div>
              <div style={{display:"flex", justifyContent:"flex-end"}}>
                <div className="logoBox">
                  <LogoImg />
                </div>
              </div>
            </div>

            <div style={{marginTop:6}}>
              <ClassTable title='CLASE \"A\"' rows={snap.classA?.rows || []} sub={snap.classA?.sub} />
              <div style={{height:10}}></div>
              <ClassTable title='CLASE \"B\"' rows={snap.classB?.rows || []} sub={snap.classB?.sub} />
              <div style={{height:10}}></div>
              <ClassTable title='CLASE \"C\"' rows={snap.classC?.rows || []} sub={snap.classC?.sub} />

              <div style={{marginTop:8, borderTop:"1px solid #6b7280", paddingTop:6}}>
                <div style={{display:"grid", gridTemplateColumns:"1fr 1fr 1fr", fontSize:"11px"}}>
                  <div style={{fontWeight:700}}>TOTAL</div>
                  <div className="right" style={{fontWeight:700}}>{fmtNumEC(snap.totals?.qty || 0, 0)}</div>
                  <div className="right" style={{fontWeight:700}}>{fmtNumEC(snap.totals?.lbs || 0, 2)}</div>
                </div>
              </div>
            </div>

            <div className="signArea">
              <div className="signBox">
                <div className="signLine">CONTROLADOR</div>
                <div>{H.controlador || ""}</div>
              </div>
              <div className="signBox">
                <div className="signLine">LIQUIDADOR</div>
                <div>{H.liquidador || ""}</div>
              </div>
              <div className="signBox">
                <img src="firma.png" onError={(e)=>{ e.currentTarget.style.display='none'; }} />
                <div className="signLine">GERENTE DE PRODUCCIÓN</div>
                <div>{H.gerenteProduccion || "Jefferson Figueroa Rosales"}</div>
              </div>
            </div>

          </div>
        </div>
      );
    }

    function HeaderRow({label, value}){
      return (
        <div className="liqHeaderRow">
          <div className="lab">{label}</div>
          <div className="val">{value ?? ""}</div>
        </div>
      );
    }

    function ClassTable({title, rows, sub}){
      return (
        <div>
          <div className="classTitle">{title}</div>
          <div className="classHead">
            <div>TALLA</div>
            <div style={{textAlign:"right"}}>CAJAS</div>
            <div style={{textAlign:"right"}}>LIBRAS</div>
          </div>
          <div className="classBody">
            {rows.length===0 ? (
              <div className="classRow">
                <div>-</div><div className="r">-</div><div className="r">-</div>
              </div>
            ) : rows.map((r,idx)=>(
              <div key={idx} className="classRow">
                <div>{r.talla}</div>
                <div className="r">{fmtNumEC(r.qty,0)}</div>
                <div className="r">{fmtNumEC(r.lbs,2)}</div>
              </div>
            ))}
            <div className="classRow subRow">
              <div></div>
              <div className="r">{fmtNumEC(sub?.qty || 0, 0)}</div>
              <div className="r">{fmtNumEC(sub?.lbs || 0, 2)}</div>
            </div>
          </div>
        </div>
      );
    }


    function LogoImg(){
      const [src, setSrc] = useState("logo.png");
      const [tries, setTries] = useState(0);
      return (
        <img
          src={src}
          alt="Oceantreasure"
          onError={(e)=>{
            if (tries === 0){ setTries(1); setSrc("LOGOOCEANTREASURESA(1).png"); }
            else { e.currentTarget.style.display = "none"; }
          }}
        />
      );
    }

    function HistorialTab({historial, loading, filtro, setFiltro, onRefresh, onOpen, onDelete}){
      const filtered = (historial || []).filter(item=>{
        const h = item.header || {};
        const num = (h.liquidacionNo || item.liquidacionNo || "").toString().toLowerCase();
        const prov = (h.proveedor || item.proveedor || "").toString().toLowerCase();
        const sec = (h.secuencial || item.secuencial || "").toString().toLowerCase();
        const lot = (h.lote || item.lote || "").toString().toLowerCase();
        return num.includes((filtro.liquidacionNo||"").toLowerCase())
          && prov.includes((filtro.proveedor||"").toLowerCase())
          && sec.includes((filtro.secuencial||"").toLowerCase())
          && lot.includes((filtro.lote||"").toLowerCase());
      });

      const rows = filtered.map(item=>{
        const h = item.header || {};
        const created = item.createdAt?.toDate ? item.createdAt.toDate() : null;
        return {
          raw:item,
          fecha: created ? created.toLocaleString("es-EC") : (item.stamp || ""),
          liquidacionNo: h.liquidacionNo || item.liquidacionNo || "",
          proveedor: h.proveedor || item.proveedor || "",
          secuencial: h.secuencial || item.secuencial || "",
          lote: h.lote || item.lote || "",
          recibido: h.recibido ?? item.recibido ?? 0,
          empacado: h.empacado ?? item.empacado ?? 0,
          rendimiento: h.rendimiento ?? item.rendimiento ?? 0,
          cajas: item.totalCajas ?? item.totals?.qty ?? 0,
          libras: item.totalLibras ?? item.totals?.lbs ?? 0,
          controlador: h.controlador || item.controlador || "",
          liquidador: h.liquidador || item.liquidador || ""
        };
      });

      return (
        <div className="card">
          <div className="h">HISTORIAL DE LIQUIDACIONES</div>
          <div className="historyFilters">
            <LabelInput label="FILTRAR N° LIQ." value={filtro.liquidacionNo} onChange={(v)=>setFiltro({...filtro, liquidacionNo:v})} />
            <LabelInput label="FILTRAR PROVEEDOR" value={filtro.proveedor} onChange={(v)=>setFiltro({...filtro, proveedor:v})} />
            <LabelInput label="FILTRAR SECUENCIAL" value={filtro.secuencial} onChange={(v)=>setFiltro({...filtro, secuencial:v})} />
            <LabelInput label="FILTRAR LOTE" value={filtro.lote} onChange={(v)=>setFiltro({...filtro, lote:v})} />
            <button className="btn" onClick={onRefresh}>{loading ? "CARGANDO..." : "ACTUALIZAR"}</button>
          </div>

          <ResizableTable
            columns={[
              { key:"fecha", title:"FECHA", width:150 },
              { key:"liquidacionNo", title:"N° LIQ.", width:95 },
              { key:"proveedor", title:"PROVEEDOR", width:170 },
              { key:"secuencial", title:"SECUENCIAL", width:105 },
              { key:"lote", title:"LOTE", width:120 },
              { key:"recibido", title:"RECIBIDO", width:105, render:(r)=>fmtNumEC(r.recibido,2), tdClassName:"right" },
              { key:"empacado", title:"EMPACADO", width:110, render:(r)=>fmtNumEC(r.empacado,2), tdClassName:"right" },
              { key:"rendimiento", title:"REND", width:85, render:(r)=>fmtNumEC((r.rendimiento||0)*100,2)+"%", tdClassName:"right" },
              { key:"cajas", title:"CAJAS", width:85, render:(r)=>fmtNumEC(r.cajas,0), tdClassName:"right" },
              { key:"libras", title:"LIBRAS", width:105, render:(r)=>fmtNumEC(r.libras,2), tdClassName:"right" },
              { key:"controlador", title:"CONTROLADOR", width:140 },
              { key:"liquidador", title:"LIQUIDADOR", width:140 },
              { key:"acciones", title:"ACCIONES", width:155, render:(r)=>(
                <div style={{display:"flex", gap:"6px"}}>
                  <button className="btn" onClick={()=>onOpen(r.raw)}>ABRIR</button>
                  <button className="btn btnDanger" onClick={()=>onDelete(r.raw)}>ELIMINAR</button>
                </div>
              )}
            ]}
            rows={rows}
          />
          <div className="muted" style={{marginTop:8}}>Se muestran hasta los últimos 200 registros guardados en Firestore.</div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>

  <!-- Recomendación: abrir en localhost para que el Guardar como funcione mejor -->
</body>
